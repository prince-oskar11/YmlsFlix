<!DOCTYPE html>
<html lang="en" style="background: #05070a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | v55.0 Final Verified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Auth & Overlays */
        #authOverlay { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: #0f1117; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #1f2937; }

        /* Mobile-First Flexible Flex Sliders */
        .slider-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Cards & Badges */
        .anime-card { position: relative; width: 135px; flex-shrink: 0; border-radius: 8px; overflow: hidden; scroll-snap-align: start; background: #111827; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; transition: 0.3s; }
        .anime-card:hover .card-img { transform: scale(1.05); }
        
        .total-ep-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.8); color: white; font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 3px; z-index: 20; border: 0.5px solid rgba(255,255,255,0.2); }
        .ep-badge { position: absolute; bottom: 35px; left: 6px; background: #ef4444; color: white; font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 3px; z-index: 20; }
        .heart-icon { position: absolute; top: 6px; right: 6px; z-index: 30; font-size: 14px; text-shadow: 0 0 5px rgba(0,0,0,0.8); cursor: pointer; }

        /* Hero Spotlight */
        #heroSection { height: 65vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; position: relative; padding-bottom: 50px; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 15%, rgba(5,7,10,0.5) 50%, transparent 100%); }

        /* Dropdowns & Nav */
        .dropdown-content { display: none; position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 15px; z-index: 3000; width: 95%; max-width: 500px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .show { display: block !important; }
        .genre-btn { background: #1a1c23; border: 1px solid #2d2d2d; color: #94a3b8; padding: 10px 5px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .genre-btn:hover { background: #ef4444; color: white; }

        .page-view { display: none; min-height: 100vh; }
        .active-view { display: block; }
        
        #installBtn { display: none; background: #ef4444; color: white; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card text-center">
            <h1 class="text-2xl font-black text-white mb-6 uppercase">YmlsFlix Profile</h1>
            <input type="text" id="regUser" placeholder="Enter Username..." class="w-full p-4 mb-4 bg-zinc-900 border border-zinc-700 rounded-lg text-white outline-none">
            <button onclick="handleRegister()" class="w-full bg-red-600 text-white font-black py-4 rounded-lg hover:bg-red-700 uppercase text-xs">Login / Create Account</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[4000] glass p-4">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-black logo-text cursor-pointer" onclick="showPage('home')">YmlsFlix</h1>
            <div class="flex items-center gap-5">
                <button id="installBtn" onclick="installPWA()">Install App</button>
                <div class="relative">
                    <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 hover:text-red-500 cursor-pointer text-xl"></i>
                    <div id="genreDrop" class="dropdown-content">
                        <h3 class="text-[10px] font-black uppercase text-gray-500 mb-4 border-b border-gray-800 pb-2">Select Genre</h3>
                        <div id="genreList" class="grid grid-cols-3 gap-2 max-h-72 overflow-y-auto pr-2 no-scrollbar"></div>
                    </div>
                </div>
                <i onclick="showPage('wishlist')" class="fa fa-heart text-gray-400 hover:text-red-500 cursor-pointer text-xl"></i>
                <i onclick="toggleDropdown('profileDrop')" class="fa fa-user-circle text-gray-400 hover:text-red-500 cursor-pointer text-xl"></i>
                <div id="profileDrop" class="dropdown-content text-center">
                    <h4 id="userDisplay" class="font-black text-sm mb-4 text-white uppercase">Guest</h4>
                    <button onclick="openAuth()" class="w-full bg-red-600 py-3 rounded-lg text-[10px] font-black uppercase mb-2">Switch Profile</button>
                    <button onclick="handleLogout()" class="w-full bg-zinc-800 py-3 rounded-lg text-[10px] font-black uppercase">Sign Out</button>
                </div>
            </div>
        </div>
        <input type="text" id="searchBar" placeholder="Search for anime..." class="mt-4 bg-zinc-900 border border-zinc-800 p-3 rounded-xl w-full text-white text-sm outline-none" oninput="handleSearch(this.value)">
    </nav>

    <div id="page-home" class="page-view active-view pt-20">
        <header id="heroSection">
            <div class="hero-overlay"></div>
            <div class="container mx-auto px-6 relative z-10">
                <h2 id="heroTitle" class="text-4xl md:text-6xl font-black mb-2 leading-tight"></h2>
                <p id="heroDesc" class="text-gray-300 text-xs md:text-sm max-w-xl line-clamp-3 mb-6"></p>
                <button id="heroPlayBtn" class="bg-white text-black px-10 py-3 rounded-full font-black text-xs uppercase shadow-2xl">Watch Now</button>
            </div>
        </header>

        <main class="container mx-auto p-4 space-y-10 relative z-20">
            <section id="continueSection" class="hidden">
                <h2 class="text-[10px] font-black uppercase text-red-500 tracking-widest mb-3">Continue Watching</h2>
                <div id="continueGrid" class="slider-row no-scrollbar"></div>
            </section>
            <section>
                <h2 class="text-[10px] font-black uppercase text-orange-500 tracking-widest mb-3">Trending</h2>
                <div id="trendingGrid" class="slider-row no-scrollbar"></div>
            </section>
            <section>
                <h2 class="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-3">Airing This Week</h2>
                <div id="airingGrid" class="slider-row no-scrollbar"></div>
            </section>
            <section>
                <h2 class="text-[10px] font-black uppercase text-purple-500 tracking-widest mb-3">Popular Favorites</h2>
                <div id="popularGrid" class="slider-row no-scrollbar"></div>
            </section>
            <section>
                <h2 class="text-[10px] font-black uppercase text-yellow-500 tracking-widest mb-3">Top Rated</h2>
                <div id="ratedGrid" class="slider-row no-scrollbar"></div>
            </section>
            <section>
                <h2 class="text-[10px] font-black uppercase text-green-500 tracking-widest mb-3">Upcoming</h2>
                <div id="upcomingGrid" class="slider-row no-scrollbar"></div>
            </section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto p-4 pt-40">
        <h2 id="filterTitle" class="text-2xl font-black mb-8 uppercase text-red-600 tracking-tighter">Results</h2>
        <div id="filterGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto p-4 pt-40">
        <h2 class="text-2xl font-black mb-8 uppercase text-red-600 tracking-tighter">My Wishlist</h2>
        <div id="wishlistGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        let currentUser = JSON.parse(localStorage.getItem('ymls_active_user')) || null;
        let playMode = 'sub';

        window.onload = () => {
            if(!currentUser) openAuth();
            setupUI(); fetchHero(); loadHome(); genFilters();
        };

        // PWA & Auth
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
        async function installPWA() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } }
        function openAuth() { document.getElementById('authOverlay').style.display = 'flex'; }
        function handleRegister() {
            const u = document.getElementById('regUser').value.trim();
            if(!u) return;
            let users = JSON.parse(localStorage.getItem('ymls_users')) || {};
            if(!users[u]) users[u] = { name: u, wishlist: [], progress: {}, lastPlayed: {} };
            localStorage.setItem('ymls_users', JSON.stringify(users));
            localStorage.setItem('ymls_active_user', JSON.stringify(users[u]));
            location.reload();
        }
        function handleLogout() { localStorage.removeItem('ymls_active_user'); location.reload(); }
        function setupUI() { if(currentUser) document.getElementById('userDisplay').innerText = currentUser.name; }

        // Home Page Loaders
        async function fetchHero() {
            const q = `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id idMal title{english romaji} bannerImage description episodes}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q})});
            const j = await res.json(); const top = j.data.Page.media[0];
            document.getElementById('heroSection').style.backgroundImage = `url(${top.bannerImage})`;
            document.getElementById('heroTitle').innerText = top.title.english || top.title.romaji;
            document.getElementById('heroDesc').innerText = top.description.replace(/<[^>]*>?/gm, '');
            document.getElementById('heroPlayBtn').onclick = () => alert("Playing " + (top.title.english || top.title.romaji));
        }

        async function loadHome() {
            fetchGrid("TRENDING_DESC", "trendingGrid");
            fetchGrid("POPULARITY_DESC", "popularGrid");
            fetchGrid("SCORE_DESC", "ratedGrid");
            const airQ = `query{Page(perPage:12){airingSchedules(airingAt_greater:${Math.floor(Date.now()/1000)},sort:TIME){media{id idMal title{english romaji} coverImage{large} episodes}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:airQ})}).then(r=>r.json()).then(j=>render(j.data.Page.airingSchedules.map(s=>s.media), "airingGrid"));
            const upQ = `query{Page(perPage:12){media(status:NOT_YET_RELEASED,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:upQ})}).then(r=>r.json()).then(j=>render(j.data.Page.media, "upcomingGrid"));
            const h = JSON.parse(localStorage.getItem('ymls_hist')) || [];
            if(h.length) { document.getElementById('continueSection').classList.remove('hidden'); render(h, 'continueGrid'); }
        }

        async function fetchGrid(sort, target) {
            const q = `query($s:[MediaSort]){Page(perPage:12){media(type:ANIME,sort:$s){id idMal title{english romaji} coverImage{large} episodes}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{s:[sort]}})}).then(r=>r.json()).then(j=>render(j.data.Page.media, target));
        }

        function render(list, target, isGrid = false) {
            const wishes = currentUser?.wishlist || [];
            const badges = currentUser?.lastPlayed || {};
            document.getElementById(target).innerHTML = list.map(a => {
                if(!a) return '';
                const saved = wishes.some(w => w.id === a.id);
                const lastEp = badges[a.id];
                return `<div class="anime-card ${isGrid ? 'w-full' : ''}" onclick="window.scrollTo(0,0)">
                    <div class="total-ep-badge">${a.episodes || '?'} EPS</div>
                    ${lastEp ? `<div class="ep-badge">EP ${lastEp}</div>` : ''}
                    <i class="fa fa-heart heart-icon ${saved ? 'text-red-600' : 'text-zinc-500'}" onclick='toggleWish(event, ${JSON.stringify(a)})'></i>
                    <img src="${a.coverImage.large}" class="card-img">
                    <div class="p-2 text-[10px] font-black truncate text-zinc-400 uppercase">${a.title.english || a.title.romaji}</div>
                </div>`;
            }).join('');
        }

        // Feature: Search Integration
        function handleSearch(term) {
            if(term.length === 0) { showPage('home'); return; }
            showPage('filter');
            document.getElementById('filterTitle').innerText = "Search: " + term;
            const q = `query($s:String){Page(perPage:50){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{s:term}})}).then(r=>r.json()).then(j=>render(j.data.Page.media, "filterGrid", true));
        }

        // Feature: Genre Dropdown
        function genFilters() {
            const g = ["Action", "Adventure", "Comedy", "Drama", "Ecchi", "Fantasy", "Horror", "Mahou Shoujo", "Mecha", "Music", "Mystery", "Psychological", "Romance", "Sci-Fi", "Slice of Life", "Sports", "Supernatural", "Thriller"];
            document.getElementById('genreList').innerHTML = g.map(x => `<button onclick="fetchByFilter('${x}')" class="genre-btn">${x}</button>`).join('');
        }
        async function fetchByFilter(g) { showPage('filter'); document.getElementById('filterTitle').innerText = g; const q = `query($g:String){Page(perPage:50){media(genre:$g,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes}}}`; fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{g}})}).then(r=>r.json()).then(j=>render(j.data.Page.media, "filterGrid", true)); }

        function showPage(p) { 
            document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active-view')); 
            document.getElementById(`page-${p}`).classList.add('active-view'); 
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            window.scrollTo(0,0);
        }
        function toggleDropdown(id) { const d=document.getElementById(id); const s=d.classList.contains('show'); document.querySelectorAll('.dropdown-content').forEach(x=>x.classList.remove('show')); if(!s) d.classList.add('show'); }
        function toggleWish(e, a) { e.stopPropagation(); if(!currentUser) return openAuth(); let users = JSON.parse(localStorage.getItem('ymls_users')); let list = users[currentUser.name].wishlist || []; const idx = list.findIndex(x => x.id === a.id); if(idx === -1) list.unshift(a); else list.splice(idx,1); users[currentUser.name].wishlist = list; currentUser.wishlist = list; localStorage.setItem('ymls_users', JSON.stringify(users)); localStorage.setItem('ymls_active_user', JSON.stringify(currentUser)); loadHome(); if(document.getElementById('page-wishlist').classList.contains('active-view')) render(currentUser.wishlist, "wishlistGrid", true); }
    </script>
</body>
</html>
