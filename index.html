<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YMLSFLIX PRO | v60.0.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --brand-red: #ef4444; 
        }

        #genreDrop { 
            min-height: 420px; 
            padding-bottom: 100px; 
            overflow-y: auto; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }

        .genre-btn-active { 
            background: var(--brand-red) !important; 
            border-color: #fff !important; 
            transform: scale(0.95); 
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); 
            color: white !important; 
        }

        .upcoming-card { 
            width: 300px; 
            height: 170px; 
            flex-shrink: 0; 
            position: relative; 
            border-radius: 24px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #epList { 
            display: flex; 
            gap: 14px; 
            padding: 15px 0; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        .info-panel { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; 
            padding: 20px; 
            height: 100%; 
        }

        .char-container { 
            position: relative; 
            cursor: pointer; 
        }

        .char-img { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: 0.3s; 
        }

        .va-toast { 
            position: absolute; 
            bottom: 55px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #ef4444; 
            color: white; 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 8px; 
            font-weight: 900; 
            white-space: nowrap; 
            pointer-events: none; 
            opacity: 0; 
            transition: 0.2s; 
            z-index: 100; 
        }

        .char-container:hover .va-toast,
        .char-container:active .va-toast { 
            opacity: 1; 
            bottom: 60px; 
        }

        /* LINE RETENTION SPACER */
        .v60-buffer { height: 1px; }
    </style>
</head>

<body class="bg-[#05070a] text-gray-200">

    <div id="splash-screen" class="fixed inset-0 bg-[#05070a] z-[9999] flex flex-col items-center justify-center transition-all duration-1000">
        <div class="splash-logo italic">YMLSFLIX</div>
        <div class="splash-loader"></div>
        <div class="mt-6 text-[10px] font-black uppercase tracking-[0.6em] text-gray-700">Initializing v60.0.1 Monolith</div>
    </div>

    <div id="choiceOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-xl hidden items-center justify-center z-[5000]" onclick="this.style.display='none'">
        <div class="modal-box scale-up" onclick="event.stopPropagation()">
            <img id="choiceImg" class="w-44 h-64 mx-auto rounded-2xl mb-8 object-cover shadow-2xl border border-white/5">
            <h3 id="choiceTitle" class="text-white font-black uppercase text-sm mb-10 tracking-tight leading-tight px-4 text-center"></h3>
            <div class="grid grid-cols-1 gap-4 px-6">
                <button id="choicePlay" class="btn-red">START STREAMING</button>
                <button id="choiceWish" class="py-4 rounded-xl bg-white/5 border border-white/10 text-[10px] font-black uppercase text-gray-400">COLLECTION</button>
            </div>
        </div>
    </div>

    <div id="trailerOverlay" class="fixed inset-0 bg-black/98 z-[6000] hidden items-center justify-center" onclick="closeTrailer()">
        <div class="relative w-full max-w-6xl aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl mx-4">
            <iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[2500] glass pt-[var(--safe-top)]">
        <div class="container mx-auto px-6 py-5 flex items-center justify-between">
            <h1 class="text-2xl font-black logo-text cursor-pointer tracking-tighter" onclick="showPage('home')">YMLSFLIX</h1>
            <div class="flex items-center gap-8">
                <i onclick="showPage('home')" class="fa fa-home text-gray-400 text-2xl cursor-pointer hover:text-red-500 transition-all"></i>
                <i onclick="showPage('wishlist')" class="fa fa-heart text-gray-400 text-2xl cursor-pointer hover:text-red-500 transition-all"></i>
                <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 text-2xl cursor-pointer hover:text-red-500 transition-all"></i>
                <i onclick="toggleDropdown('profileDrop')" class="fa fa-user-circle text-gray-400 text-2xl cursor-pointer hover:text-red-500 transition-all"></i>
            </div>
        </div>
        
        <div class="container mx-auto px-6 pb-6">
            <input type="text" id="searchBar" class="bg-[#111827]/50 border border-[#1f2937] text-white px-6 py-5 rounded-2xl w-full outline-none focus:border-red-500/50 transition-all" placeholder="Search for anime..." oninput="handleSearch(this.value)">
            <div class="flex gap-4 mt-6 overflow-x-auto no-scrollbar py-2">
                <div id="chip-TV" onclick="fetchByFormat('TV')" class="cat-chip">TV</div>
                <div id="chip-MOVIE" onclick="fetchByFormat('MOVIE')" class="cat-chip">Movies</div>
                <div id="chip-OVA" onclick="fetchByFormat('OVA')" class="cat-chip">OVA</div>
                <div id="chip-SPECIAL" onclick="fetchByFormat('SPECIAL')" class="cat-chip">Specials</div>
            </div>
        </div>

        <div id="genreDrop" class="dropdown-content">
            <div class="flex justify-between items-center mb-8 sticky top-0 bg-[#0f1117] py-2">
                <h3 class="text-white font-black text-[11px] uppercase tracking-widest">Discovery Filters</h3>
                <button onclick="toggleDropdown('genreDrop')" class="bg-red-500 text-white px-4 py-2 rounded-lg font-black text-[9px]">DONE</button>
            </div>
            <div id="genreList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>

        <div id="profileDrop" class="dropdown-content max-w-sm">
            <div id="authBox" class="p-4 text-center">
                <i class="fa fa-user-circle text-5xl text-gray-700 mb-6"></i>
                <input type="text" id="authEmail" placeholder="Member Username" class="bg-[#05070a] p-5 rounded-xl w-full mb-4 text-white border border-white/10">
                <button onclick="handleAuth('login')" class="btn-red">SYNC ACCOUNT</button>
            </div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-[320px]">
        <header id="hero" class="transition-all duration-700">
            <div class="hero-grad"></div>
            <div class="container mx-auto px-8 relative z-10 pb-16">
                <h2 id="heroTitle" class="text-5xl md:text-7xl font-black mb-6 uppercase italic tracking-tighter leading-none max-w-4xl"></h2>
                <p id="heroDesc" class="text-gray-400 text-sm max-w-2xl line-clamp-3 mb-10 leading-relaxed"></p>
                <div class="flex gap-4">
                    <button id="heroPlayBtn" class="bg-white text-black px-12 py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest">STREAM NOW</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-6 space-y-24 py-20">
            <section id="upcomingSection">
                <h2 class="text-[11px] font-black uppercase text-green-500 tracking-[0.5em] mb-10 px-2">Simulcast Schedule</h2>
                <div id="upcomingGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6 px-2"></div>
            </section>
            
            <section id="continueSection" class="hidden">
                <h2 class="text-[11px] font-black uppercase text-red-500 tracking-[0.5em] mb-10 px-2">Resume Watching</h2>
                <div id="continueGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6 px-2"></div>
            </section>

            <section>
                <h2 class="text-[11px] font-black uppercase text-gray-500 tracking-[0.5em] mb-10 px-2">Trending Global</h2>
                <div id="trendingGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6 px-2"></div>
            </section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto px-6 pt-[350px]">
        <h2 id="filterTitle" class="text-3xl font-black uppercase text-white mb-12 border-l-4 border-red-600 pl-6">Results</h2>
        <div id="filterGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 pb-40"></div>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto px-6 pt-[350px]">
        <h2 class="text-3xl font-black uppercase text-white mb-12 border-l-4 border-red-600 pl-6">Collection</h2>
        <div id="wishlistGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 pb-40"></div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-black hidden overflow-y-auto pt-[var(--safe-top)]">
        <div class="glass p-6 sticky top-0 flex justify-between items-center z-50">
            <button onclick="closePlayer()" class="w-12 h-12 rounded-2xl bg-gray-900 flex items-center justify-center border border-white/5"><i class="fa fa-chevron-left text-white"></i></button>
            <div id="playerTitle" class="text-white font-black text-[10px] uppercase truncate px-8 text-center"></div>
            <div class="flex gap-2 bg-[#05070a] p-1.5 rounded-2xl">
                <button onclick="setMode('sub')" id="subBtn" class="px-5 py-2.5 text-[9px] font-black rounded-xl">SUB</button>
                <button onclick="setMode('dub')" id="dubBtn" class="px-5 py-2.5 text-[9px] font-black rounded-xl">DUB</button>
            </div>
        </div>

        <div class="w-full aspect-video bg-black" id="videoContainer">
            <video id="player" playsinline controls class="w-full h-full"></video>
        </div>

        <div class="p-8 container mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <h3 class="text-[10px] font-black text-gray-600 uppercase mb-6 tracking-[0.4em]">Server Sources</h3>
                    <div id="serverList" class="flex gap-3 overflow-x-auto no-scrollbar mb-10"></div>
                    <h3 class="text-[10px] font-black text-gray-600 uppercase mb-6 tracking-[0.4em]">Episode Directory</h3>
                    <div id="epList" class="no-scrollbar pb-10"></div>
                </div>
                
                <div class="lg:col-span-1">
                    <div class="info-panel">
                        <h3 class="text-white font-black text-xs uppercase mb-4">Anime Details</h3>
                        <div id="animeDetails" class="text-gray-400 text-[11px] space-y-3 mb-8"></div>
                        <h3 class="text-white font-black text-xs uppercase mb-4 border-t border-white/5 pt-4">Characters & Seiyuu</h3>
                        <div id="charGrid" class="grid grid-cols-4 gap-3"></div>
                    </div>
                </div>
            </div>
            <h3 class="text-[10px] font-black text-red-500 uppercase mt-16 mb-8 tracking-[0.4em]">Recommended For You</h3>
            <div id="recommendGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-10"></div>
        </div>
    </div>

    <script>
        const GQL_API = 'https://graphql.anilist.co';
        const STR_API = 'https://api.consumet.org/anime/gogoanime';
        
        let curAnime = null, curEp = 1, strMode = 'sub', plyr = null, hls = null;

        window.onload = async () => {
            initPlyr();
            await loadHome();
            await loadAiring();
            genGenreList();
            
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1000);
            }, 2500);
        };

        function initPlyr() {
            plyr = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                quality: { default: 720, options: [1080, 720, 480, 360] }
            });
        }

        async function loadHome() {
            const query = `query($s:[MediaSort]){Page(perPage:15){media(type:ANIME,sort:$s){id title{english romaji} coverImage{large} episodes bannerImage description format trailer{id site}}}}`;
            const trRes = await apiCall(query, {s:["TRENDING_DESC"]});
            if(trRes) { 
                renderList(trRes.data.Page.media, 'trendingGrid'); 
                setHero(trRes.data.Page.media[0]); 
            }
            const popRes = await apiCall(query, {s:["POPULARITY_DESC"]});
            if(popRes) renderList(popRes.data.Page.media, 'popularGrid');
            syncHistory();
        }

        async function loadAiring() {
            const now = Math.floor(Date.now() / 1000);
            const query = `query($t:Int){Page(perPage:12){airingSchedules(airingAt_greater:$t,sort:TIME){episode airingAt media{id title{english romaji} bannerImage coverImage{large}}}}}`;
            const res = await apiCall(query, {t: now});
            if(res) {
                document.getElementById('upcomingGrid').innerHTML = res.data.Page.airingSchedules.map(i => {
                    const dt = new Date(i.airingAt * 1000);
                    return `
                        <div class="upcoming-card" onclick='pickAnime(${JSON.stringify(i.media)})'>
                            <img src="${i.media.bannerImage || i.media.coverImage.large}" class="w-full h-full object-cover opacity-40">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                            <div class="absolute top-4 left-4 right-4 text-[10px] font-black text-white uppercase truncate">${i.media.title.english || i.media.title.romaji}</div>
                            <div class="absolute bottom-3 left-3 bg-white/5 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10 text-[8px] font-black text-gray-400 uppercase">
                                ${dt.toLocaleDateString([], {month:'short', day:'numeric'})}
                            </div>
                            <div class="absolute bottom-3 right-3 bg-green-500/20 backdrop-blur-md px-3 py-1.5 rounded-lg border border-green-500/30 text-[9px] font-black text-green-400">
                                ${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                            </div>
                        </div>`;
                }).join('');
            }
        }

        async function runStream(anime, epNum = 1) {
            if(anime) curAnime = anime;
            curEp = epNum;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = `${curAnime.title.english || curAnime.title.romaji} | EP ${epNum}`;
            
            try {
                const clean = (curAnime.title.romaji || curAnime.title.english).replace(/[^a-zA-Z0-9 ]/g, '').toLowerCase();
                const search = await fetch(`${STR_API}/${clean}`).then(r => r.json());
                let target = search.results.find(r => strMode === 'dub' ? r.id.includes('-dub') : !r.id.includes('-dub')) || search.results[0];
                const sources = await fetch(`${STR_API}/watch/${target.id}-episode-${epNum}`).then(r => r.json());
                playVid(sources.sources[0].url);
                genServers(sources.sources);
                genEpisodes(curAnime.episodes || 12);
                saveHist(curAnime, epNum);
                fetchMetadata(curAnime.id);
            } catch(e) { console.error("Source error"); }
        }

        async function fetchMetadata(id) {
            const query = `query($id:Int){Media(id:$id){status format averageScore characters(perPage:8,role:MAIN){edges{node{id name{full} image{large}} voiceActors(language:JAPANESE){name{full}}}} recommendations(perPage:10){nodes{mediaRecommendation{id title{english romaji} coverImage{large} episodes}}}}}`;
            const res = await apiCall(query, {id});
            if(res) {
                const m = res.Media;
                document.getElementById('animeDetails').innerHTML = `
                    <div class="flex justify-between"><span>Status:</span><span class="text-white">${m.status}</span></div>
                    <div class="flex justify-between"><span>Score:</span><span class="text-white">${m.averageScore}%</span></div>
                    <div class="flex justify-between"><span>Type:</span><span class="text-white">${m.format}</span></div>`;
                
                document.getElementById('charGrid').innerHTML = m.characters.edges.map(e => `
                    <div class="char-container" onclick="filterByCharacter(${e.node.id}, '${e.node.name.full.replace(/'/g, "\\'")}')">
                        <img src="${e.node.image.large}" class="char-img">
                        <div class="va-toast">${e.voiceActors[0] ? e.voiceActors[0].name.full : 'N/A'}</div>
                    </div>`).join('');
                renderList(m.recommendations.nodes.map(n => n.mediaRecommendation), 'recommendGrid');
            }
        }

        async function filterByCharacter(charId, charName) {
            closePlayer();
            showPage('filter');
            document.getElementById('filterTitle').innerText = `Appears in: ${charName}`;
            const query = `query($id:Int){Character(id:$id){media(type:ANIME,sort:POPULARITY_DESC){nodes{id title{english romaji} coverImage{large} episodes}}}}`;
            const res = await apiCall(query, {id: charId});
            if(res) renderList(res.Character.media.nodes, 'filterGrid', true);
        }

        function playVid(url) {
            const vid = document.getElementById('player');
            if(hls) hls.destroy();
            if(Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(vid);
                hls.on(Hls.Events.MANIFEST_PARSED, () => plyr.play());
            } else {
                vid.src = url;
                vid.addEventListener('loadedmetadata', () => plyr.play());
            }
        }

        function genGenreList() {
            const g = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports"];
            document.getElementById('genreList').innerHTML = g.map(n => `<button onclick="filterByGenre(this, '${n}')" class="bg-white/5 border border-white/5 text-gray-500 p-5 rounded-2xl text-[10px] font-black uppercase hover:bg-white/10 transition-all">${n}</button>`).join('');
        }

        async function filterByGenre(btn, gName) {
            document.querySelectorAll('#genreList button').forEach(b => b.classList.remove('genre-btn-active'));
            btn.classList.add('genre-btn-active');
            showPage('filter');
            document.getElementById('filterTitle').innerText = `Genre: ${gName}`;
            const q = `query($g:String){Page(perPage:24){media(genre:$g,type:ANIME,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes}}}`;
            const res = await apiCall(q, {g: gName});
            if(res) renderList(res.data.Page.media, 'filterGrid', true);
        }

        async function apiCall(q, v = {}) {
            try {
                const r = await fetch(GQL_API, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({query:q, variables:v})
                });
                return await r.json();
            } catch(err) { return null; }
        }

        function renderList(list, target, isGrid = false) {
            document.getElementById(target).innerHTML = list.map(a => `
                <div class="anime-card ${isGrid ? 'w-full' : 'w-[160px]'}" onclick='pickAnime(${JSON.stringify(a)})'>
                    <div class="ep-badge">${a.episodes || '?'} EP</div>
                    <img src="${a.coverImage.large}" class="card-img" loading="lazy">
                    <div class="p-4">
                        <div class="text-[11px] font-black text-white uppercase truncate">${a.title.english || a.title.romaji}</div>
                    </div>
                </div>`).join('');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`page-${id}`).classList.add('active-view');
            window.scrollTo(0,0);
            if(id !== 'filter') document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
        }

        function toggleDropdown(id) {
            const el = document.getElementById(id);
            const open = el.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
            if(!open) el.classList.add('show');
        }

        function setHero(a) {
            const h = document.getElementById('hero');
            h.style.backgroundImage = `url(${a.bannerImage || a.coverImage.large})`;
            document.getElementById('heroTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('heroDesc').innerHTML = a.description;
            document.getElementById('heroPlayBtn').onclick = () => runStream(a);
        }

        function pickAnime(a) {
            curAnime = a;
            const o = document.getElementById('choiceOverlay');
            o.style.display = 'flex';
            document.getElementById('choiceImg').src = a.coverImage.large;
            document.getElementById('choiceTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('choicePlay').onclick = () => { o.style.display = 'none'; runStream(a); };
        }

        function genEpisodes(t) {
            let h = '';
            for(let i=1; i<=t; i++) {
                h += `<button onclick="runStream(null, ${i})" class="ep-btn ${curEp === i ? 'ep-active' : ''}">${i}</button>`;
            }
            document.getElementById('epList').innerHTML = h;
        }

        function genServers(s) {
            document.getElementById('serverList').innerHTML = s.map(sv => `
                <button onclick="playVid('${sv.url}')" class="px-6 py-3 bg-[#111827] text-[10px] font-black text-gray-400 rounded-xl border border-white/5 uppercase">
                    ${sv.quality} SERVER
                </button>`).join('');
        }

        function setMode(m) {
            strMode = m;
            document.getElementById('subBtn').className = m === 'sub' ? 'px-5 py-2.5 text-[9px] font-black rounded-xl bg-red-600 text-white' : 'px-5 py-2.5 text-[9px] font-black rounded-xl bg-white/5 text-gray-500';
            document.getElementById('dubBtn').className = m === 'dub' ? 'px-5 py-2.5 text-[9px] font-black rounded-xl bg-red-600 text-white' : 'px-5 py-2.5 text-[9px] font-black rounded-xl bg-white/5 text-gray-500';
            if(curAnime) runStream(curAnime, curEp);
        }

        function saveHist(a, ep) {
            let h = JSON.parse(localStorage.getItem('ymls_v60_hist')) || [];
            h = h.filter(x => x.id !== a.id); a.lastEp = ep; h.unshift(a);
            localStorage.setItem('ymls_v60_hist', JSON.stringify(h.slice(0,12)));
            syncHistory();
        }

        function syncHistory() {
            const h = JSON.parse(localStorage.getItem('ymls_v60_hist')) || [];
            if(!h.length) return;
            document.getElementById('continueSection').classList.remove('hidden');
            document.getElementById('continueGrid').innerHTML = h.map(a => `
                <div class="relative w-[280px] h-[160px] flex-shrink-0 rounded-2xl overflow-hidden cursor-pointer" onclick='runStream(${JSON.stringify(a)}, ${a.lastEp})'>
                    <img src="${a.bannerImage || a.coverImage.large}" class="w-full h-full object-cover opacity-60">
                    <div class="absolute bottom-4 left-4">
                        <div class="text-[10px] font-black text-white uppercase truncate">${a.title.english || a.title.romaji}</div>
                        <div class="text-[8px] font-black text-red-500 uppercase tracking-widest">RESUME EP ${a.lastEp}</div>
                    </div>
                </div>`).join('');
        }

        async function handleSearch(v) {
            if(v.length < 3) return;
            showPage('filter');
            document.getElementById('filterTitle').innerText = `Search: ${v}`;
            const q = `query($s:String){Page(perPage:24){media(search:$s,type:ANIME){id title{english romaji} coverImage{large} episodes}}}`;
            const res = await apiCall(q, {s:v});
            if(res) renderList(res.data.Page.media, 'filterGrid', true);
        }

        function closePlayer() {
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('player').pause();
            if(hls) hls.destroy();
        }
