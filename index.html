<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | Cinema Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid #1f2937; }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .anime-card { transition: 0.2s ease; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: #0f1117; }
        .anime-card:hover { transform: scale(1.04); z-index: 10; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .wish-btn { position: absolute; top: 8px; right: 8px; z-index: 20; background: rgba(0,0,0,0.7); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .is-saved { color: #ef4444 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* CINEMA MODE LOGIC */
        .controls-container { transition: opacity 0.4s ease, transform 0.4s ease; }
        .cinema-active { opacity: 0.05; pointer-events: none; transform: translateY(10px); }
        .cinema-btn { position: absolute; top: 10px; right: 10px; z-index: 100; background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 8px; font-weight: 900; text-transform: uppercase; border: 1px solid rgba(239, 68, 68, 0.3); }

        .srv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .srv-btn { padding: 10px; border-radius: 8px; font-size: 9px; font-weight: 900; text-transform: uppercase; border: 1px solid #1f2937; transition: 0.2s; background: #0f1117; color: #4b5563; }
        .srv-active { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass p-4">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl font-black tracking-tighter logo-text cursor-pointer" onclick="location.reload()">YmlsFlix</h1>
            <input type="text" id="searchBar" placeholder="Search..." class="flex-1 max-w-xs bg-gray-900 border border-gray-800 rounded-xl py-2 px-4 outline-none text-sm focus:border-red-500">
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <section id="wishlistSection" class="mb-10 hidden">
            <h2 class="text-[10px] font-black mb-4 uppercase tracking-[0.3em] text-red-500">My Watchlist</h2>
            <div id="wishlistGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
        </section>

        <h2 id="gridTitle" class="text-xs font-black mb-6 uppercase tracking-[0.3em] text-gray-700">Trending Now</h2>
        <div id="mainGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="playerView" class="fixed inset-0 z-[700] bg-[#05070a] hidden overflow-y-auto no-scrollbar">
        <div class="p-3 flex justify-between items-center glass">
            <button onclick="closePlayer()" class="text-xl px-2"><i class="fa fa-chevron-left"></i></button>
            <h3 id="playerTitle" class="font-black truncate uppercase text-[10px] px-4 flex-1 text-center tracking-widest text-gray-500"></h3>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative" onclick="toggleCinema()">
            <button id="cinemaStatus" class="cinema-btn">Cinema Mode On</button>
            <iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div id="playerControls" class="p-4 container mx-auto controls-container">
            <div class="flex gap-2 mb-6">
                <button onclick="toggleDub()" id="subDubToggle" class="flex-1 py-4 bg-gray-900 border border-gray-800 rounded-xl text-[10px] font-black uppercase text-gray-300">SUB</button>
                <button onclick="nextEpisode()" class="flex-1 py-4 bg-red-600 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-900/40">Next Episode</button>
            </div>

            <h4 class="text-[8px] font-black text-gray-600 uppercase mb-3 ml-1">Select Server</h4>
            <div class="srv-grid">
                <button onclick="changeServer('9anime', this)" class="srv-btn srv-active">9Anime</button>
                <button onclick="changeServer('winanime', this)" class="srv-btn">WinPro</button>
                <button onclick="changeServer('wiianime', this)" class="srv-btn">WiiFast</button>
                <button onclick="changeServer('anilab', this)" class="srv-btn">AniLab</button>
                <button onclick="changeServer('vidlink', this)" class="srv-btn">VidLink</button>
            </div>

            <div id="epList" class="flex gap-2 overflow-x-auto no-scrollbar py-3 border-y border-gray-800/50 mb-10"></div>
        </div>
    </div>

    <script>
        const ANILIST = 'https://graphql.anilist.co';
        let currentAnime = null, isDub = false, currentEp = 1, currentServer = '9anime', cinemaMode = false;

        window.onload = () => { fetchList(); renderWishlist(); };

        function toggleCinema() {
            cinemaMode = !cinemaMode;
            const controls = document.getElementById('playerControls');
            const status = document.getElementById('cinemaStatus');
            if (cinemaMode) {
                controls.classList.add('cinema-active');
                status.innerText = "Cinema Mode On";
            } else {
                controls.classList.remove('cinema-active');
                status.innerText = "Tap Video for Cinema";
            }
        }

        function changeServer(srv, btn) {
            currentServer = srv;
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('srv-active'));
            btn.classList.add('srv-active');
            loadVideo();
        }

        function loadVideo() {
            const mode = isDub ? 'dub' : 'sub';
            let url = "";
            switch(currentServer) {
                case '9anime': url = `https://9anime.to/embed/${currentAnime.idMal || currentAnime.id}?ep=${currentEp}`; break;
                case 'winanime': url = `https://anime-dex-pro.vercel.app/embed/${currentAnime.id}/${currentEp}`; break;
                case 'wiianime': url = `https://anime-dex-five.vercel.app/embed/${currentAnime.id}/${currentEp}`; break;
                case 'anilab': url = `https://api.amvstr.me/api/v2/stream/${currentAnime.id}/${currentEp}`; break;
                case 'vidlink': url = `https://vidlink.pro/anime/${currentAnime.id}/${currentEp}/${mode}?primaryColor=ef4444`; break;
            }
            document.getElementById('videoFrame').src = url;
        }

        async function fetchList(vars = {}) {
            const query = `query($s:[MediaSort],$search:String){Page(perPage:24){media(type:ANIME,sort:$s,search:$search){id idMal title{english romaji} coverImage{large} episodes}}}`;
            try {
                const res = await fetch(ANILIST, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ query, variables: { s: ["TRENDING_DESC"], search: vars.search || undefined }})});
                const json = await res.json();
                document.getElementById('mainGrid').innerHTML = json.data.Page.media.map(a => `
                    <div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'>
                        <button class="wish-btn" onclick='toggleWish(event, ${JSON.stringify(a)})'><i class="fa fa-heart text-gray-700"></i></button>
                        <img src="${a.coverImage.large}" class="card-img">
                        <div class="p-2"><h4 class="text-[9px] font-black uppercase truncate text-gray-200">${a.title.english || a.title.romaji}</h4></div>
                    </div>`).join('');
            } catch (e) {}
        }

        function openPlayer(anime, ep = 1) {
            currentAnime = anime; currentEp = parseInt(ep);
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = anime.title.english || anime.title.romaji;
            loadVideo();
            renderEpisodes(anime.episodes || 24);
            // Auto-enable Cinema Mode on start
            cinemaMode = false; toggleCinema();
        }

        function closePlayer() { 
            document.getElementById('playerView').classList.add('hidden'); 
            document.getElementById('videoFrame').src = ""; 
            cinemaMode = true; toggleCinema(); // Reset controls
        }

        function renderEpisodes(total) {
            document.getElementById('epList').innerHTML = Array.from({length: total}, (_, i) => i + 1).map(n => `
                <button onclick="setEp(${n})" class="flex-shrink-0 min-w-[45px] ${n==currentEp?'bg-red-600 text-white':'bg-gray-900 text-gray-500'} px-3 py-2 rounded-lg font-black text-[10px]">${n}</button>
            `).join('');
        }

        function setEp(n) { currentEp = n; renderEpisodes(currentAnime.episodes || 24); loadVideo(); }
        function nextEpisode() { setEp(currentEp + 1); }
        function toggleDub() { isDub = !isDub; loadVideo(); }

        function toggleWish(e, a) {
            e.stopPropagation();
            let list = JSON.parse(localStorage.getItem('ymls_wish')) || [];
            list.unshift(a);
            localStorage.setItem('ymls_wish', JSON.stringify(list.slice(0,20)));
            renderWishlist();
        }

        function renderWishlist() {
            const list = JSON.parse(localStorage.getItem('ymls_wish')) || [];
            if(list.length === 0) return;
            document.getElementById('wishlistSection').classList.remove('hidden');
            document.getElementById('wishlistGrid').innerHTML = list.map(a => `
                <div class="flex-shrink-0 w-28 cursor-pointer" onclick='openPlayer(${JSON.stringify(a)})'>
                    <img src="${a.coverImage.large}" class="w-28 h-40 object-cover rounded-xl shadow-lg">
                    <h4 class="mt-1 text-[8px] font-black uppercase truncate text-gray-500">${a.title.english || a.title.romaji}</h4>
                </div>`).join('');
        }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            if(e.target.value.length > 2) fetchList({ search: e.target.value });
        });
    </script>
</body>
</html>
