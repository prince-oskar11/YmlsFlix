<!DOCTYPE html>
<html lang="en" style="background: #05070a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | v57.0 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.96); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* SEARCH & NAV */
        .search-pin { background: #111827; border: 1px solid #1f2937; border-radius: 14px; padding: 12px 18px; width: 100%; color: white; outline: none; }

        /* GENRE GRID (MATCHING SCREENSHOT 1) */
        .genre-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .genre-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px 5px; border-radius: 6px; font-size: 12px; font-weight: 700; text-align: center; }

        /* HOME CARDS & BADGES */
        .home-slider { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .home-slider::-webkit-scrollbar { display: none; }
        .anime-card { width: 140px; flex-shrink: 0; position: relative; scroll-snap-align: start; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; }
        .ep-badge { position: absolute; bottom: 42px; left: 8px; background: #ef4444; color: white; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 10; }
        .heart-icon { position: absolute; top: 8px; right: 8px; font-size: 18px; color: rgba(255,255,255,0.5); z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .heart-active { color: #ef4444; }

        /* HERO SPOTLIGHT */
        #heroSection { height: 65vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; position: relative; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 10%, transparent 100%); }

        /* EPISODE LIST (MATCHING SCREENSHOT 2) */
        .ep-tab-btn { background: #10b981; color: white; padding: 10px 25px; border-radius: 10px; font-weight: 800; font-size: 13px; }
        .ep-container { display: flex; flex-direction: column; gap: 10px; }
        .ep-row { background: #14161b; border-radius: 12px; padding: 18px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; }
        .ep-row.active { border-left-color: #10b981; background: #1a1d24; }
        .ep-num { color: #4b5563; font-weight: 800; font-size: 14px; margin-right: 15px; }
        .ep-title { color: #d1d5db; font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ep-rating { color: #fbbf24; font-weight: 800; font-size: 12px; }

        .page-view { display: none; padding-bottom: 50px; }
        .active-view { display: block; }
        .dropdown { display: none; position: fixed; top: 85px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 450px; background: #0f1117; border: 1px solid #1f2937; border-radius: 20px; z-index: 5000; padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,1); }
        .show { display: block !important; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[4000] glass p-4">
        <div class="container mx-auto">
            <div class="flex items-center justify-between mb-4">
                <h1 onclick="showPage('home')" class="text-2xl font-black text-[#10b981] cursor-pointer">YMLS</h1>
                <div class="flex items-center gap-6 text-xl text-gray-400">
                    <i onclick="toggleDrop('genreDrop')" class="fa fa-bars cursor-pointer"></i>
                    <i onclick="showPage('wishlist')" class="fa fa-heart cursor-pointer"></i>
                    <i onclick="toggleDrop('userDrop')" class="fa fa-user-circle cursor-pointer"></i>
                </div>
            </div>
            <input type="text" id="mainSearch" placeholder="Search anime..." class="search-pin" oninput="handleSearch(this.value)">
        </div>

        <div id="genreDrop" class="dropdown">
            <h3 class="text-xs font-black uppercase text-gray-500 mb-4 tracking-widest">Select Genre</h3>
            <div id="genreContainer" class="genre-grid max-h-[60vh] overflow-y-auto"></div>
        </div>

        <div id="userDrop" class="dropdown">
            <div id="authContent">
                <input type="text" id="loginInput" placeholder="Enter Username" class="search-pin mb-3">
                <button onclick="login()" class="w-full bg-[#10b981] py-4 rounded-xl font-black uppercase text-xs">Login / Create Profile</button>
            </div>
            <div id="profileContent" class="hidden text-center">
                <h4 id="helloUser" class="font-black mb-4"></h4>
                <button onclick="clearHistory()" class="w-full border border-red-900 text-red-500 py-3 rounded-lg text-[10px] font-black uppercase mb-2">Clear History & Badges</button>
                <button onclick="logout()" class="w-full bg-gray-800 py-3 rounded-lg text-[10px] font-black uppercase">Logout</button>
            </div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-32">
        <div id="heroSection">
            <div class="hero-overlay"></div>
            <div class="container mx-auto px-6 relative z-10 pb-10">
                <h2 id="heroTitle" class="text-4xl font-black mb-2"></h2>
                <p id="heroDesc" class="text-gray-400 text-xs mb-6 line-clamp-2 max-w-md"></p>
                <button id="heroPlay" class="bg-[#10b981] text-white px-10 py-3 rounded-full font-black text-xs uppercase">Watch Now</button>
            </div>
        </div>
        
        <div class="container mx-auto px-4 mt-6">
            <section id="row-history" class="mb-8 hidden"><h3 class="text-[10px] font-black uppercase text-[#10b981] mb-3 tracking-widest">Continue Watching</h3><div id="grid-history" class="home-slider"></div></section>
            <section class="mb-8"><h3 class="text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest">Trending</h3><div id="grid-trending" class="home-slider"></div></section>
            <section class="mb-8"><h3 class="text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest">Upcoming</h3><div id="grid-upcoming" class="home-slider"></div></section>
            <section class="mb-8"><h3 class="text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest">Airing Now</h3><div id="grid-airing" class="home-slider"></div></section>
            <section class="mb-8"><h3 class="text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest">Popular</h3><div id="grid-popular" class="home-slider"></div></section>
            <section class="mb-8"><h3 class="text-[10px] font-black uppercase text-gray-500 mb-3 tracking-widest">Top Rated</h3><div id="grid-rated" class="home-slider"></div></section>
        </div>
    </div>

    <div id="page-detail" class="page-view pt-36">
        <div class="container mx-auto px-6">
            <div class="flex gap-4 mb-8">
                <button class="ep-tab-btn">Episodes</button>
                <button class="text-gray-500 font-bold">Characters</button>
                <button class="text-gray-500 font-bold">Info</button>
            </div>
            <div id="epList" class="ep-container"></div>
        </div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[6000] bg-black hidden">
        <div class="p-4 flex justify-between glass">
            <i onclick="closePlayer()" class="fa fa-chevron-left text-xl"></i>
            <span id="pTitle" class="text-[10px] font-black uppercase pt-1"></span>
            <i></i>
        </div>
        <iframe id="videoFrame" class="w-full aspect-video" allowfullscreen></iframe>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        let user = JSON.parse(localStorage.getItem('yml_user')) || null;

        window.onload = () => {
            initAuth();
            genGenres();
            fetchHome();
        };

        function initAuth() {
            if(user) {
                document.getElementById('authContent').classList.add('hidden');
                document.getElementById('profileContent').classList.remove('hidden');
                document.getElementById('helloUser').innerText = `Profile: ${user.name}`;
            }
        }

        function login() {
            const name = document.getElementById('loginInput').value;
            if(!name) return;
            let users = JSON.parse(localStorage.getItem('yml_all')) || {};
            if(!users[name]) users[name] = { name, history: {}, wishlist: [] };
            localStorage.setItem('yml_user', JSON.stringify(users[name]));
            localStorage.setItem('yml_all', JSON.stringify(users));
            location.reload();
        }

        function logout() { localStorage.removeItem('yml_user'); location.reload(); }

        async function fetchHome() {
            const q = `query($s:MediaSort,$st:MediaStatus){Page(perPage:12){media(type:ANIME,sort:[$s],status:$st){id idMal title{english romaji} coverImage{large} bannerImage description episodes averageScore}}}`;
            
            // Hero
            const hR = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{s:"TRENDING_DESC"}})});
            const hJ = await hR.json();
            const top = hJ.data.Page.media[0];
            document.getElementById('heroSection').style.backgroundImage = `url(${top.bannerImage})`;
            document.getElementById('heroTitle').innerText = top.title.english || top.title.romaji;
            document.getElementById('heroDesc').innerHTML = top.description;
            document.getElementById('heroPlay').onclick = () => openDetail(top);

            render(hJ.data.Page.media, 'grid-trending');
            
            const upR = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{st:"NOT_YET_RELEASED",s:"POPULARITY_DESC"}})});
            const upJ = await upR.json(); render(upJ.data.Page.media, 'grid-upcoming');

            const popR = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{s:"POPULARITY_DESC"}})});
            const popJ = await popR.json(); render(popJ.data.Page.media, 'grid-popular');

            const rateR = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{s:"SCORE_DESC"}})});
            const rateJ = await rateR.json(); render(rateJ.data.Page.media, 'grid-rated');

            const hist = JSON.parse(localStorage.getItem('yml_hist_list')) || [];
            if(hist.length) { document.getElementById('row-history').classList.remove('hidden'); render(hist, 'grid-history'); }
        }

        function render(list, target) {
            const badges = user?.history || {};
            document.getElementById(target).innerHTML = list.map(a => `
                <div class="anime-card" onclick='openDetail(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
                    ${badges[a.id] ? `<div class="ep-badge">EP ${badges[a.id]}</div>` : ''}
                    <i class="fa fa-heart heart-icon"></i>
                    <img src="${a.coverImage.large}" class="card-img">
                    <p class="text-[9px] font-black uppercase mt-2 truncate text-gray-500">${a.title.english || a.title.romaji}</p>
                </div>
            `).join('');
        }

        function openDetail(a) {
            showPage('detail');
            const list = document.getElementById('epList');
            list.innerHTML = '';
            for(let i=1; i<=(a.episodes||12); i++) {
                const row = document.createElement('div');
                row.className = `ep-row ${user?.history[a.id] == i ? 'active' : ''}`;
                row.innerHTML = `
                    <span class="ep-num">#${i}</span>
                    <span class="ep-title">Episode ${i} Title...</span>
                    <span class="ep-rating"><i class="fa fa-star"></i> ${(a.averageScore/20 + (i/100)).toFixed(2)}</span>
                `;
                row.onclick = () => play(a, i);
                list.appendChild(row);
            }
        }

        function play(a, ep) {
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('pTitle').innerText = `${a.title.romaji} - E${ep}`;
            document.getElementById('videoFrame').src = `https://win-anime.vercel.app/embed/${a.idMal || a.id}/${ep}`;
            
            if(user) {
                let all = JSON.parse(localStorage.getItem('yml_all'));
                all[user.name].history[a.id] = ep;
                localStorage.setItem('yml_all', JSON.stringify(all));
                user.history[a.id] = ep;
                localStorage.setItem('yml_user', JSON.stringify(user));
                
                let hL = JSON.parse(localStorage.getItem('yml_hist_list')) || [];
                hL = hL.filter(x => x.id !== a.id); hL.unshift(a);
                localStorage.setItem('yml_hist_list', JSON.stringify(hL.slice(0,12)));
            }
        }

        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); document.getElementById('videoFrame').src = ""; }
        function showPage(p) { document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active-view')); document.getElementById(`page-${p}`).classList.add('active-view'); window.scrollTo(0,0); }
        function toggleDrop(id) { document.getElementById(id).classList.toggle('show'); }
        
        function genGenres() {
            const gs = ["Action", "Adventure", "Cars", "Comedy", "Dementia", "Demons", "Drama", "Ecchi", "Fantasy", "Game", "Harem", "Historical", "Horror", "Isekai", "Josei", "Kids", "Magic", "Martial Arts", "Mecha", "Military", "Music", "Mystery", "Parody", "Police", "Psychological", "Romance", "Samurai", "School", "Sci-Fi", "Seinen", "Shoujo", "Shoujo Ai", "Shounen", "Shounen Ai", "Slice of Life", "Space", "Sports", "Super Power", "Supernatural", "Thriller", "Vampire"];
            document.getElementById('genreContainer').innerHTML = gs.map(g => `<button class="genre-btn">${g}</button>`).join('');
        }
    </script>
</body>
</html>
