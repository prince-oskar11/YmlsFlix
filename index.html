<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | Stream Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid #1f2937; }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .anime-card { transition: 0.2s ease; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: #0f1117; }
        .anime-card:hover { transform: scale(1.04); z-index: 10; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .genre-tag { font-size: 7px; font-weight: 900; text-transform: uppercase; background: #111827; padding: 3px 8px; border-radius: 4px; color: #94a3b8; border: 1px solid #1f2937; }
        .srv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .srv-btn { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid #1f2937; transition: 0.2s; background: #0f1117; color: #4b5563; }
        .srv-active { background: #ef444415 !important; border-color: #ef4444 !important; color: #ef4444 !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass p-4">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl font-black tracking-tighter logo-text cursor-pointer" onclick="location.reload()">YmlsFlix</h1>
            <input type="text" id="searchBar" placeholder="Search..." class="flex-1 max-w-xs bg-gray-900 border border-gray-800 rounded-xl py-2 px-4 outline-none text-sm focus:border-red-500">
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <h2 id="gridTitle" class="text-xs font-black mb-6 uppercase tracking-[0.3em] text-gray-700">Trending Now</h2>
        <div id="mainGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="playerView" class="fixed inset-0 z-[700] bg-[#05070a] hidden overflow-y-auto no-scrollbar">
        <div class="p-3 flex justify-between items-center glass">
            <button onclick="closePlayer()" class="text-xl px-2"><i class="fa fa-chevron-left"></i></button>
            <div class="flex flex-col items-center flex-1 truncate px-4">
                <h3 id="playerTitle" class="font-black truncate uppercase text-[10px] tracking-widest text-gray-400 w-full text-center"></h3>
                <div id="genreContainer" class="flex gap-1 mt-1"></div>
            </div>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative">
            <iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="p-4 container mx-auto">
            <div class="flex gap-2 mb-6">
                <button onclick="toggleDub()" id="subDubToggle" class="flex-1 py-4 bg-gray-900 border border-gray-800 rounded-xl text-[10px] font-black uppercase text-gray-300">SUB</button>
                <button onclick="nextEpisode()" class="flex-1 py-4 bg-red-600 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-900/40">Next Episode</button>
            </div>

            <h4 class="text-[8px] font-black text-gray-600 uppercase mb-3 ml-1">Select Server (Try different ones if error)</h4>
            <div class="srv-grid mb-8">
                <button onclick="changeServer('winanime', this)" class="srv-btn srv-active">WinAnime</button>
                <button onclick="changeServer('wiianime', this)" class="srv-btn">WiiAnime</button>
                <button onclick="changeServer('anilab', this)" class="srv-btn">AniLab</button>
                <button onclick="changeServer('9anime', this)" class="srv-btn">9Anime</button>
            </div>

            <div id="epList" class="flex gap-2 overflow-x-auto no-scrollbar py-3 border-y border-gray-800/50 mb-10"></div>
        </div>
    </div>

    <script>
        const ANILIST = 'https://graphql.anilist.co';
        let currentAnime = null, isDub = false, currentEp = 1, currentServer = 'winanime';

        window.onload = () => { fetchList(); };

        function loadVideo() {
            if (!currentAnime) return;
            
            // Fix: Use MyAnimeList ID if available, otherwise AniList ID
            const animeId = currentAnime.idMal || currentAnime.id;
            const slug = currentAnime.title.romaji.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            let url = "";

            switch(currentServer) {
                // Optimized WinAnime Endpoint for 2026
                case 'winanime': 
                    url = `https://win-anime.vercel.app/embed/${animeId}/${currentEp}`; 
                    break;
                // Reliable WiiAnime Mirror
                case 'wiianime': 
                    url = `https://anime-dex-five.vercel.app/embed/${animeId}/${currentEp}`; 
                    break;
                // AniLab Backup
                case 'anilab': 
                    url = `https://api.amvstr.me/api/v2/stream/${currentAnime.id}/${currentEp}`; 
                    break;
                // 9Anime Fallback
                case '9anime': 
                    url = `https://vizcloud.online/embed/${slug}-episode-${currentEp}`;
                    break;
            }
            document.getElementById('videoFrame').src = url;
        }

        async function fetchList(vars = {}) {
            const query = `query($s:[MediaSort],$search:String){Page(perPage:24){media(type:ANIME,sort:$s,search:$search){id idMal title{english romaji} coverImage{large} episodes genres}}}`;
            try {
                const res = await fetch(ANILIST, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ query, variables: { s: ["TRENDING_DESC"], search: vars.search || undefined }})});
                const json = await res.json();
                document.getElementById('mainGrid').innerHTML = json.data.Page.media.map(a => `
                    <div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'>
                        <img src="${a.coverImage.large}" class="card-img">
                        <div class="p-2"><h4 class="text-[9px] font-black uppercase truncate text-gray-200">${a.title.english || a.title.romaji}</h4></div>
                    </div>`).join('');
            } catch (e) {}
        }

        function openPlayer(anime, ep = 1) {
            currentAnime = anime; currentEp = parseInt(ep);
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = anime.title.english || anime.title.romaji;
            document.getElementById('genreContainer').innerHTML = anime.genres.slice(0,3).map(g => `<span class="genre-tag">${g}</span>`).join('');
            loadVideo();
            renderEpisodes(anime.episodes || 12);
        }

        function renderEpisodes(total) {
            document.getElementById('epList').innerHTML = Array.from({length: total}, (_, i) => i + 1).map(n => `
                <button onclick="setEp(${n})" class="flex-shrink-0 min-w-[45px] ${n==currentEp?'bg-red-600 text-white':'bg-gray-900 text-gray-500'} px-3 py-2 rounded-lg font-black text-[10px]">${n}</button>
            `).join('');
        }

        function setEp(n) { currentEp = n; renderEpisodes(currentAnime.episodes || 12); loadVideo(); }
        function nextEpisode() { setEp(currentEp + 1); }
        function changeServer(srv, btn) {
            currentServer = srv;
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('srv-active'));
            btn.classList.add('srv-active');
            loadVideo();
        }
        function toggleDub() { isDub = !isDub; loadVideo(); }
        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); document.getElementById('videoFrame').src = ""; }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            if(e.target.value.length > 2) fetchList({ search: e.target.value });
        });
    </script>
</body>
</html>
