<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMLS - Premium Anime & Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        body { background: #080a0f; color: #e2e8f0; scroll-behavior: smooth; overflow-x: hidden; }
        .glass { background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1f2937; }
        .anime-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .anime-card:hover { transform: scale(1.05); z-index: 10; filter: brightness(1.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        iframe { background: #000; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .active-tab { border-bottom: 3px solid #6366f1; color: #6366f1; }
        .hero-gradient { background: linear-gradient(to top, #080a0f 10%, transparent 90%), linear-gradient(to right, #080a0f 20%, transparent 80%); }
    </style>
</head>
<body class="font-sans">

    <nav class="sticky top-0 z-50 glass px-4 py-3">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <h1 class="text-3xl font-black text-indigo-500 tracking-tighter cursor-pointer" onclick="location.reload()">YMLS</h1>
                <div class="hidden md:flex gap-4 text-sm font-bold">
                    <span class="cursor-pointer hover:text-indigo-400" onclick="loadContent('TRENDING')">Trending</span>
                    <span class="cursor-pointer hover:text-indigo-400" onclick="loadContent('POPULAR')">Popular</span>
                </div>
            </div>
            
            <div class="flex-1 max-w-md relative">
                <input type="text" id="searchBar" placeholder="Search anime..." 
                    class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                <i class="fa fa-search absolute left-4 top-3 text-gray-500"></i>
            </div>

            <div id="authSection" class="flex items-center gap-3">
                <button onclick="openAuthModal()" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-full font-bold text-xs transition">Sign In</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div id="continueWatching" class="mb-10 hidden">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa fa-history text-indigo-500"></i> Continue Watching</h2>
            <div id="continueGrid" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
        </div>

        <div id="homeSections">
            <h2 id="sectionTitle" class="text-2xl font-black mb-6 uppercase tracking-widest text-gray-400">Trending Now</h2>
            <div id="animeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

    <div id="playerView" class="fixed inset-0 z-[100] bg-[#080a0f] hidden flex flex-col">
        <div class="p-4 flex flex-wrap justify-between items-center glass gap-4">
            <div class="flex items-center gap-4">
                <button onclick="closePlayer()" class="text-2xl hover:text-indigo-400"><i class="fa fa-close"></i></button>
                <h2 id="viewingTitle" class="font-bold truncate max-w-[200px]"></h2>
            </div>
            <div class="flex items-center gap-3">
                <select id="serverSelect" onchange="switchServer(this.value)" class="bg-gray-800 border border-gray-700 text-[10px] rounded px-2 py-1 outline-none font-bold">
                    <option value="https://vidlink.pro/anime/">SERVER 1 (VIDLINK)</option>
                    <option value="https://vidsrc.me/anime/">SERVER 2 (VIDSRC)</option>
                    <option value="https://vidsrc.to/embed/anime/">SERVER 3 (VIDSRC.TO)</option>
                    <option value="https://vidsrc.xyz/embed/anime/">SERVER 4 (VIDSRC.XYZ)</option>
                    <option value="https://embed.su/embed/anime/">SERVER 5 (EMBED.SU)</option>
                    <option value="https://autoembed.to/anime/anilist/">SERVER 6 (AUTO)</option>
                    <option value="https://anicrush.to/embed/">SERVER 7 (ANICRUSH)</option>
                </select>
                <button id="subDubToggle" class="bg-indigo-600 px-3 py-1 rounded text-[10px] font-black">SUB</button>
            </div>
        </div>
        
        <div class="flex-1 flex items-center justify-center bg-black p-2">
            <iframe id="videoFrame" src="" class="w-full max-w-5xl aspect-video" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="p-4 bg-[#080a0f] border-t border-gray-800">
            <div id="episodeList" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 w-full max-w-md rounded-3xl p-8 relative">
            <button onclick="closeAuthModal()" class="absolute top-6 right-6 text-gray-500"><i class="fa fa-times"></i></button>
            <h2 class="text-3xl font-black mb-2 text-center">Welcome Back</h2>
            <p class="text-gray-500 text-center mb-8 text-sm">Sign in to sync your progress across devices.</p>
            
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-3 active:scale-95 transition">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-5"> Continue with Google
            </button>
            
            <div class="relative my-8">
                <hr class="border-gray-800">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gray-900 px-4 text-xs text-gray-500 font-bold">OR</span>
            </div>

            <input type="email" id="authEmail" placeholder="Email Address" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="authPass" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 mb-8 outline-none focus:ring-2 focus:ring-indigo-500">
            
            <button onclick="handleAuth()" class="w-full bg-indigo-600 font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition">Enter YMLS</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const ANILIST_API = 'https://graphql.anilist.co';
        
        // REPLACE THESE WITH YOUR FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let currentAnime = null;
        let isDub = false;
        let currentServer = "https://vidlink.pro/anime/";

        // --- CORE LOGIC ---
        window.onload = () => {
            loadContent('TRENDING');
            loadContinueWatching();
        };

        async function apiRequest(query, vars) {
            const res = await fetch(ANILIST_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: vars })
            });
            return res.json();
        }

        async function loadContent(sort) {
            document.getElementById('sectionTitle').innerText = sort + " ANIME";
            const query = `query($sort: [MediaSort]){ Page(perPage: 30){ media(type: ANIME, sort: $sort){ id idMal title { english romaji } coverImage { large } averageScore episodes } } }`;
            const data = await apiRequest(query, { sort: [sort + '_DESC'] });
            renderGrid(data.data.Page.media, 'animeGrid');
        }

        function renderGrid(list, targetId) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = list.map(a => `
                <div class="anime-card cursor-pointer group" onclick='openPlayer(${JSON.stringify(a)})'>
                    <div class="relative overflow-hidden rounded-xl aspect-[3/4] bg-gray-900 shadow-xl">
                        <img src="${a.coverImage.large}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-indigo-400">
                            ★ ${a.averageScore/10 || '7.5'}
                        </div>
                    </div>
                    <h3 class="mt-3 text-xs font-bold line-clamp-2 group-hover:text-indigo-400 transition uppercase tracking-tight">${a.title.english || a.title.romaji}</h3>
                </div>
            `).join('');
        }

        // --- STREAMING ENGINE (8+ APIs) ---
        function openPlayer(anime) {
            currentAnime = anime;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('viewingTitle').innerText = anime.title.english || anime.title.romaji;
            const lastEp = getWatchedProgress(anime.id);
            playEp(lastEp);
        }

        function playEp(num) {
            const mode = isDub ? 'dub' : 'sub';
            const id = currentAnime.id;
            const malId = currentAnime.idMal;
            let url = "";

            // Dynamic API Routing
            if (currentServer.includes("vidlink")) {
                url = `${currentServer}${id}/${num}/${mode}?primaryColor=6366f1`;
            } else if (currentServer.includes("vidsrc.me")) {
                url = `${currentServer}${malId || id}?episode=${num}`;
            } else if (currentServer.includes("vidsrc.to") || currentServer.includes("vidsrc.xyz")) {
                url = `${currentServer}${malId || id}/${num}`;
            } else if (currentServer.includes("embed.su")) {
                url = `${currentServer}${malId || id}/${num}`;
            } else if (currentServer.includes("autoembed")) {
                url = `${currentServer}${id}/${num}`;
            } else {
                url = `${currentServer}${id}/${num}`;
            }
            
            document.getElementById('videoFrame').src = url;
            
            // Save Progress
            let watched = JSON.parse(localStorage.getItem('ymls_watched')) || {};
            watched[id] = num;
            localStorage.setItem('ymls_watched', JSON.stringify(watched));
            
            renderEpisodes(currentAnime.episodes || 24, num);
            loadContinueWatching();
        }

        function renderEpisodes(total, active) {
            const list = document.getElementById('episodeList');
            list.innerHTML = '';
            for(let i=1; i<=total; i++) {
                const isActive = i == active;
                list.innerHTML += `<button onclick="playEp(${i})" class="flex-shrink-0 ${isActive?'bg-indigo-600 shadow-lg shadow-indigo-500/40':'bg-gray-800'} px-6 py-2 rounded-xl font-black text-xs transition active:scale-90">${i}</button>`;
            }
        }

        function switchServer(val) {
            currentServer = val;
            playEp(getWatchedProgress(currentAnime.id));
        }

        function getWatchedProgress(id) {
            return (JSON.parse(localStorage.getItem('ymls_watched')) || {})[id] || 1;
        }

        function closePlayer() {
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('videoFrame').src = "";
        }

        // --- AUTH SYSTEM ---
        function openAuthModal() { document.getElementById('authModal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('authModal').classList.add('hidden'); }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeAuthModal()).catch(e => alert(e.message));
        }

        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                closeAuthModal();
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    closeAuthModal();
                } else { alert(err.message); }
            }
        }

        auth.onAuthStateChanged(user => {
            const authSection = document.getElementById('authSection');
            if (user) {
                authSection.innerHTML = `
                    <div class="flex items-center gap-3 bg-gray-900 p-1 pr-4 rounded-full border border-gray-800">
                        <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.email}" class="w-8 h-8 rounded-full">
                        <span class="text-[10px] font-bold text-gray-400 cursor-pointer hover:text-red-500" onclick="auth.signOut()">LOGOUT</span>
                    </div>`;
            } else {
                authSection.innerHTML = `<button onclick="openAuthModal()" class="bg-indigo-600 px-5 py-2 rounded-full font-bold text-xs transition">Sign In</button>`;
            }
        });

        // --- SEARCH ---
        document.getElementById('searchBar').onkeypress = async (e) => {
            if(e.key === 'Enter') {
                document.getElementById('sectionTitle').innerText = "Search Results: " + e.target.value;
                const query = `query($s: String){ Page(perPage: 24){ media(search: $s, type: ANIME){ id idMal title { english romaji } coverImage { large } averageScore episodes } } }`;
                const data = await apiRequest(query, { s: e.target.value });
                renderGrid(data.data.Page.media, 'animeGrid');
            }
        };

        async function loadContinueWatching() {
            const watched = JSON.parse(localStorage.getItem('ymls_watched')) || {};
            const ids = Object.keys(watched).map(Number);
            if(ids.length === 0) return;
            document.getElementById('continueWatching').classList.remove('hidden');
            const query = `query($ids: [Int]){ Page { media(id_in: $ids){ id idMal title { english romaji } coverImage { large } episodes } } }`;
            const data = await apiRequest(query, { ids });
            document.getElementById('continueGrid').innerHTML = data.data.Page.media.map(a => `
                <div class="flex-shrink-0 w-28 cursor-pointer transition active:scale-95" onclick='openPlayer(${JSON.stringify(a)})'>
                    <div class="relative rounded-xl overflow-hidden aspect-[3/4] shadow-lg border border-gray-800">
                        <img src="${a.coverImage.large}" class="w-full h-full object-cover grayscale-[0.5] hover:grayscale-0 transition">
                        <div class="absolute bottom-0 w-full bg-indigo-600 text-[9px] text-center font-black py-1">EPISODE ${watched[a.id]}</div>
                    </div>
                </div>
            `).join('');
        }

        // Sub/Dub Toggle
        document.getElementById('subDubToggle').onclick = function() {
            isDub = !isDub;
            this.innerText = isDub ? 'DUB' : 'SUB';
            this.classList.toggle('bg-red-600');
            if(currentAnime) playEp(getWatchedProgress(currentAnime.id));
        };
    </script>
</body>
</html>
