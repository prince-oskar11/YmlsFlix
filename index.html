<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMLSFLIX PRO | v60.0 FULL</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --plyr-color-main: #ef4444; --bg: #05070a; --card: #0f1117; }
        
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; font-size: 13px; }
        
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Dropdowns */
        .dropdown-content { display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 20px; z-index: 3000; width: 95%; max-width: 450px; padding: 20px; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .show { display: block !important; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

        /* Anime Cards */
        .anime-card { transition: 0.3s; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: var(--card); width: 145px; flex-shrink: 0; border: 1px solid #1f2937; }
        .anime-card:hover { transform: translateY(-5px); border-color: #ef4444; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        /* Badges & Icons */
        .ep-badge { position: absolute; top: 6px; left: 6px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 10; }
        .wish-heart { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); border-radius: 50%; display: flex; items-center; justify-content: center; z-index: 20; color: white; transition: 0.3s; }
        .wish-heart:hover { transform: scale(1.2); color: #ef4444; }
        .wish-active { color: #ef4444 !important; background: white; }

        /* Overlays */
        #choiceOverlay, #confirmOverlay, #trailerOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #0f1117; border: 1px solid #1f2937; padding: 30px; border-radius: 28px; max-width: 340px; width: 90%; text-align: center; }

        /* Small Chips */
        .cat-chip { background: #111827; border: 1px solid #1f2937; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #94a3b8; white-space: nowrap; }
        .cat-active { background: #ef4444 !important; color: white !important; }
        .genre-btn { background: #1a1c23; border: 1px solid #2d2d2d; color: #e2e8f0; padding: 10px; border-radius: 10px; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .genre-btn:hover { background: #ef4444; border-color: white; }

        #hero { height: 55vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 60px; position: relative; }
        .hero-grad { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 10%, transparent 100%); }
        
        .page-view { display: none; min-height: 100vh; padding-bottom: 120px; }
        .active-view { display: block; }
        .grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-red { background: #ef4444; color: white; padding: 14px; border-radius: 14px; font-weight: 900; font-size: 10px; text-transform: uppercase; cursor: pointer; width: 100%; border:none; transition: 0.2s; }
        .btn-red:active { transform: scale(0.95); }
        
        .ep-btn { flex-shrink: 0; width: 45px; height: 45px; border-radius: 12px; background: #111827; font-weight: 900; color: white; border: 1px solid #1f2937; font-size: 11px; }
        .ep-active { background: #ef4444 !important; border-color: white !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

    <div id="choiceOverlay" onclick="this.style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <img id="choiceImg" class="w-36 h-52 mx-auto rounded-xl mb-5 object-cover shadow-2xl border border-gray-800">
            <h3 id="choiceTitle" class="text-white font-black uppercase text-xs mb-6 leading-tight"></h3>
            <div class="space-y-3">
                <button id="choicePlay" class="btn-red"><i class="fa fa-play mr-2"></i> Watch Now</button>
                <button id="choiceWish" class="btn-red bg-gray-800 text-gray-400">Add to Wishlist</button>
                <button onclick="document.getElementById('choiceOverlay').style.display='none'" class="text-gray-600 font-bold text-[9px] uppercase mt-2 tracking-widest">Close</button>
            </div>
        </div>
    </div>

    <div id="trailerOverlay" onclick="closeTrailer()">
        <div class="relative w-full max-w-4xl aspect-video bg-black rounded-2xl overflow-hidden mx-4 shadow-2xl">
            <iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div id="confirmOverlay">
        <div class="modal-box">
            <h3 class="text-white font-black uppercase text-xs mb-4">Clear All Data?</h3>
            <p class="text-gray-500 text-[9px] mb-8 uppercase tracking-widest">This will reset your history and local wishlist.</p>
            <div class="flex gap-3">
                <button onclick="confirmClearHistory()" class="btn-red flex-1">Clear</button>
                <button onclick="document.getElementById('confirmOverlay').style.display='none'" class="btn-red flex-1 bg-gray-800">No</button>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[2500] glass p-5">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-xl font-black logo-text cursor-pointer tracking-tighter" onclick="showPage('home')">YMLSFLIX PRO</h1>
            <div class="flex items-center gap-6">
                <i onclick="showPage('home')" class="fa fa-home text-gray-400 hover:text-white cursor-pointer text-xl"></i>
                <i onclick="showPage('wishlist')" class="fa fa-heart text-gray-400 hover:text-red-500 cursor-pointer text-xl"></i>
                <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 hover:text-white cursor-pointer text-xl"></i>
                <i onclick="toggleDropdown('profileDrop')" class="fa fa-user-circle text-gray-400 hover:text-white cursor-pointer text-xl"></i>
            </div>
        </div>
        <div class="container mx-auto mt-5 px-1">
            <div class="flex gap-2">
                <input type="text" id="searchBar" class="bg-[#111827] border border-[#1f2937] text-white px-5 py-3 rounded-xl w-full outline-none focus:border-red-500 transition-all" placeholder="Search anime..." oninput="handleSearch(this.value)">
                <button id="installBtn" onclick="triggerInstall()" class="hidden bg-indigo-600 text-[9px] font-black px-5 rounded-xl uppercase tracking-widest">Install</button>
            </div>
            <div class="flex gap-3 mt-4 overflow-x-auto no-scrollbar pb-1">
                <div id="chip-TV" onclick="fetchByFormat('TV')" class="cat-chip">TV Series</div>
                <div id="chip-MOVIE" onclick="fetchByFormat('MOVIE')" class="cat-chip">Movies</div>
                <div id="chip-OVA" onclick="fetchByFormat('OVA')" class="cat-chip">OVA</div>
                <div id="chip-SPECIAL" onclick="fetchByFormat('SPECIAL')" class="cat-chip">Special</div>
            </div>
        </div>

        <div id="genreDrop" class="dropdown-content">
            <div class="flex mb-5 gap-4">
                <button onclick="switchTab('genres')" id="tab-gen" class="flex-1 pb-2 font-black text-[10px] uppercase border-b-2 border-red-600 text-white">Genres</button>
                <button onclick="switchTab('years')" id="tab-year" class="flex-1 pb-2 font-black text-[10px] uppercase text-gray-500">Release Year</button>
            </div>
            <div id="genreList" class="grid grid-cols-3 gap-2 max-h-64 overflow-y-auto pr-2"></div>
            <div id="yearList" class="grid grid-cols-3 gap-2 max-h-64 overflow-y-auto pr-2 hidden"></div>
        </div>

        <div id="profileDrop" class="dropdown-content">
            <div id="authBox">
                <h3 class="text-white font-black text-[10px] uppercase mb-4 text-center tracking-widest">Sync Account</h3>
                <input type="text" id="authEmail" placeholder="Username" class="bg-[#111827] p-3 rounded-lg w-full mb-2 border border-[#1f2937] outline-none">
                <input type="password" id="authPass" placeholder="Password" class="bg-[#111827] p-3 rounded-lg w-full mb-5 border border-[#1f2937] outline-none">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="btn-red flex-1">Login</button>
                    <button onclick="handleAuth('signup')" class="btn-red flex-1 bg-gray-700">Join</button>
                </div>
            </div>
            <div id="userBox" class="hidden text-center">
                <div class="w-16 h-16 bg-red-600 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-black">Y</div>
                <h4 id="userDisplay" class="font-black text-white uppercase text-sm mb-5"></h4>
                <button onclick="document.getElementById('confirmOverlay').style.display='flex'" class="btn-red bg-gray-800 mb-2 border border-red-900/30">Reset Local App</button>
                <button onclick="handleLogout()" class="btn-red bg-red-950/40 text-red-500">Sign Out</button>
            </div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-52">
        <header id="hero">
            <div class="hero-grad"></div>
            <div class="container mx-auto px-7 relative z-10">
                <div class="bg-red-600 text-[8px] font-black px-2 py-0.5 rounded-sm w-fit mb-3 uppercase tracking-tighter">Spotlight</div>
                <h2 id="heroTitle" class="text-4xl font-black mb-3 uppercase italic tracking-tighter leading-none"></h2>
                <div id="heroDesc" class="text-gray-400 text-[11px] max-w-sm line-clamp-3 mb-8 leading-relaxed"></div>
                <button id="heroPlayBtn" class="bg-white text-black px-12 py-4 rounded-full font-black text-[10px] uppercase shadow-xl hover:scale-105 transition">Watch Now</button>
            </div>
        </header>

        <main class="container mx-auto p-5 space-y-16">
            <section id="continueSection" class="hidden">
                <h2 class="text-[10px] font-black mb-5 uppercase text-red-500 tracking-[0.3em]">Continue Watching</h2>
                <div id="continueGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div>
            </section>
            <section><h2 class="text-[10px] font-black mb-5 uppercase text-orange-500 tracking-[0.3em]">Trending Now</h2><div id="trendingGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div></section>
            <section><h2 class="text-[10px] font-black mb-5 uppercase text-yellow-500 tracking-[0.3em]">Top Rated Series</h2><div id="ratedGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div></section>
            <section><h2 class="text-[10px] font-black mb-5 uppercase text-blue-500 tracking-[0.3em]">Newly Airing</h2><div id="airingGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div></section>
            <section><h2 class="text-[10px] font-black mb-5 uppercase text-purple-500 tracking-[0.3em]">Popular Anime</h2><div id="popularGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-2"></div></section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto p-5 pt-60">
        <h2 id="filterTitle" class="text-xl font-black uppercase text-red-600 mb-8 border-l-4 border-red-600 pl-5">Results</h2>
        <div id="filterGrid" class="grid-full"></div>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto p-5 pt-60">
        <h2 class="text-xl font-black uppercase text-red-600 mb-8 border-l-4 border-red-600 pl-5">My Collection</h2>
        <div id="wishlistGrid" class="grid-full"></div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
        <div class="glass p-4 sticky top-0 flex justify-between items-center z-50">
            <button onclick="closePlayer()" class="w-10 h-10 rounded-xl bg-gray-900 flex items-center justify-center">←</button>
            <div class="text-center px-4">
                <h3 id="playerTitle" class="font-black text-[9px] uppercase truncate max-w-[180px] text-gray-500 mb-1"></h3>
                <div class="flex gap-2 justify-center">
                    <button onclick="setMode('sub')" id="subBtn" class="px-4 py-1.5 text-[8px] font-black rounded-lg bg-red-600">SUB</button>
                    <button onclick="setMode('dub')" id="dubBtn" class="px-4 py-1.5 text-[8px] font-black rounded-lg bg-gray-800">DUB</button>
                </div>
            </div>
            <button onclick="closePlayer(); showPage('home');" class="w-10 h-10 rounded-xl bg-gray-900 flex items-center justify-center"><i class="fa fa-home"></i></button>
        </div>

        <div class="w-full aspect-video bg-black relative" id="videoContainer">
            <video id="player" playsinline controls class="w-full h-full"></video>
            <div id="playerLoader" class="absolute inset-0 flex items-center justify-center bg-black/90 z-10 hidden">
                <div class="text-center">
                    <i class="fa fa-circle-o-notch fa-spin text-red-600 text-3xl mb-2"></i>
                    <p class="text-[8px] font-black uppercase text-gray-500">Loading Stream...</p>
                </div>
            </div>
        </div>

        <div class="p-6 container mx-auto">
            <div id="serverList" class="flex gap-2 overflow-x-auto no-scrollbar mb-8 pb-1"></div>
            <div class="flex gap-3 mb-10">
                <button id="trailerBtn" class="bg-indigo-600 flex-1 py-4 rounded-xl font-black text-[10px] uppercase">Trailer</button>
                <button onclick="nextEpisode()" class="bg-red-600 flex-1 py-4 rounded-xl font-black text-[10px] uppercase">Next Ep</button>
            </div>
            <h2 class="text-[9px] font-black mb-4 uppercase text-gray-600 tracking-widest">Choose Episode</h2>
            <div id="epList" class="flex gap-3 overflow-x-auto no-scrollbar mb-16 py-2"></div>
            <h2 class="text-[10px] font-black mb-6 uppercase text-red-600 tracking-widest">Recommended For You</h2>
            <div id="recommendGrid" class="flex gap-5 overflow-x-auto no-scrollbar pb-8"></div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co', STREAM_API = 'https://api.consumet.org/anime/gogoanime';
        let currentUser = JSON.parse(localStorage.getItem('ymls_active_user'));
        let playMode = 'sub', currentAnime = null, currentEp = 1, currentServers = [], lastTap = 0, deferredPrompt, plyrInstance, hlsInstance;

        // AUTH SYSTEM
        function handleAuth(mode) {
            const user = document.getElementById('authEmail').value.trim(), pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) return alert("Fill all fields");
            let db = JSON.parse(localStorage.getItem('ymls_users_db')) || {};
            if(mode === 'signup') {
                if(db[user]) return alert("Username taken");
                db[user] = { name: user, pass: pass, wishlist: [] };
                localStorage.setItem('ymls_users_db', JSON.stringify(db)); alert("Success!");
            } else {
                if(db[user] && db[user].pass === pass) {
                    currentUser = db[user]; localStorage.setItem('ymls_active_user', JSON.stringify(currentUser)); location.reload();
                } else alert("Failed");
            }
        }

        window.onload = () => {
            plyrInstance = new Plyr('#player', { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'] });
            
            // Rotation Control
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                } else if (!document.fullscreenElement && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            });

            // Double Tap Skip Logic
            document.getElementById('videoContainer').addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    const rect = e.target.getBoundingClientRect();
                    const x = e.changedTouches[0].clientX - rect.left;
                    x > rect.width/2 ? plyrInstance.forward(10) : plyrInstance.rewind(10);
                }
                lastTap = now;
            });

            // PWA
            window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').classList.remove('hidden'); });

            setupUI(); fetchHero(); loadHome(); genFilters();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
        };

        // ACTION MENU & WISHLIST
        function showChoice(a) {
            document.getElementById('choiceOverlay').style.display = 'flex';
            document.getElementById('choiceImg').src = a.coverImage.large;
            document.getElementById('choiceTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('choicePlay').onclick = () => { document.getElementById('choiceOverlay').style.display='none'; openPlayer(a); };
            document.getElementById('choiceWish').onclick = () => { document.getElementById('choiceOverlay').style.display='none'; toggleWish(a); };
        }

        function toggleWish(a, e = null) {
            if(e) e.stopPropagation(); // Stop click-through to choice menu
            let list = currentUser ? (currentUser.wishlist || []) : (JSON.parse(localStorage.getItem('ymls_guest_wishlist')) || []);
            const idx = list.findIndex(x => x.id === a.id);
            if(idx === -1) { list.unshift(a); } else { list.splice(idx, 1); }
            
            if(currentUser) { 
                currentUser.wishlist = list; 
                let db = JSON.parse(localStorage.getItem('ymls_users_db')) || {}; 
                db[currentUser.name] = currentUser; 
                localStorage.setItem('ymls_users_db', JSON.stringify(db)); 
                localStorage.setItem('ymls_active_user', JSON.stringify(currentUser)); 
            } else {
                localStorage.setItem('ymls_guest_wishlist', JSON.stringify(list));
            }
            
            // Refresh visuals
            if(document.getElementById('page-wishlist').classList.contains('active-view')) renderWishlist();
            loadHome(); // Refresh heart icons on home
        }

        // STREAM ENGINE
        async function openPlayer(a, ep = 1) {
            if(a) currentAnime = a; currentEp = ep;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = (currentAnime.title.english || currentAnime.title.romaji) + " - Ep " + ep;
            document.getElementById('playerLoader').classList.remove('hidden');
            const tBtn = document.getElementById('trailerBtn');
            if(currentAnime.trailer?.site === 'youtube') {
                tBtn.classList.remove('hidden');
                tBtn.onclick = () => { document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${currentAnime.trailer.id}?autoplay=1`; document.getElementById('trailerOverlay').style.display = 'flex'; plyrInstance.pause(); };
            } else tBtn.classList.add('hidden');

            try {
                const q = (currentAnime.title.romaji || currentAnime.title.english).replace(/[^a-zA-Z0-9 ]/g, '');
                const s = await fetch(`${STREAM_API}/${q}`).then(r=>r.json());
                const target = s.results.find(r => playMode === 'dub' ? r.id.includes('-dub') : !r.id.includes('-dub')) || s.results[0];
                const info = await fetch(`${STREAM_API}/info/${target.id}`).then(r=>r.json());
                const epObj = info.episodes.find(e => e.number == ep) || info.episodes[0];
                const links = await fetch(`${STREAM_API}/watch/${epObj.id}`).then(r=>r.json());
                currentServers = links.sources;
                document.getElementById('serverList').innerHTML = currentServers.map((s, i) => `<button onclick="switchServer(${i})" class="px-4 py-3 bg-gray-900 rounded-xl text-[9px] font-bold border border-gray-800 hover:border-red-500 whitespace-nowrap">${s.quality}</button>`).join('');
                switchServer(0);
            } catch(e) { document.getElementById('playerLoader').classList.add('hidden'); alert("Error fetching episodes."); }
            saveHistory(currentAnime); renderEpisodes(currentAnime); fetchRecommendations(currentAnime.id);
        }

        function switchServer(idx) {
            if (hlsInstance) hlsInstance.destroy();
            const v = document.getElementById('player'), url = currentServers[idx].url;
            if (Hls.isSupported()) {
                hlsInstance = new Hls(); hlsInstance.loadSource(url); hlsInstance.attachMedia(v);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { document.getElementById('playerLoader').classList.add('hidden'); plyrInstance.play(); });
            }
        }

        // UI RENDERING
        function render(l, t, isGrid=false) {
            const wishlist = currentUser ? (currentUser.wishlist || []) : (JSON.parse(localStorage.getItem('ymls_guest_wishlist')) || []);
            document.getElementById(t).innerHTML = l.map(a => {
                if(!a) return '';
                const inWish = wishlist.some(x => x.id === a.id);
                return `
                <div class="anime-card ${isGrid ? 'w-full' : ''}" onclick='showChoice(${JSON.stringify(a)})'>
                    <div class="ep-badge">${a.episodes || '?'} EP</div>
                    <div class="wish-heart ${inWish ? 'wish-active' : ''}" onclick='toggleWish(${JSON.stringify(a)}, event)'>
                        <i class="fa fa-${inWish ? 'heart' : 'heart-o'}"></i>
                    </div>
                    <img src="${a.coverImage.large}" class="card-img" loading="lazy">
                    <div class="p-3 truncate text-[9px] font-black uppercase text-gray-400">${a.title.english || a.title.romaji}</div>
                </div>`;
            }).join('');
        }

        // API FETCHERS
        async function handleSearch(term) {
            if(term.length < 2) return;
            showPage('filter'); document.getElementById('filterTitle').innerText = "Searching: " + term;
            const q = `query($s:String){Page(perPage:50){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{s:term}})}).then(res=>res.json());
            render(r.data.Page.media, "filterGrid", true);
        }

        async function fetchByFormat(f) {
            showPage('filter'); document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('cat-active'));
            document.getElementById(`chip-${f}`).classList.add('cat-active');
            const q = `query($f:MediaFormat){Page(perPage:50){media(type:ANIME,format:$f,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{f}})}).then(res=>res.json());
            render(r.data.Page.media, "filterGrid", true);
        }

        async function fetchByFilter(g, y) {
            showPage('filter'); document.getElementById('filterTitle').innerText = g || y;
            const q = `query($g:String,$y:Int){Page(perPage:50){media(genre:$g,seasonYear:$y,type:ANIME,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{g, y}})}).then(res=>res.json());
            render(r.data.Page.media, "filterGrid", true);
        }

        function loadHome() {
            fetchGrid("TRENDING_DESC", "trendingGrid"); fetchGrid("SCORE_DESC", "ratedGrid");
            fetchGrid("START_DATE_DESC", "airingGrid"); fetchGrid("POPULARITY_DESC", "popularGrid");
            const h = JSON.parse(localStorage.getItem('ymls_hist')) || [];
            if(h.length) { document.getElementById('continueSection').classList.remove('hidden'); render(h, 'continueGrid'); }
        }

        function fetchGrid(s, t) {
            const q = `query($s:[MediaSort]){Page(perPage:20){media(type:ANIME,sort:$s){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{s:[s]}})}).then(res=>res.json()).then(r=>render(r.data.Page.media, t));
        }

        async function fetchHero() {
            const q = `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id title{english romaji} bannerImage description episodes trailer{id site}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q})}).then(res=>res.json());
            const top = r.data.Page.media[0];
            document.getElementById('hero').style.backgroundImage = `url(${top.bannerImage})`;
            document.getElementById('heroTitle').innerText = top.title.english || top.title.romaji;
            document.getElementById('heroDesc').innerHTML = top.description;
            document.getElementById('heroPlayBtn').onclick = () => openPlayer(top);
        }

        // HELPERS
        function saveHistory(a) { let h = JSON.parse(localStorage.getItem('ymls_hist')) || []; h = h.filter(x=>x.id!==a.id); a.curr = currentEp; h.unshift(a); localStorage.setItem('ymls_hist', JSON.stringify(h.slice(0,10))); }
        function showPage(p) { document.querySelectorAll('.page-view').forEach(v=>v.classList.toggle('active-view', v.id===`page-${p}`)); if(p==='wishlist') renderWishlist(); }
        function renderWishlist() { const w = currentUser ? (currentUser.wishlist || []) : (JSON.parse(localStorage.getItem('ymls_guest_wishlist')) || []); render(w, 'wishlistGrid', true); }
        function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }
        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); if(hlsInstance) hlsInstance.destroy(); document.getElementById('player').src=""; }
        function closeTrailer() { document.getElementById('trailerOverlay').style.display='none'; document.getElementById('trailerFrame').src=""; }
        function setMode(m) { playMode = m; if(currentAnime) openPlayer(currentAnime, currentEp); }
        function handleLogout() { localStorage.removeItem('ymls_active_user'); location.reload(); }
        function confirmClearHistory() { localStorage.clear(); location.reload(); }
        function triggerInstall() { if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById('installBtn').classList.add('hidden'); } }
        function renderEpisodes(a) { const c = a.episodes || 12; document.getElementById('epList').innerHTML = Array.from({length: c}, (_, i) => `<button onclick="openPlayer(null, ${i+1})" class="ep-btn ${currentEp===i+1?'ep-active':''}">${i+1}</button>`).join(''); }
        function switchTab(t) { document.getElementById('genreList').classList.toggle('hidden', t!=='genres'); document.getElementById('yearList').classList.toggle('hidden', t!=='years'); }
        async function fetchRecommendations(id) {
            const q = `query($id:Int){Media(id:$id){recommendations(perPage:15){nodes{mediaRecommendation{id title{english romaji} coverImage{large} episodes}}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{id}})}).then(res=>res.json());
            render(r.data.Media.recommendations.nodes.map(n=>n.mediaRecommendation).filter(x=>x), 'recommendGrid');
        }
        function setupUI() { if(currentUser) { document.getElementById('authBox').classList.add('hidden'); document.getElementById('userBox').classList.remove('hidden'); document.getElementById('userDisplay').innerText = currentUser.name; } }
        function genFilters() {
            const g = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports", "Supernatural", "Thriller"];
            document.getElementById('genreList').innerHTML = g.map(x => `<button onclick="fetchByFilter('${x}')" class="genre-btn">${x}</button>`).join('');
            let yH = ''; for(let y=2026; y>=2005; y--) yH += `<button onclick="fetchByFilter('', ${y})" class="genre-btn">${y}</button>`;
            document.getElementById('yearList').innerHTML = yH;
        }
    </script>
</body>
    </html>
