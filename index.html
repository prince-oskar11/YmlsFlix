<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMLSFLIX PRO - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .purple-glow { box-shadow: 0 0 20px rgba(88, 86, 214, 0.5); }
        .poster-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Rotation Logic */
        #video-wrapper.landscape {
            position: fixed; top: 0; left: 0; width: 100vh; height: 100vw;
            transform: rotate(90deg); transform-origin: top left;
            margin-left: 100vw; z-index: 9999; background: black;
        }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen relative">
    
    <header class="p-5 flex items-center justify-between sticky top-0 bg-black z-40">
        <div onclick="showPage('home')" class="cursor-pointer">
            <h1 class="text-3xl font-black text-[#E91E63] leading-none">YMLSFLIX</h1>
            <span class="text-[#E91E63] text-xl font-bold tracking-tighter">PRO</span>
        </div>
        <div class="flex gap-6 text-gray-400">
            <i data-lucide="home" class="cursor-pointer hover:text-white" onclick="showPage('home')"></i>
            <i data-lucide="heart" class="cursor-pointer hover:text-white" onclick="showPage('wishlist')"></i>
            <i data-lucide="grid" class="cursor-pointer hover:text-white"></i>
            <i data-lucide="user" class="cursor-pointer hover:text-white" onclick="showPage('profile')"></i>
        </div>
    </header>

    <div id="search-container" class="px-4 flex gap-2 mb-6">
        <div class="relative flex-1">
            <i data-lucide="search" class="absolute left-3 top-3 text-gray-500 w-5 h-5"></i>
            <input type="text" id="mainSearch" oninput="handleSearch(this.value)" placeholder="Search for anime, m..." 
                class="w-full bg-[#1A1A1D] border border-gray-800 rounded-xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-purple-600 outline-none text-sm">
            <div id="search-results" class="absolute w-full mt-2 bg-[#1A1A1D] rounded-xl hidden z-50 border border-gray-700 max-h-80 overflow-y-auto"></div>
        </div>
        <button class="bg-[#5856D6] hover:bg-indigo-700 px-6 rounded-xl font-bold text-xs purple-glow">INSTALL</button>
    </div>

    <main id="home-view" class="px-4 space-y-10 pb-24">
        <div class="flex gap-2 overflow-x-auto hide-scroll">
            <button onclick="fetchByGenre(1)" class="bg-[#1A1A1D] border border-gray-800 px-5 py-2 rounded-full text-[10px] font-bold shrink-0">ACTION</button>
            <button onclick="fetchByGenre(10)" class="bg-[#1A1A1D] border border-gray-800 px-5 py-2 rounded-full text-[10px] font-bold shrink-0">FANTASY</button>
            <button onclick="fetchByYear(2025)" class="bg-[#1A1A1D] border border-gray-800 px-5 py-2 rounded-full text-[10px] font-bold shrink-0">2025</button>
            <button onclick="fetchByYear(2020)" class="bg-[#1A1A1D] border border-gray-800 px-5 py-2 rounded-full text-[10px] font-bold shrink-0">2020+</button>
            <button onclick="fetchByYear(2000)" class="bg-[#1A1A1D] border border-gray-800 px-5 py-2 rounded-full text-[10px] font-bold shrink-0">2000+</button>
        </div>

        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-[#FF3B30] text-xs font-black tracking-widest uppercase">Jump Back In</h2>
                <span class="text-gray-600 text-[10px] uppercase font-bold">Auto-Saved</span>
            </div>
            <div id="history-list" class="grid grid-cols-2 gap-4">
                <p class="text-gray-600 text-xs italic col-span-2 text-center py-4">No recent history.</p>
            </div>
        </section>

        <section>
            <h2 class="text-[#FF9500] text-xs font-black tracking-widest uppercase mb-4">Trending Now</h2>
            <div id="trending-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
        </section>

        <section>
            <h2 id="section-title" class="text-[#FFCC00] text-xs font-black tracking-widest uppercase mb-4">Top Rated Masterpieces</h2>
            <div id="top-rated-list" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="player-view" class="hidden fixed inset-0 bg-black z-50 overflow-y-auto">
        <div class="p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i data-lucide="chevron-left" class="cursor-pointer" onclick="showPage('home')"></i>
                <span id="player-title" class="font-bold text-sm truncate max-w-[200px]">Loading...</span>
            </div>
            <i data-lucide="heart" id="player-wishlist-btn" class="w-5 h-5 cursor-pointer"></i>
        </div>

        <div id="video-wrapper" class="w-full aspect-video bg-gray-900 relative">
            <iframe id="main-iframe" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            <button onclick="toggleRotate()" class="absolute bottom-4 right-4 bg-black/70 p-3 rounded-full z-[60]">
                <i data-lucide="rotate-cw" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="p-6 space-y-6">
            <div class="flex gap-3">
                <button id="sub-btn" class="flex-1 bg-purple-600 py-3 rounded-xl font-bold text-xs transition">SUB</button>
                <button id="dub-btn" class="flex-1 bg-gray-800 py-3 rounded-xl font-bold text-xs text-gray-400 transition">DUB</button>
            </div>
            
            <button id="next-ep-btn" class="w-full bg-white text-black py-4 rounded-xl font-bold text-sm hidden shadow-lg">NEXT EPISODE</button>
            
            <div class="space-y-2">
                <h3 class="font-bold text-lg">Synopsis</h3>
                <p id="player-synopsis" class="text-gray-400 text-xs leading-relaxed"></p>
            </div>
        </div>
    </div>

    <div id="profile-view" class="hidden fixed inset-0 bg-black z-50 p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">My Profile</h2>
            <i data-lucide="x" class="cursor-pointer" onclick="showPage('home')"></i>
        </div>
        <div class="space-y-4">
            <div class="bg-gray-900 p-5 rounded-2xl flex items-center gap-4 border border-gray-800">
                <div class="w-14 h-14 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-full flex items-center justify-center font-black text-xl">Y</div>
                <div>
                    <p class="font-bold">YmlsUser_2026</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Pro Member</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-4">
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                    <p id="wishlist-count" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Wishlist</p>
                </div>
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 text-center">
                    <p id="history-count" class="text-xl font-bold">0</p>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Watched</p>
                </div>
            </div>

            <button onclick="confirmClearHistory()" class="w-full bg-red-900/20 text-red-500 py-4 rounded-xl font-bold text-sm border border-red-900/30 flex items-center justify-center gap-2 mt-6">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Clear History
            </button>
            <button onclick="location.reload()" class="w-full bg-gray-800 py-4 rounded-xl font-bold text-sm">Sign Out</button>
        </div>
    </div>

</div>

<script>
    // --- STATE MANAGEMENT ---
    let appState = {
        history: JSON.parse(localStorage.getItem('ymlsHistory')) || [],
        wishlist: JSON.parse(localStorage.getItem('ymlsWishlist')) || [],
        currentAnime: null,
        currentEp: 1
    };

    // --- NAVIGATION ---
    function showPage(pageId) {
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('search-container').classList.add('hidden');
        document.getElementById('player-view').classList.add('hidden');
        document.getElementById('profile-view').classList.add('hidden');

        if(pageId === 'home') {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('search-container').classList.remove('hidden');
            updateHomeUI();
        } else {
            document.getElementById(pageId + '-view').classList.remove('hidden');
        }
        lucide.createIcons();
        window.scrollTo(0,0);
    }

    // --- DATA FETCHING (JIKAN & CONSUMET) ---
    async function initData() {
        try {
            const trending = await fetch('https://api.jikan.moe/v4/seasons/now?limit=8').then(r => r.json());
            const top = await fetch('https://api.jikan.moe/v4/top/anime?limit=8').then(r => r.json());
            
            renderScroll(trending.data, 'trending-list');
            renderGrid(top.data, 'top-rated-list');
            updateHomeUI();
        } catch (e) { console.error("Data Load Error", e); }
    }

    async function handleSearch(q) {
        const resBox = document.getElementById('search-results');
        if(q.length < 3) { resBox.classList.add('hidden'); return; }
        
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&limit=5`).then(r => r.json());
        resBox.innerHTML = res.data.map(a => `
            <div class="p-3 flex gap-4 hover:bg-gray-800 cursor-pointer border-b border-gray-700" onclick="openPlayer('${a.mal_id}')">
                <img src="${a.images.jpg.small_image_url}" class="w-10 h-14 rounded object-cover">
                <div><p class="text-xs font-bold">${a.title}</p><p class="text-[10px] text-gray-500">${a.type} • ${a.year || ''}</p></div>
            </div>
        `).join('');
        resBox.classList.remove('hidden');
    }

    // --- PLAYER LOGIC ---
    async function openPlayer(id, ep = 1) {
        showPage('player');
        const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`).then(r => r.json());
        const anime = res.data;
        appState.currentAnime = anime;
        appState.currentEp = ep;

        document.getElementById('player-title').innerText = `${anime.title} - EP ${ep}`;
        document.getElementById('player-synopsis').innerText = anime.synopsis;
        
        // REAL API SOURCE: Using GogoAnime Embed Proxy (Free source)
        // Note: Real IDs vary. We use a search fallback or MAL ID mapping
        const streamUrl = `https://vidsrc.to/embed/anime/${id}/${ep}`;
        document.getElementById('main-iframe').src = streamUrl;

        // Add to history
        addToHistory(anime);
        
        // Show Next Episode button mock (appears after 10s)
        const nextBtn = document.getElementById('next-ep-btn');
        nextBtn.classList.add('hidden');
        setTimeout(() => {
            nextBtn.classList.remove('hidden');
            nextBtn.onclick = () => openPlayer(id, ep + 1);
        }, 10000);
    }

    function toggleRotate() {
        document.getElementById('video-wrapper').classList.toggle('landscape');
    }

    // --- STORAGE LOGIC ---
    function addToHistory(anime) {
        appState.history = appState.history.filter(a => a.mal_id !== anime.mal_id);
        appState.history.unshift(anime);
        if(appState.history.length > 6) appState.history.pop();
        localStorage.setItem('ymlsHistory', JSON.stringify(appState.history));
    }

    function toggleWishlist(animeId) {
        const idx = appState.wishlist.findIndex(id => id == animeId);
        if(idx === -1) appState.wishlist.push(animeId);
        else appState.wishlist.splice(idx, 1);
        localStorage.setItem('ymlsWishlist', JSON.stringify(appState.wishlist));
        updateHomeUI();
        alert("Wishlist Updated!");
    }

    function confirmClearHistory() {
        if(confirm("Permanently clear your watch history?")) {
            appState.history = [];
            localStorage.removeItem('ymlsHistory');
            updateHomeUI();
            alert("History Cleared");
        }
    }

    // --- UI UPDATES ---
    function updateHomeUI() {
        document.getElementById('wishlist-count').innerText = appState.wishlist.length;
        document.getElementById('history-count').innerText = appState.history.length;
        
        const histDiv = document.getElementById('history-list');
        if(appState.history.length > 0) {
            histDiv.innerHTML = '';
            renderGrid(appState.history, 'history-list');
        }
    }

    function renderGrid(data, containerId) {
        document.getElementById(containerId).innerHTML = data.map(a => `
            <div class="relative cursor-pointer group" onclick="openPlayer('${a.mal_id}')">
                <img src="${a.images.jpg.large_image_url}" class="rounded-2xl aspect-[3/4] object-cover w-full border border-gray-800">
                <div class="absolute top-2 right-2 z-20" onclick="event.stopPropagation(); toggleWishlist('${a.mal_id}')">
                    <i data-lucide="heart" class="w-5 h-5 drop-shadow-lg ${appState.wishlist.includes(String(a.mal_id)) ? 'fill-red-500 text-red-500' : 'text-white'}"></i>
                </div>
                <div class="absolute inset-0 poster-gradient rounded-2xl flex flex-col justify-end p-3">
                    <p class="text-[10px] font-bold truncate">${a.title}</p>
                    <div class="flex justify-between text-[8px] text-gray-400 mt-1 uppercase font-bold tracking-tighter">
                        <span>${a.type}</span>
                        <span class="text-yellow-500">★ ${a.score || 'N/A'}</span>
                    </div>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function renderScroll(data, containerId) {
        document.getElementById(containerId).innerHTML = data.map(a => `
            <div class="min-w-[140px] relative cursor-pointer" onclick="openPlayer('${a.mal_id}')">
                <img src="${a.images.jpg.image_url}" class="rounded-xl h-48 w-full object-cover border border-gray-800">
                <p class="text-[10px] font-bold mt-2 truncate">${a.title}</p>
            </div>
        `).join('');
    }

    async function fetchByYear(year) {
        document.getElementById('section-title').innerText = `Best of ${year}+`;
        const res = await fetch(`https://api.jikan.moe/v4/anime?start_date=${year}-01-01&order_by=score&sort=desc&limit=8`).then(r => r.json());
        renderGrid(res.data, 'top-rated-list');
    }

    async function fetchByGenre(id) {
        document.getElementById('section-title').innerText = `Genre Selection`;
        const res = await fetch(`https://api.jikan.moe/v4/anime?genres=${id}&limit=8`).then(r => r.json());
        renderGrid(res.data, 'top-rated-list');
    }

    // INIT
    initData();
    lucide.createIcons();
</script>

</body>
</html>
