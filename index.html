<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e50914;
            --bg-dark: #0f0f0f;
            --overlay: rgba(0, 0, 0, 0.7);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* Dynamic Background */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) blur(5px);
            z-index: -1;
            transition: background 1s ease-in-out;
        }

        /* Header & Navigation */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 28px; font-weight: bold; color: var(--primary); cursor: pointer; }

        .nav-icons { display: flex; gap: 25px; font-size: 20px; }
        .nav-icons i { cursor: pointer; transition: 0.3s; }
        .nav-icons i:hover { color: var(--primary); }

        /* Search & Categories */
        .search-container { padding: 0 5%; margin-top: 10px; }
        .search-bar-wrapper { display: flex; align-items: center; gap: 10px; position: relative; }
        #search-input {
            width: 100%; padding: 12px 20px;
            border-radius: 5px; border: none;
            background: rgba(255,255,255,0.1); color: white;
        }
        .install-btn {
            background: var(--primary); color: white;
            border: none; padding: 12px 20px;
            border-radius: 5px; cursor: pointer; white-space: nowrap;
        }

        .sub-nav {
            display: flex; gap: 20px; margin-top: 15px;
            font-size: 14px; color: #ccc;
        }
        .sub-nav span { cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .sub-nav span:hover { color: white; }

        /* Main Content */
        .content-section { padding: 20px 5%; }
        .row-title { font-size: 20px; margin: 20px 0 10px; display: flex; justify-content: space-between; }
        
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .poster-card {
            position: relative; border-radius: 8px; overflow: hidden;
            transition: transform 0.3s; cursor: pointer;
        }
        .poster-card:hover { transform: scale(1.05); }
        .poster-card img { width: 100%; height: 240px; object-fit: cover; }
        
        .ep-count {
            position: absolute; top: 5px; left: 5px;
            background: var(--primary); font-size: 10px;
            padding: 2px 6px; border-radius: 3px;
        }
        .wishlist-icon-small {
            position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 50%;
        }
        .poster-info {
            padding: 8px; font-size: 12px;
            background: rgba(0,0,0,0.8);
        }

        /* Detail Modal */
        #detail-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; overflow-y: auto;
        }
        .modal-content { padding: 5% 10%; display: flex; gap: 40px; }
        .modal-left img { width: 300px; border-radius: 10px; }
        .modal-right { flex: 1; }
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        .play-btn { background: white; color: black; padding: 10px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Fullscreen Player */
        #video-player-container {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: black; z-index: 2000; display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .player-controls { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; }

        /* Genre/Profile Screens */
        .screen { display: none; padding: 20px 5%; }
        .active { display: block; }
        
        /* Auth */
        #auth-screen { text-align: center; margin-top: 100px; }
        input[type="text"], input[type="email"], input[type="password"] {
            display: block; width: 300px; margin: 10px auto; padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <header>
        <div class="logo" onclick="showScreen('home')">YmlsFlix Pro</div>
        <div class="nav-icons">
            <i class="fas fa-home" onclick="showScreen('home')" title="Home"></i>
            <i class="fas fa-th-large" onclick="showScreen('genres')" title="Genres"></i>
            <i class="fas fa-bookmark" onclick="showScreen('wishlist')" title="Wishlist"></i>
            <i class="fas fa-user-circle" onclick="showScreen('profile')" title="Profile"></i>
        </div>
    </header>

    <div class="search-container">
        <div class="search-bar-wrapper">
            <input type="text" id="search-input" placeholder="Search anime under YmlsFlix..." onkeyup="handleSearch(this.value)">
            <button class="install-btn">Install App</button>
        </div>
        <div class="sub-nav">
            <span onclick="fetchByType('tv')">TV Shows</span>
            <span onclick="fetchByType('movie')">Movies</span>
            <span onclick="fetchByType('ova')">OVA</span>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <div class="content-section">
            <div class="row-title">Trending Now</div>
            <div id="trending-grid" class="anime-grid"></div>
            
            <div class="row-title">Upcoming <span id="current-time" style="font-size: 12px; color: gray;"></span></div>
            <div id="upcoming-grid" class="anime-grid"></div>
        </div>
    </div>

    <!-- Genre Screen -->
    <div id="genres-screen" class="screen">
        <h2>Genres & Years</h2>
        <div class="sub-nav" style="margin-bottom: 20px;">
            <span onclick="loadGenres()">All Genres</span>
            <span onclick="loadYears()">Years (2000+)</span>
        </div>
        <div id="genres-grid" class="anime-grid"></div>
    </div>

    <!-- Wishlist Screen -->
    <div id="wishlist-screen" class="screen">
        <h2>My Wishlist</h2>
        <div id="wishlist-grid" class="anime-grid"></div>
    </div>

    <!-- Profile/Auth Screen -->
    <div id="profile-screen" class="screen">
        <div id="auth-area">
            <h2>Sign In</h2>
            <input type="text" id="user-name" placeholder="Username or Email">
            <input type="password" placeholder="Password">
            <button class="install-btn" onclick="login()">Login / Sign Up</button>
        </div>
        <div id="user-area" style="display:none;">
            <h2 id="welcome-user"></h2>
            <button class="install-btn" style="background: grey;" onclick="clearHistory()">Clear History</button>
            <button class="install-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal">
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-img" src="" alt="">
                <div class="btn-group">
                    <button class="play-btn" onclick="startStream()">Stream Now</button>
                    <button class="play-btn" style="background: #333; color: white;" onclick="addToWishlistFromModal()">+ Wishlist</button>
                </div>
            </div>
            <div class="modal-right">
                <h1 id="modal-title"></h1>
                <p id="modal-meta" style="color: #aaa;"></p>
                <h3>Synopsis</h3>
                <p id="modal-synopsis"></p>
                <h3>Characters</h3>
                <div id="modal-characters" style="display:flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;"></div>
                <button class="install-btn" onclick="closeModal()">Back to Home</button>
            </div>
        </div>
    </div>

    <!-- Video Player -->
    <div id="video-player-container">
        <div id="player-frame" style="width: 100%; height: 100%;"></div>
        <div class="player-controls">
            <button class="play-btn" onclick="toggleRotation()">Rotate Screen</button>
            <button class="play-btn" onclick="closePlayer()">Close</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.jikan.moe/v4';
        let currentAnime = null;
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

        // App Initialization
        window.onload = () => {
            fetchTrending();
            fetchUpcoming();
            updateTime();
            setInterval(updateTime, 1000);
        };

        function updateTime() {
            document.getElementById('current-time').innerText = new Date().toLocaleString();
        }

        async function fetchTrending() {
            const res = await fetch(`${API_URL}/top/anime?filter=bypopularity&limit=10`);
            const data = await res.json();
            renderGrid(data.data, 'trending-grid');
            // Change background to #1 rated
            document.getElementById('dynamic-bg').style.backgroundImage = `url(${data.data[0].images.jpg.large_image_url})`;
        }

        async function fetchUpcoming() {
            const res = await fetch(`${API_URL}/seasons/upcoming?limit=10`);
            const data = await res.json();
            renderGrid(data.data, 'upcoming-grid');
        }

        function renderGrid(list, elementId) {
            const grid = document.getElementById(elementId);
            grid.innerHTML = list.map(anime => `
                <div class="poster-card" onclick="openDetails(${anime.mal_id})">
                    <div class="ep-count">EP ${anime.episodes || '?'}</div>
                    <div class="wishlist-icon-small" onclick="event.stopPropagation(); addToWishlist(${anime.mal_id}, '${anime.title.replace(/'/g, "")}', '${anime.images.jpg.image_url}')">
                        <i class="fas fa-plus"></i>
                    </div>
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <div class="poster-info">
                        <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${anime.title}</div>
                        <div style="font-size:10px; color:#aaa;">${anime.type} • ${anime.score || 'N/A'} ⭐</div>
                    </div>
                </div>
            `).join('');
        }

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${screenId}-screen`).classList.add('active');
            if(screenId === 'wishlist') renderWishlist();
        }

        // Search
        async function handleSearch(query) {
            if(query.length < 3) return;
            const res = await fetch(`${API_URL}/anime?q=${query}&limit=12`);
            const data = await res.json();
            renderGrid(data.data, 'trending-grid'); // Show results in trending area for demo
        }

        // Details & Synopsis
        async function openDetails(id) {
            const res = await fetch(`${API_URL}/anime/${id}/full`);
            const data = await res.json();
            currentAnime = data.data;

            document.getElementById('modal-title').innerText = currentAnime.title;
            document.getElementById('modal-img').src = currentAnime.images.jpg.large_image_url;
            document.getElementById('modal-synopsis').innerText = currentAnime.synopsis;
            document.getElementById('modal-meta').innerText = `${currentAnime.type} | ${currentAnime.duration} | Rating: ${currentAnime.score}`;
            
            // Characters
            const charRes = await fetch(`${API_URL}/anime/${id}/characters`);
            const charData = await charRes.json();
            document.getElementById('modal-characters').innerHTML = charData.data.slice(0, 8).map(c => `
                <div style="text-align:center; min-width:80px;">
                    <img src="${c.character.images.jpg.image_url}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <div style="font-size:10px;">${c.character.name}</div>
                </div>
            `).join('');

            document.getElementById('detail-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        // Streaming & Player
        function startStream() {
            const player = document.getElementById('video-player-container');
            const frame = document.getElementById('player-frame');
            player.style.display = 'block';
            
            // Show trailer if available, else placeholder
            const trailerUrl = currentAnime.trailer.embed_url || 'https://www.youtube.com/embed/
