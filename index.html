<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YMLSFLIX PRO | v60.0.1 ULTIMATE FULL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --plyr-color-main: #ef4444; --bg: #05070a; --card: #0f1117; --accent: #6366f1; }
        
        body { 
            background: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            font-size: 13px; 
        }

        /* --- UI COMPONENTS --- */
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* --- ANIME CARDS --- */
        .anime-card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: var(--card); width: 145px; flex-shrink: 0; border: 1px solid #1f2937; }
        .anime-card:hover { transform: translateY(-8px); border-color: #ef4444; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .ep-badge { position: absolute; top: 8px; left: 8px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 7px; border-radius: 5px; z-index: 10; }
        .sync-dot { position: absolute; bottom: 8px; right: 8px; width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 12px #22c55e; z-index: 20; border: 2px solid #05070a; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .wish-heart { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 20; color: white; transition: 0.3s; }
        .wish-active { color: #ef4444 !important; background: white; }

        /* --- MODALS & DROPDOWNS --- */
        .dropdown-content { display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 20px; z-index: 3000; width: 95%; max-width: 450px; padding: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .show { display: block !important; animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 15px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .page-view { display: none; min-height: 100vh; padding-bottom: 120px; }
        .active-view { display: block; }
        .grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 18px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- PLAYER STYLES --- */
        #videoContainer { background: #000; overflow: hidden; }
        .char-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        
        #hero { height: 65vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 80px; position: relative; }
        .hero-grad { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 15%, rgba(5,7,10,0.4) 50%, transparent 100%); }

        /* --- SKELETON LOADING --- */
        .shimmer { background: linear-gradient(90deg, #0f1117 25%, #1f2937 50%, #0f1117 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div id="choiceOverlay" class="fixed inset-0 bg-black/95 z-[5000] hidden items-center justify-center backdrop-blur-md" onclick="this.style.display='none'">
        <div class="bg-[#0f1117] p-8 rounded-[30px] max-w-sm w-full text-center border border-white/5" onclick="event.stopPropagation()">
            <img id="choiceImg" class="w-44 h-60 mx-auto rounded-2xl mb-6 object-cover shadow-2xl">
            <h3 id="choiceTitle" class="text-white font-black uppercase text-xs mb-8 tracking-widest"></h3>
            <div class="space-y-3">
                <button id="choicePlay" class="w-full bg-red-600 py-4 rounded-xl font-black text-[11px] uppercase tracking-widest">Stream Now</button>
                <button id="choiceWish" class="w-full bg-white/5 py-4 rounded-xl font-black text-[11px] uppercase text-gray-400">Add to Wishlist</button>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[2500] glass p-5">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-black logo-text cursor-pointer tracking-tighter" onclick="showPage('home')">YMLSFLIX PRO</h1>
            <div class="flex items-center gap-8">
                <i onclick="showPage('home')" class="fa fa-home text-gray-400 text-2xl cursor-pointer"></i>
                <i onclick="showPage('wishlist')" class="fa fa-heart text-gray-400 text-2xl cursor-pointer"></i>
                <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 text-2xl cursor-pointer"></i>
            </div>
        </div>
        <div class="container mx-auto mt-6 flex gap-3">
            <div class="relative w-full">
                <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="searchBar" class="bg-[#111827] border border-[#1f2937] text-white pl-14 pr-6 py-4 rounded-2xl w-full outline-none focus:border-red-600 transition-all" placeholder="Search anime title..." oninput="handleSearch(this.value)">
            </div>
            <button id="installBtn" onclick="triggerInstall()" class="hidden bg-indigo-600 text-[10px] font-black px-6 rounded-2xl uppercase whitespace-nowrap">Install App</button>
        </div>
        
        <div id="genreDrop" class="dropdown-content">
            <div class="flex mb-6 gap-6">
                <button id="tabGen" onclick="switchTab('genres')" class="flex-1 pb-3 font-black text-[11px] uppercase border-b-2 border-red-600 text-white">Categories</button>
                <button id="tabYear" onclick="switchTab('years')" class="flex-1 pb-3 font-black text-[11px] uppercase text-gray-500 border-b-2 border-transparent">Season Year</button>
            </div>
            <div id="genreList" class="grid grid-cols-3 gap-3 max-h-72 overflow-y-auto"></div>
            <div id="yearList" class="grid grid-cols-3 gap-3 max-h-72 overflow-y-auto hidden"></div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-56">
        <header id="hero">
            <div class="hero-grad"></div>
            <div class="container mx-auto px-8 relative z-10">
                <h2 id="heroTitle" class="text-5xl font-black mb-4 uppercase italic tracking-tighter leading-none max-w-2xl"></h2>
                <div id="heroMeta" class="flex gap-4 mb-6 text-[10px] font-black text-red-500 uppercase tracking-widest"></div>
                <p id="heroDesc" class="text-gray-400 text-xs max-w-lg line-clamp-3 mb-10 font-medium leading-relaxed"></p>
                <button id="heroPlayBtn" class="bg-white text-black px-16 py-5 rounded-full font-black text-[11px] uppercase hover:bg-red-600 hover:text-white transition-all">Stream Now</button>
            </div>
        </header>

        <main class="container mx-auto p-6 space-y-24">
            <section id="continueSection" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-[11px] font-black uppercase text-green-500 tracking-[0.4em]">Continue Watching</h2>
                </div>
                <div id="continueGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-4"></div>
            </section>

            <section>
                <h2 class="text-[11px] font-black uppercase text-orange-500 tracking-[0.4em] mb-8">Trending Worldwide</h2>
                <div id="trendingGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-4"></div>
            </section>

            <section>
                <h2 class="text-[11px] font-black uppercase text-blue-500 tracking-[0.4em] mb-8">Top Rated Classics</h2>
                <div id="topGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-4"></div>
            </section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto p-6 pt-72">
        <div class="mb-12 border-l-4 border-red-600 pl-6">
            <h2 id="filterTitle" class="text-3xl font-black uppercase text-white tracking-tighter">Browse Library</h2>
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mt-2">Showing most popular results</p>
        </div>
        <div id="filterGrid" class="grid-full"></div>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto p-6 pt-72">
        <h2 class="text-3xl font-black uppercase text-white mb-10 border-l-4 border-red-600 pl-6">My Wishlist</h2>
        <div id="wishlistGrid" class="grid-full"></div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
        <div class="glass p-5 sticky top-0 flex justify-between items-center z-50">
            <button onclick="closePlayer()" class="w-12 h-12 rounded-2xl bg-gray-900 flex items-center justify-center border border-white/5"><i class="fa fa-chevron-left"></i></button>
            <div id="playerTitle" class="text-[10px] font-black uppercase truncate max-w-[200px] text-gray-400 tracking-widest"></div>
            <div class="flex gap-3">
                <button onclick="setMode('sub')" id="subBtn" class="px-6 py-2 text-[9px] font-black rounded-lg bg-red-600 transition-all">SUB</button>
                <button onclick="setMode('dub')" id="dubBtn" class="px-6 py-2 text-[9px] font-black rounded-lg bg-gray-800 transition-all">DUB</button>
            </div>
        </div>

        <div id="videoContainer" class="w-full aspect-video shadow-2xl">
            <video id="player" playsinline controls class="w-full h-full"></video>
        </div>

        <div class="p-8 container mx-auto grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-2">
                <h2 class="text-[11px] font-black uppercase text-gray-500 tracking-[0.3em] mb-6">Episodes</h2>
                <div id="epList" class="flex gap-4 overflow-x-auto no-scrollbar mb-12 py-4"></div>
                
                <h2 class="text-[11px] font-black uppercase text-gray-500 tracking-[0.3em] mb-6">Stream Server</h2>
                <div id="serverList" class="flex gap-3 overflow-x-auto no-scrollbar"></div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="bg-white/5 border border-white/5 rounded-[30px] p-8">
                    <h4 class="text-white font-black text-[11px] uppercase mb-6 border-b border-white/5 pb-4 tracking-widest">Main Cast & VA</h4>
                    <div id="charGrid" class="grid grid-cols-4 gap-4 mb-8"></div>
                    <div id="animeDetails" class="text-gray-400 text-[10px] space-y-3 uppercase font-black tracking-tighter"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        const STREAM_API = 'https://api.consumet.org/anime/gogoanime';
        
        let playMode = 'sub', currentAnime = null, currentEp = 1, plyrInstance, hlsInstance, lastTap = 0, deferredPrompt;

        // --- INITIALIZATION ---
        window.onload = () => {
            plyrInstance = new Plyr('#player', { 
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                tooltips: { controls: true, seek: true }
            });
            
            // Mobile Double Tap logic
            document.getElementById('videoContainer').addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    const rect = e.target.getBoundingClientRect();
                    const x = e.changedTouches[0].clientX - rect.left;
                    x > rect.width / 2 ? plyrInstance.forward(10) : plyrInstance.rewind(10);
                }
                lastTap = now;
            });

            // PWA Logic
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e;
                document.getElementById('installBtn').classList.remove('hidden');
            });

            initApp();
        };

        async function initApp() {
            genGenreList();
            genYearList();
            loadHome();
            checkAutoSync();
            
            // Auto-Save Interval for Resume Logic
            setInterval(() => {
                if(plyrInstance && !plyrInstance.paused && currentAnime) {
                    saveProgress(currentAnime.id, currentEp, plyrInstance.currentTime);
                }
            }, 5000);
        }

        // --- CORE DATA FETCHING ---
        async function loadHome() {
            const query = `
            query {
                trending: Page(perPage: 12) { media(type: ANIME, sort: TRENDING_DESC) { id title { english romaji } coverImage { large } bannerImage episodes description genres averageScore } }
                top: Page(perPage: 12) { media(type: ANIME, sort: SCORE_DESC) { id title { english romaji } coverImage { large } episodes } }
            }`;
            
            const r = await fetch(API, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ query }) 
            }).then(res => res.json());

            if(r.data) {
                render(r.data.trending.media, 'trendingGrid');
                render(r.data.top.media, 'topGrid');
                setHero(r.data.trending.media[0]);
            }
            renderWishlist();
        }

        function setHero(a) {
            document.getElementById('hero').style.backgroundImage = `url(${a.bannerImage || a.coverImage.large})`;
            document.getElementById('heroTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('heroDesc').innerHTML = a.description;
            document.getElementById('heroMeta').innerHTML = `<span>${a.averageScore}% Score</span> <span>${a.genres[0]}</span> <span>${a.episodes} Episodes</span>`;
            document.getElementById('heroPlayBtn').onclick = () => openPlayer(a);
        }

        // --- RENDER ENGINE ---
        function render(list, targetId, isGrid = false) {
            const wishlist = JSON.parse(localStorage.getItem('ymls_wishlist')) || [];
            const container = document.getElementById(targetId);
            if(!container) return;

            container.innerHTML = list.map(a => {
                const inWish = wishlist.some(x => x.id === a.id);
                return `
                <div class="anime-card ${isGrid ? 'w-full' : ''}" onclick='showChoice(${JSON.stringify(a)})'>
                    <div class="ep-badge">${a.episodes || '?'} EP</div>
                    ${a.hasNew ? '<div class="sync-dot"></div>' : ''}
                    <div class="wish-heart ${inWish ? 'wish-active' : ''}" onclick='event.stopPropagation(); toggleWish(${JSON.stringify(a)})'>
                        <i class="fa fa-${inWish ? 'heart' : 'heart-o'}"></i>
                    </div>
                    <img src="${a.coverImage.large}" class="card-img" loading="lazy">
                    <div class="p-3 truncate text-[10px] font-black uppercase text-gray-400 tracking-tighter">
                        ${a.title.english || a.title.romaji}
                    </div>
                </div>`;
            }).join('');
        }

        // --- PLAYER ENGINE ---
        async function openPlayer(a, ep = 1) {
            if(a) currentAnime = a;
            currentEp = ep;
            
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = `${currentAnime.title.english || currentAnime.title.romaji} - Episode ${ep}`;
            
            try {
                const cleanTitle = (currentAnime.title.romaji || currentAnime.title.english).replace(/[^a-zA-Z0-9 ]/g, '');
                const search = await fetch(`${STREAM_API}/${cleanTitle}`).then(r => r.json());
                const target = search.results.find(r => playMode === 'dub' ? r.id.includes('-dub') : !r.id.includes('-dub')) || search.results[0];
                
                const links = await fetch(`${STREAM_API}/watch/${target.id}-episode-${ep}`).then(r => r.json());
                
                initHls(links.sources[0].url);
                
                document.getElementById('serverList').innerHTML = links.sources.map(s => `
                    <button onclick="initHls('${s.url}')" class="px-6 py-4 bg-gray-900 border border-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest">${s.quality}</button>
                `).join('');
                
                genEpButtons(currentAnime.episodes || 12);
                fetchCast(currentAnime.id);
            } catch (err) {
                console.error("Playback error:", err);
            }
        }

        function initHls(url) {
            if (hlsInstance) hlsInstance.destroy();
            const video = document.getElementById('player');
            
            if (Hls.isSupported()) {
                hlsInstance = new Hls({ maxBufferSize: 30 * 1000 * 1000, maxBufferLength: 30 });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    // Resume Logic
                    const history = JSON.parse(localStorage.getItem('ymls_hist')) || [];
                    const saved = history.find(h => h.id === currentAnime.id);
                    if(saved && saved.lastEp === currentEp) video.currentTime = saved.lastTime;
                    plyrInstance.play();
                });
            } else {
                video.src = url;
                video.play();
            }
        }

        // --- ULTIMATE UTILITIES ---
        function saveProgress(id, ep, time) {
            let hist = JSON.parse(localStorage.getItem('ymls_hist')) || [];
            let idx = hist.findIndex(h => h.id === id);
            const data = { ...currentAnime, lastEp: ep, lastTime: time, timestamp: Date.now() };
            if(idx > -1) hist[idx] = data; else hist.push(data);
            localStorage.setItem('ymls_hist', JSON.stringify(hist));
        }

        async function checkAutoSync() {
            let hist = JSON.parse(localStorage.getItem('ymls_hist')) || [];
            if(!hist.length) return;
            const ids = hist.map(h => h.id);
            const query = `query($ids:[Int]){Page{media(id_in:$ids){id episodes}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{ids}})}).then(res=>res.json());
            
            let foundNew = false;
            r.data.Page.media.forEach(upd => {
                let local = hist.find(h => h.id === upd.id);
                if(local && upd.episodes > (local.episodes || 0)) {
                    local.hasNew = true;
                    foundNew = true;
                }
            });
            if(foundNew) {
                localStorage.setItem('ymls_hist', JSON.stringify(hist));
                render(hist.filter(h => h.hasNew), 'continueGrid');
                document.getElementById('continueSection').classList.remove('hidden');
            }
        }

        async function fetchCast(id) {
            const query = `query($id:Int){Media(id:$id){status averageScore characters(perPage:8,role:MAIN){edges{node{name{full} image{large}} voiceActors(language:JAPANESE){name{full}}}}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{id}})}).then(res=>res.json());
            const m = r.data.Media;
            document.getElementById('animeDetails').innerHTML = `<div>Status: ${m.status}</div><div>Global Score: ${m.averageScore}%</div>`;
            document.getElementById('charGrid').innerHTML = m.characters.edges.map(e => `
                <img src="${e.node.image.large}" class="char-img" title="${e.node.name.full}">
            `).join('');
        }

        // --- NAVIGATION & UI ---
        function showPage(p) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`page-${p}`).classList.add('active-view');
            window.scrollTo(0,0);
        }

        function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }

        function switchTab(t) {
            const isGen = t === 'genres';
            document.getElementById('genreList').classList.toggle('hidden', !isGen);
            document.getElementById('yearList').classList.toggle('hidden', isGen);
            document.getElementById('tabGen').style.borderColor = isGen ? '#ef4444' : 'transparent';
            document.getElementById('tabYear').style.borderColor = !isGen ? '#ef4444' : 'transparent';
        }

        async function handleSearch(s) {
            if(s.length < 3) return;
            showPage('filter');
            document.getElementById('filterTitle').innerText = `Results for: ${s}`;
            const query = `query($s:String){Page(perPage:24){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s}})}).then(res=>res.json());
            render(r.data.Page.media, 'filterGrid', true);
        }

        function toggleWish(a) {
            let wish = JSON.parse(localStorage.getItem('ymls_wishlist')) || [];
            const idx = wish.findIndex(x => x.id === a.id);
            if(idx > -1) wish.splice(idx, 1); else wish.push(a);
            localStorage.setItem('ymls_wishlist', JSON.stringify(wish));
            renderWishlist();
        }

        function renderWishlist() {
            const wish = JSON.parse(localStorage.getItem('ymls_wishlist')) || [];
            render(wish, 'wishlistGrid', true);
        }

        function genGenreList() {
            const g = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports", "Supernatural", "Thriller"];
            document.getElementById('genreList').innerHTML = g.map(x => `<button onclick="fetchFiltered('${x}', null)" class="bg-white/5 p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 transition-all">${x}</button>`).join('');
        }

        function genYearList() {
            let h = '';
            for(let i=2026; i>=2016; i--) h += `<button onclick="fetchFiltered(null, ${i})" class="bg-white/5 p-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 transition-all">${i}</button>`;
            document.getElementById('yearList').innerHTML = h;
        }

        async function fetchFiltered(g, y) {
            showPage('filter');
            document.getElementById('filterTitle').innerText = g || `Year: ${y}`;
            const query = `query($g:String, $y:Int){Page(perPage:24){media(genre:$g, seasonYear:$y, type:ANIME, sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{g, y}})}).then(res=>res.json());
            render(r.data.Page.media, 'filterGrid', true);
            toggleDropdown('genreDrop');
        }

        function genEpButtons(n) {
            let h = '';
            for(let i=1; i<=n; i++) h += `<button onclick="openPlayer(null, ${i})" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-gray-900 border ${currentEp===i?'border-red-600 text-red-600':'border-white/5'} font-black text-xs transition-all">${i}</button>`;
            document.getElementById('epList').innerHTML = h;
        }

        function showChoice(a) {
            document.getElementById('choiceOverlay').style.display = 'flex';
            document.getElementById('choiceImg').src = a.coverImage.large;
            document.getElementById('choiceTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('choicePlay').onclick = () => { document.getElementById('choiceOverlay').style.display='none'; openPlayer(a); };
            document.getElementById('choiceWish').onclick = () => { toggleWish(a); document.getElementById('choiceOverlay').style.display='none'; };
        }

        function closePlayer() { 
            document.getElementById('playerView').classList.add('hidden'); 
            plyrInstance.pause();
            if(hlsInstance) hlsInstance.destroy();
        }

        function triggerInstall() { if(deferredPrompt) deferredPrompt.prompt(); }
    </script>
</body>
</html>
