<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>YmlsFlix Pro | Premium Anime & Movie Streaming</title>
<link rel="manifest" href="manifest.json" />

<!-- Icons for PWA -->
<link rel="icon" href="https://placehold.co/192x192/05070a/ef4444?text=Y" sizes="192x192" type="image/png" />
<link rel="apple-touch-icon" href="https://placehold.co/192x192/05070a/ef4444?text=Y" />

<!-- External libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<!-- Custom styles -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
:root {
  --plyr-color-main: #ef4444;
  --bg: #05070a;
  --card: #0f1117;
  --accent: #6366f1;
}
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  margin: 0;
  overflow-x: hidden;
  font-size: 13px;
  color: #e2e8f0;
}
#scrollable { overflow-x: auto; -webkit-overflow-scrolling: touch; }
#scrollable::-webkit-scrollbar { display:none; }
.page-view { display: none; min-height: 100vh; padding-bottom: 120px; }
.page-view.active { display: block; }
button { cursor: pointer; }
</style>
</head>
<body>

<!-- Install app button -->
<div id="installContainer" class="fixed top-4 right-4 z-[9999] hidden">
  <button id="installBtn" class="bg-indigo-600 px-4 py-2 rounded-full font-bold text-sm uppercase shadow-lg hover:bg-indigo-500">Install App</button>
</div>

<!-- Overlays & modals -->
<div id="choiceOverlay" class="hidden fixed inset-0 bg-black bg-opacity-70 z-[9999]" onclick="this.style.display='none'">
  <div class="bg-gray-900 p-4 rounded-lg max-w-sm mx-auto my-20" onclick="event.stopPropagation()">
    <img id="choiceImg" class="w-40 h-56 mx-auto rounded-2xl mb-4 object-cover shadow-2xl border-2 border-gray-800/50" />
    <h3 id="choiceTitle" class="text-white font-black uppercase text-xs mb-4"></h3>
    <div class="space-y-3">
      <button id="choicePlay" class="bg-red-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-red-500 transition">Play</button>
      <button id="choiceWish" class="bg-gray-800 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-gray-700">Add to Wishlist</button>
      <button onclick="document.getElementById('choiceOverlay').style.display='none'" class="text-gray-600 font-bold text-[10px] uppercase mt-4 tracking-[0.2em] block w-full">Dismiss</button>
    </div>
  </div>
</div>

<!-- Trailer overlay -->
<div id="trailerOverlay" class="hidden fixed inset-0 bg-black bg-opacity-90 flex justify-center items-center z-[9999] p-4" onclick="closeTrailer()">
  <div class="relative w-full max-w-4xl aspect-video">
    <iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
    <button class="absolute top-2 right-2 text-white text-xl z-[9999]" onclick="closeTrailer()">×</button>
  </div>
</div>

<!-- Confirm overlay -->
<div id="confirmOverlay" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center z-[9999] p-4">
  <div class="bg-gray-800 rounded-lg p-6 max-w-sm w-full text-center">
    <div class="w-16 h-16 bg-red-600/20 text-red-600 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">
      <i class="fa fa-exclamation-triangle"></i>
    </div>
    <h3 class="text-white font-black uppercase text-xs mb-3">Clear All Data?</h3>
    <p class="text-gray-400 text-[10px] mb-8 uppercase tracking-widest leading-loose">This will delete your history, wishlist, and sign-in data.</p>
    <div class="flex gap-3">
      <button onclick="clearAllData()" class="bg-red-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-red-500">Clear</button>
      <button onclick="document.getElementById('confirmOverlay').style.display='none'" class="bg-gray-700 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-gray-600">Cancel</button>
    </div>
  </div>
</div>

<!-- Navigation bar -->
<nav class="fixed top-0 w-full z-[2500] p-4 bg-black bg-opacity-50 backdrop-blur-lg flex justify-between items-center">
  <h1 class="text-2xl font-black uppercase cursor-pointer" onclick="showPage('home')">YmlsFlix Pro</h1>
  <div class="flex space-x-4 text-xl text-gray-300">
    <i class="fa fa-home cursor-pointer" onclick="showPage('home')"></i>
    <i class="fa fa-heart cursor-pointer" onclick="showPage('wishlist')"></i>
    <i class="fa fa-th-large cursor-pointer" onclick="toggleDropdown('genresDropdown')"></i>
    <i class="fa fa-user-circle cursor-pointer" onclick="toggleDropdown('profileDropdown')"></i>
  </div>
</nav>

<!-- Dropdowns -->
<div id="genresDropdown" class="hidden absolute right-4 top-16 bg-[#0f1117] p-4 rounded-lg shadow-lg z-[999]">
  <h4 class="text-white font-bold mb-2">Genres</h4>
  <div id="genreOptions" class="grid grid-cols-2 gap-2"></div>
  <h4 class="text-white font-bold mb-2 mt-4">Years</h4>
  <div id="yearOptions" class="grid grid-cols-2 gap-2"></div>
</div>

<div id="profileDropdown" class="hidden absolute right-4 top-16 bg-[#0f1117] p-4 rounded-lg shadow-lg z-[999]">
  <div id="signInUp" class="mb-4">
    <h4 class="text-white font-bold mb-2">Sign In / Sign Up</h4>
    <input id="usernameInput" class="w-full p-2 rounded bg-[#111827] border border-gray-700 mb-2" placeholder="Username or Email" />
    <input id="passwordInput" type="password" class="w-full p-2 rounded bg-[#111827] border border-gray-700 mb-2" placeholder="Password" />
    <div class="flex space-x-2">
      <button onclick="signIn()" class="flex-1 bg-red-600 p-2 rounded font-bold">Sign In</button>
      <button onclick="signUp()" class="flex-1 bg-gray-700 p-2 rounded font-bold">Sign Up</button>
    </div>
    <div class="mt-2 text-center text-xs text-gray-400">
      <button onclick="signOut()" class="underline">Sign Out</button>
    </div>
    <button onclick="clearHistoryConfirm()" class="mt-2 w-full bg-gray-700 p-2 rounded font-bold text-sm">Clear History</button>
  </div>
  <div id="userInfo" class="hidden text-center">
    <div class="w-20 h-20 bg-gradient-to-tr from-red-600 to-indigo-600 rounded-full mx-auto mb-2 flex items-center justify-center font-bold text-xl">Y</div>
    <div id="userNameDisplay" class="text-white font-bold mb-2"></div>
    <button onclick="clearAllData()" class="w-full bg-red-600 p-2 rounded font-bold mb-2">Clear Data</button>
  </div>
</div>

<!-- Main pages -->
<div id="homePage" class="page-view active">
  <!-- Search bar -->
  <div class="p-4">
    <div class="flex items-center bg-[#111827] rounded-full px-4 py-2 mb-4">
      <i class="fa fa-search text-gray-400 mr-2"></i>
      <input id="searchInput" class="w-full bg-transparent outline-none text-white" placeholder="Search for anime, movies..." oninput="searchAnime()" />
      <button id="installBtn" class="ml-2 bg-indigo-600 px-3 py-1 rounded-full font-bold text-sm uppercase hover:bg-indigo-500">Install</button>
    </div>
    <!-- Categories: TV Series, Movies, OVA, Special -->
    <div class="flex space-x-2 mb-4 flex-wrap">
      <button onclick="filterCategory('TV')">TV Series</button>
      <button onclick="filterCategory('MOVIE')">Movies</button>
      <button onclick="filterCategory('OVA')">OVA</button>
      <button onclick="filterCategory('SPECIAL')">Special</button>
    </div>
  </div>
  <!-- Content -->
  <div id="contentArea" class="px-4"></div>
</div>

<!-- Wishlist page -->
<div id="wishlistPage" class="page-view p-4">
  <h2 class="text-2xl font-bold mb-4">My Wishlist</h2>
  <div id="wishlistGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

<!-- Genre page -->
<div id="genrePage" class="page-view p-4">
  <h2 class="text-2xl font-bold mb-4" id="genreTitle"></h2>
  <div id="genreContent" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

<!-- Player modal -->
<div id="playerModal" class="fixed inset-0 bg-black bg-opacity-80 z-[9999] hidden flex-col justify-center items-center p-4">
  <div class="w-full max-w-4xl relative">
    <div class="absolute top-2 right-2 cursor-pointer text-white text-xl z-[9999]" onclick="closePlayer()">×</div>
    <h3 id="playerTitle" class="text-white mb-2 text-center"></h3>
    <video id="videoPlayer" controls playsinline class="w-full aspect-[16/9] bg-black rounded-lg"></video>
    <div class="mt-4 flex justify-center gap-4" id="playerControls">
      <button onclick="nextEpisode()" class="bg-red-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-red-500">Next Episode</button>
      <button onclick="showTrailer(currentAnime?.trailer?.id)" class="bg-indigo-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-indigo-500">Trailer</button>
    </div>
  </div>
</div>

<!-- Trailer overlay -->
<div id="trailerOverlay" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-[9999]" onclick="closeTrailer()">
  <div class="relative w-full max-w-4xl aspect-video">
    <iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
    <button class="absolute top-2 right-2 text-white text-xl" onclick="closeTrailer()">×</button>
  </div>
</div>

  document.querySelectorAll('.page-view').forEach(p => p.classList.toggle('active', p.id===pageId));

// =================== Toggle Dropdown ====================
function toggleDropdown(id){
  document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.add('hidden'); });
  document.getElementById(id).classList.toggle('hidden');
}

async function fetchData(query, variables, target) {
  try {
    const response = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query, variables})
    });
    const data = await response.json();
    return data.data;
  } catch(e) { console.error(e); return null; }
}

// =================== Sign Up / Sign In / Sign Out ====================
function signUp(){
  const username=document.getElementById('usernameInput').value;
  const password=document.getElementById('passwordInput').value;
  if(username && password){
    localStorage.setItem('ymls_user', JSON.stringify({username, password}));
    alert('Signed Up!');
  }
}
function signIn(){
  const username=document.getElementById('usernameInput').value;
  const password=document.getElementById('passwordInput').value;
  if(username && password){
    localStorage.setItem('ymls_active_user', JSON.stringify({username}));
    alert('Signed In!');
    updateUserUI();
  }
}
function signOut(){
  localStorage.removeItem('ymls_active_user');
  updateUserUI();
}
function updateUserUI(){
  const user=JSON.parse(localStorage.getItem('ymls_active_user'));
  if(user){
    document.getElementById('userNameDisplay').innerText=user.username;
    document.getElementById('signInUp').classList.add('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
  } else {
    document.getElementById('userNameDisplay').innerText='';
    document.getElementById('signInUp').classList.remove('hidden');
    document.getElementById('userInfo').classList.add('hidden');
  }
}

  const genres=['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mystery','Romance','Sci-Fi','Sports','Supernatural'];
  const genreContainer=document.getElementById('genreOptions');
  genres.forEach(g=> {
    genreContainer.innerHTML+=`<button class="bg-gray-700 px-2 py-1 rounded" onclick="filterGenre('${g}')">${g}</button>`;
  });
  const yearContainer=document.getElementById('yearOptions');
  for(let y=2023; y>=2000; y--){
    yearContainer.innerHTML+=`<button class="bg-gray-700 px-2 py-1 rounded" onclick="filterYear(${y})">${y}</button>`;
  }
}
