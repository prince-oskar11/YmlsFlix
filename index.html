<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-bg {
            height: 60vh;
            background: linear-gradient(to bottom, rgba(10,10,10,0.5), #0a0a0a), url('https://images.alphacoders.com/605/605359.jpg');
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease-in-out;
        }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .poster-card:hover { transform: scale(1.05); transition: 0.3s; cursor: pointer; }
        .ep-badge { position: absolute; top: 10px; left: 10px; background: #6366f1; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .wish-btn { position: absolute; top: 10px; right: 10px; color: white; text-shadow: 0 0 5px black; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="p-4 flex justify-between items-center sticky top-0 z-50 glass">
    <h1 class="text-2xl font-bold text-red-600 tracking-tighter">YMLSFLIX <span class="text-white">PRO</span></h1>
    <div class="flex gap-6 text-xl">
        <i class="fas fa-home cursor-pointer hover:text-indigo-500" onclick="location.reload()"></i>
        <i class="fas fa-th-large cursor-pointer hover:text-indigo-500" onclick="toggleSection('genres')"></i>
        <i class="fas fa-heart cursor-pointer hover:text-indigo-500" onclick="toggleSection('wishlist')"></i>
        <i class="fas fa-user-circle cursor-pointer hover:text-indigo-500" onclick="toggleSection('profile')"></i>
    </div>
</nav>

<div id="main-content">
    <div class="hero-bg flex items-end p-8" id="hero">
        <div>
            <h2 class="text-5xl font-bold mb-4" id="hero-title">Welcome to YmlsFlix</h2>
            <p class="max-w-xl text-gray-300 mb-6">Stream your favorite anime masterpieces in high definition.</p>
        </div>
    </div>

    <div class="px-8 -mt-10">
        <div class="flex gap-4 items-center mb-6">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                <input type="text" id="searchInput" oninput="searchAnime(this.value)" placeholder="Search for anime..." class="w-full bg-zinc-900 border border-zinc-700 py-3 pl-12 pr-4 rounded-lg focus:outline-none focus:border-indigo-500">
                <div id="searchResults" class="absolute w-full bg-zinc-900 mt-2 rounded-lg z-50 max-h-96 overflow-y-auto hidden"></div>
            </div>
            <button class="bg-indigo-600 px-6 py-3 rounded-lg font-bold hover:bg-indigo-700">INSTALL</button>
        </div>

        <div class="flex gap-4 mb-8">
            <button class="bg-zinc-800 px-4 py-2 rounded-full hover:bg-zinc-700">TV SERIES</button>
            <button class="bg-zinc-800 px-4 py-2 rounded-full hover:bg-zinc-700">MOVIES</button>
            <button class="bg-zinc-800 px-4 py-2 rounded-full hover:bg-zinc-700">OVA</button>
        </div>

        <section class="mb-10">
            <h3 class="text-xl font-bold mb-4 text-orange-400 uppercase tracking-widest">Trending Now</h3>
            <div id="trending-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>

        <section class="mb-10">
            <h3 class="text-xl font-bold mb-4 text-yellow-500 uppercase tracking-widest">Top Rated Masterpieces</h3>
            <div id="top-rated-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </div>
</div>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-90 z-[100] hidden overflow-y-auto p-4">
    <div class="max-w-4xl mx-auto bg-zinc-900 rounded-xl overflow-hidden mt-10">
        <div id="trailer-container" class="aspect-video w-full bg-black"></div>
        <div class="p-6">
            <div class="flex justify-between items-start">
                <h2 id="modal-title" class="text-3xl font-bold"></h2>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <div class="flex gap-4 my-4">
                <button class="bg-white text-black px-6 py-2 rounded font-bold" onclick="alert('Rotating to fullscreen... Playing Now')">PLAY NOW</button>
                <button class="bg-zinc-700 px-6 py-2 rounded font-bold" id="modal-wishlist-btn">ADD TO WISHLIST</button>
            </div>
            <p id="modal-synopsis" class="text-gray-400 leading-relaxed"></p>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://api.jikan.moe/v4";

    async function fetchData(endpoint, containerId) {
        try {
            const response = await fetch(`${API_BASE}/${endpoint}`);
            const data = await response.json();
            renderAnime(data.data.slice(0, 6), containerId);
            
            if(containerId === 'top-rated-grid') {
                document.getElementById('hero').style.backgroundImage = `linear-gradient(to bottom, rgba(10,10,10,0.5), #0a0a0a), url('${data.data[0].images.jpg.large_image_url}')`;
                document.getElementById('hero-title').innerText = data.data[0].title;
            }
        } catch (error) { console.error("Error fetching data:", error); }
    }

    function renderAnime(animeList, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = animeList.map(anime => `
            <div class="relative poster-card" onclick="openModal(${anime.mal_id})">
                <span class="ep-badge">EP ${anime.episodes || '??'}</span>
                <i class="fas fa-heart wish-btn" onclick="event.stopPropagation(); alert('Added to Wishlist!')"></i>
                <img src="${anime.images.jpg.image_url}" class="w-full h-64 object-cover rounded-lg shadow-lg">
                <p class="mt-2 text-sm font-semibold truncate">${anime.title}</p>
                <p class="text-xs text-gray-500">${anime.type} • ${anime.status}</p>
            </div>
        `).join('');
    }

    async function searchAnime(query) {
        const resultsDiv = document.getElementById('searchResults');
        if (query.length < 3) { resultsDiv.classList.add('hidden'); return; }
        
        const resp = await fetch(`${API_BASE}/anime?q=${query}`);
        const data = await resp.json();
        
        resultsDiv.classList.remove('hidden');
        resultsDiv.innerHTML = data.data.slice(0, 5).map(anime => `
            <div class="flex items-center gap-4 p-3 hover:bg-zinc-800 cursor-pointer" onclick="openModal(${anime.mal_id})">
                <img src="${anime.images.jpg.small_image_url}" class="w-12 h-16 object-cover rounded">
                <div>
                    <p class="font-bold text-sm">${anime.title}</p>
                    <p class="text-xs text-gray-400">${anime.year || 'N/A'}</p>
                </div>
            </div>
        `).join('');
    }

    async function openModal(id) {
        const resp = await fetch(`${API_BASE}/anime/${id}/full`);
        const { data } = await resp.json();
        
        document.getElementById('modal-title').innerText = data.title;
        document.getElementById('modal-synopsis').innerText = data.synopsis;
        document.getElementById('modal').classList.remove('hidden');
        
        if (data.trailer.youtube_id) {
            document.getElementById('trailer-container').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${data.trailer.youtube_id}" frameborder="0" allowfullscreen></iframe>`;
        } else {
            document.getElementById('trailer-container').innerHTML = `<div class="flex items-center justify-center h-full text-gray-500">No Trailer Available</div>`;
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('trailer-container').innerHTML = '';
    }

    function toggleSection(section) {
        if(section === 'profile') {
            const confirmClear = confirm("Are you sure you want to clear history?");
            if(confirmClear) alert("History Cleared!");
        } else {
            alert("Opening " + section + " section...");
        }
    }

    // Initialize
    fetchData('top/anime?filter=bypopularity', 'trending-grid');
    fetchData('top/anime?filter=favorite', 'top-rated-grid');
</script>
</body>
</html>
