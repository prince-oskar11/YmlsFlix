<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --accent: #5d5dff; --red: #ff4d4d; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #hero-bg { transition: background 1s ease; background-size: cover; background-position: center; }
        .active-tab { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .dropdown { display: none; position: absolute; top: 100%; right: 0; width: 200px; z-index: 100; border-radius: 12px; }
        .show { display: block; }
    </style>
</head>
<body class="pb-20">

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center hidden">
        <div class="glass p-8 rounded-2xl w-80 text-center">
            <h2 id="auth-title" class="text-2xl font-bold mb-4 text-red-500">Sign In</h2>
            <input type="text" id="auth-user" placeholder="Username or Email" class="w-full bg-zinc-800 p-3 rounded-lg mb-3 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-zinc-800 p-3 rounded-lg mb-4 outline-none">
            <button onclick="handleAuth()" class="w-full bg-blue-600 p-3 rounded-lg font-bold mb-3">Continue</button>
            <p onclick="toggleAuthMode()" id="auth-switch" class="text-xs text-gray-400 cursor-pointer">Don't have an account? Sign Up</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-[150] glass px-5 py-4 flex justify-between items-center">
        <div onclick="showPage('home')" class="cursor-pointer">
            <h1 class="text-xl font-black text-red-500 italic">YMLSFLIX <span class="text-white block text-[10px] mt-[-4px]">PRO</span></h1>
        </div>
        <div class="flex gap-8 text-xl items-center relative">
            <i onclick="showPage('home')" class="fa-solid fa-house cursor-pointer hover:text-blue-500"></i>
            
            <!-- Genre Dropdown Trigger -->
            <div class="relative">
                <i onclick="toggleDropdown()" class="fa-solid fa-layer-group cursor-pointer hover:text-blue-500"></i>
                <div id="genre-dropdown" class="dropdown glass p-2 mt-2">
                    <button onclick="loadGenres('all')" class="w-full text-left p-3 hover:bg-white/10 rounded-lg text-sm border-b border-white/5">All Genres</button>
                    <button onclick="loadGenres('years')" class="w-full text-left p-3 hover:bg-white/10 rounded-lg text-sm">Years (2000+)</button>
                </div>
            </div>

            <i onclick="showPage('wishlist')" class="fa-solid fa-heart cursor-pointer hover:text-blue-500"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user cursor-pointer hover:text-blue-500"></i>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="p-4">
        <div class="flex gap-3 items-center mb-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-500"></i>
                <input oninput="liveSearch(this.value)" type="text" placeholder="Search for anime..." class="w-full bg-zinc-900 py-3 pl-10 pr-4 rounded-xl outline-none border border-white/5 focus:border-blue-500">
                <div id="search-results" class="absolute top-14 left-0 w-full glass rounded-xl z-[160] max-h-80 overflow-y-auto hidden"></div>
            </div>
            <button class="bg-blue-600 px-5 py-3 rounded-xl font-bold text-xs">INSTALL</button>
        </div>
        <div class="flex gap-3 overflow-x-auto hide-scroll pb-2">
            <button onclick="filterType('tv')" class="bg-zinc-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap">TV SERIES</button>
            <button onclick="filterType('movie')" class="bg-zinc-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap">MOVIES</button>
            <button onclick="filterType('ova')" class="bg-zinc-800 px-6 py-2 rounded-full text-xs font-bold whitespace-nowrap">OVA</button>
        </div>
    </div>

    <!-- Background Hero -->
    <div id="hero-bg" class="w-full h-72 relative flex flex-col justify-end p-6 mb-6">
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent"></div>
        <div class="z-10">
            <p class="text-yellow-500 font-bold text-[10px] tracking-widest uppercase mb-1">Top Rated Masterpiece</p>
            <h2 id="hero-title" class="text-3xl font-bold leading-tight">...</h2>
        </div>
    </div>

    <!-- Pages -->
    <main id="main-content" class="px-4">
        
        <!-- Home -->
        <section id="page-home" class="page-section">
            <div class="mb-10">
                <h3 class="text-orange-500 font-bold tracking-tighter uppercase text-sm mb-4">Trending Now</h3>
                <div id="trending-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>

            <div class="mb-10">
                <h3 class="text-blue-500 font-bold tracking-tighter uppercase text-sm mb-4">Most Popular</h3>
                <div id="popular-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>

            <div class="mb-10">
                <h3 class="text-green-500 font-bold tracking-tighter uppercase text-sm mb-4">Playing Now (Airing)</h3>
                <div id="playing-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>

            <div class="mb-10">
                <h3 class="text-purple-500 font-bold tracking-tighter uppercase text-sm mb-4">Upcoming</h3>
                <div id="upcoming-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>
        </section>

        <!-- Genre Results -->
        <section id="page-genres" class="page-section hidden">
            <h2 id="genre-head" class="text-xl font-bold mb-6">Exploring</h2>
            <div id="genre-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
            <div id="genre-results" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- Wishlist -->
        <section id="page-wishlist" class="page-section hidden text-center py-10">
            <h2 class="text-2xl font-bold mb-6 text-red-500">My Wishlist</h2>
            <div id="wishlist-grid" class="grid grid-cols-2 gap-4 text-left"></div>
        </section>

        <!-- Profile -->
        <section id="page-profile" class="page-section hidden">
            <div class="glass p-8 rounded-3xl flex flex-col items-center">
                <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-full flex items-center justify-center text-4xl mb-4">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h2 id="user-display" class="text-xl font-bold">User</h2>
                <div class="w-full mt-10 space-y-4">
                    <button onclick="clearHistory()" class="w-full p-4 glass rounded-xl flex justify-between items-center text-sm">
                        <span>Clear History</span>
                        <i class="fa-solid fa-trash-can text-red-500"></i>
                    </button>
                    <button onclick="signOut()" class="w-full p-4 glass rounded-xl text-red-500 font-bold text-sm">Sign Out</button>
                </div>
            </div>
        </section>

        <!-- Details -->
        <section id="page-details" class="page-section hidden">
            <div id="player-box" class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden mb-6">
                <div id="p-overlay" class="absolute inset-0 flex flex-col items-center justify-center z-10 bg-black/40">
                    <button onclick="playTrailer()" class="bg-red-600 h-20 w-20 rounded-full flex items-center justify-center text-3xl shadow-2xl">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                    <p class="mt-4 font-bold text-sm uppercase tracking-widest">Watch Trailer</p>
                </div>
                <div id="video-wrap" class="hidden w-full h-full"></div>
            </div>

            <div class="flex gap-2 mb-4">
                <span class="bg-blue-600 text-[10px] px-2 py-1 rounded font-bold">SUB</span>
                <span id="dub-tag" class="bg-green-600 text-[10px] px-2 py-1 rounded font-bold hidden">DUB</span>
                <span class="bg-zinc-800 text-[10px] px-2 py-1 rounded font-bold" id="det-eps">... EPS</span>
            </div>

            <h1 id="det-name" class="text-3xl font-bold mb-4">Title</h1>
            
            <div class="flex gap-4 mb-8">
                <button onclick="detailWishlist()" class="bg-zinc-900 border border-white/10 flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-heart text-red-500"></i> Wishlist
                </button>
                <button onclick="rotatePlayer()" class="bg-zinc-900 border border-white/10 px-5 rounded-xl">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>

            <div class="flex gap-6 border-b border-white/5 mb-6 text-sm font-bold text-gray-400">
                <button onclick="setDetTab('syn')" id="t-syn" class="active-tab pb-2">SYNOPSIS</button>
                <button onclick="setDetTab('cha')" id="t-cha" class="pb-2">CHARACTERS</button>
            </div>

            <div id="det-syn" class="text-sm leading-relaxed text-gray-300"></div>
            <div id="det-cha" class="hidden grid grid-cols-2 gap-3"></div>

            <h3 class="font-bold mt-10 mb-4">Recommended</h3>
            <div id="rec-list" class="flex gap-4 overflow-x-auto hide-scroll mb-10"></div>
        </section>
    </main>

    <script>
        const API = 'https://api.jikan.moe/v4';
        let current = null;
        let searchWait;
        let wishlist = JSON.parse(localStorage.getItem('flix_wish')) || [];

        window.onload = () => {
            initHome();
            initUser();
            renderWishlist();
        };

        // --- Pages ---
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.getElementById('genre-dropdown').classList.remove('show');
            window.scrollTo(0,0);
        }

        // --- Dropdown Logic ---
        function toggleDropdown() {
            document.getElementById('genre-dropdown').classList.toggle('show');
        }

        function loadGenres(mode) {
            showPage('genres');
            const grid = document.getElementById('genre-grid');
            const res = document.getElementById('genre-results');
            res.innerHTML = "";
            
            if(mode === 'all') {
                const genres = [{id:1,n:'Action'},{id:2,n:'Adventure'},{id:4,n:'Comedy'},{id:8,n:'Drama'},{id:10,n:'Fantasy'},{id:22,n:'Romance'}];
                grid.innerHTML = genres.map(g => `<button onclick="getByGenre(${g.id})" class="glass p-4 rounded-xl text-xs font-bold">${g.n}</button>`).join('');
            } else {
                let yrs = []; for(let i=2024; i>=2010; i--) yrs.push(i);
                grid.innerHTML = yrs.map(y => `<button onclick="getByYear(${y})" class="glass p-4 rounded-xl text-xs font-bold">${y}</button>`).join('');
            }
        }

        // --- Data Fetching ---
        async function initHome() {
            const topRes = await fetch(`${API}/top/anime?limit=1`).then(r => r.json());
            if(topRes.data[0]) {
                const anime = topRes.data[0];
                document.getElementById('hero-bg').style.backgroundImage = `linear-gradient(rgba(5,5,5,0.4), #050505), url('${anime.images.jpg.large_image_url}')`;
                document.getElementById('hero-title').innerText = anime.title;
            }

            // Carousel Lists
            const trend = await fetch(`${API}/top/anime?filter=airing&limit=10`).then(r => r.json());
            render(trend.data, 'trending-list');

            const pop = await fetch(`${API}/top/anime?filter=bypopularity&limit=10`).then(r => r.json());
            render(pop.data, 'popular-list');

            const play = await fetch(`${API}/seasons/now?limit=10`).then(r => r.json());
            render(play.data, 'playing-list');

            const up = await fetch(`${API}/seasons/upcoming?limit=10`).then(r => r.json());
            render(up.data, 'upcoming-list', true);
        }

        function render(data, target, date=false) {
            const el = document.getElementById(target);
            el.innerHTML = data.map(a => `
                <div class="min-w-[150px] relative cursor-pointer" onclick="openDetails(${a.mal_id})">
                    <div class="aspect-[2/3] rounded-2xl overflow-hidden relative border border-white/5">
                        <img src="${a.images.jpg.image_url}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-black/80 px-2 py-1 rounded text-[10px] font-bold">${a.episodes || '?'} EP</div>
                        <div onclick="event.stopPropagation(); toggleWish(${a.mal_id}, '${a.title.replace(/'/g, "")}', '${a.images.jpg.image_url}')" 
                             class="absolute top-2 right-2 h-7 w-7 glass rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-heart ${isWish(a.mal_id) ? 'text-red-500' : ''}"></i>
                        </div>
                    </div>
                    <p class="text-[11px] font-bold mt-2 line-clamp-2">${a.title}</p>
                    ${date ? `<p class="text-[9px] text-gray-500 mt-1">${a.aired.from?.split('T')[0] || 'TBA'}</p>` : ''}
                </div>
            `).join('');
        }

        // --- Details System ---
        async function openDetails(id) {
            showPage('details');
            const res = await fetch(`${API}/anime/${id}/full`).then(r => r.json());
            const a = res.data;
            current = a;

            document.getElementById('det-name').innerText = a.title;
            document.getElementById('det-eps').innerText = `${a.episodes || '?'} EPISODES`;
            document.getElementById('det-syn').innerText = a.synopsis;
            document.getElementById('dub-tag').classList.toggle('hidden', a.score < 8);
            
            // Reset Player
            document.getElementById('p-overlay').classList.remove('hidden');
            document.getElementById('video-wrap').classList.add('hidden').innerHTML = "";

            // Characters
            const cRes = await fetch(`${API}/anime/${id}/characters`).then(r => r.json());
            document.getElementById('det-cha').innerHTML = cRes.data.slice(0,6).map(c => `
                <div class="flex gap-3 glass p-2 rounded-xl">
                    <img src="${c.character.images.jpg.image_url}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-bold truncate">${c.character.name}</p>
                        <p class="text-[9px] text-gray-500 italic">${c.role}</p>
                    </div>
                </div>
            `).join('');

            // Recs
            const rRes = await fetch(`${API}/anime/${id}/recommendations`).then(r => r.json());
            render(rRes.data.slice(0,10).map(x => x.entry), 'rec-list');
        }

        function playTrailer() {
            if(current.trailer.embed_url) {
                document.getElementById('p-overlay').classList.add('hidden');
                document.getElementById('video-wrap').classList.remove('hidden');
                document.getElementById('video-wrap').innerHTML = `
                    <iframe src="${current.trailer.embed_url}&autoplay=1" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    <button id="next-ep" onclick="alert('Episode 2 starting soon...')" class="absolute bottom-4 right-4 bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold hidden">NEXT EPISODE</button>
                `;
                setTimeout(() => document.getElementById('next-ep')?.classList.remove('hidden'), 5000);
            } else {
                alert("Trailer currently unavailable for this title.");
            }
        }

        // --- Functionalities ---
        function liveSearch(val) {
            clearTimeout(searchWait);
            if(val.length < 3) { document.getElementById('search-results').classList.add('hidden'); return; }
            searchWait = setTimeout(async () => {
                const res = await fetch(`${API}/anime?q=${val}&limit=5`).then(r => r.json());
                const box = document.getElementById('search-results');
                box.innerHTML = res.data.map(a => `
                    <div onclick="openDetails(${a.mal_id})" class="flex items-center gap-4 p-3 hover:bg-white/5 cursor-pointer border-b border-white/5">
                        <img src="${a.images.jpg.small_image_url}" class="w-10 h-14 rounded object-cover">
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold truncate">${a.title}</p>
                            <p class="text-[10px] text-gray-400">${a.type} • Score: ${a.score || 'N/A'}</p>
                        </div>
                    </div>
                `).join('');
                box.classList.remove('hidden');
            }, 500);
        }

        async function getByGenre(id) {
            const res = await fetch(`${API}/anime?genres=${id}&limit=12&order_by=score&sort=desc`).then(r => r.json());
            renderResults(res.data);
        }

        async function getByYear(y) {
            const res = await fetch(`${API}/anime?start_date=${y}-01-01&end_date=${y}-12-31&limit=12&order_by=score&sort=desc`).then(r => r.json());
            renderResults(res.data);
        }

        async function filterType(t) {
            showPage('genres');
            const res = await fetch(`${API}/anime?type=${t}&limit=12&order_by=score&sort=desc`).then(r => r.json());
            renderResults(res.data);
        }

        function renderResults(data) {
            document.getElementById('genre-results').innerHTML = data.map(a => `
                <div onclick="openDetails(${a.mal_id})" class="aspect-[2/3] rounded-xl overflow-hidden relative">
                    <img src="${a.images.jpg.image_url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                    <p class="absolute bottom-2 left-2 text-[10px] font-bold line-clamp-1">${a.title}</p>
                </div>
            `).join('');
        }

        // --- Wishlist System ---
        function toggleWish(id, title, img) {
            const idx = wishlist.findIndex(x => x.id === id);
            if(idx > -1) wishlist.splice(idx, 1);
            else wishlist.push({id, title, img});
            localStorage.setItem('flix_wish', JSON.stringify(wishlist));
            renderWishlist();
            initHome(); // refresh icons
        }

        function isWish(id) { return wishlist.some(x => x.id === id); }

        function renderWishlist() {
            const g = document.getElementById('wishlist-grid');
            if(wishlist.length === 0) { g.innerHTML = "<p class='col-span-2 text-center text-gray-500 py-10'>Wishlist is empty</p>"; return; }
            g.innerHTML = wishlist.map(a => `
                <div onclick="openDetails(${a.id})" class="aspect-[2/3] rounded-2xl overflow-hidden relative border border-white/10 shadow-lg">
                    <img src="${a.img}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 left-0 w-full p-2 bg-black/60 backdrop-blur-md">
                        <p class="text-[9px] font-bold truncate">${a.title}</p>
                    </div>
                </div>
            `).join('');
        }

        function detailWishlist() { if(current) toggleWish(current.mal_id, current.title, current.images.jpg.image_url); }

        // --- Profile & Misc ---
        function initUser() {
            const u = localStorage.getItem('flix_user');
            if(!u) document.getElementById('auth-modal').classList.remove('hidden');
            else document.getElementById('user-display').innerText = u;
        }

        function handleAuth() {
            const val = document.getElementById('auth-user').value;
            if(val.length < 3) return alert("Enter valid credentials");
            localStorage.setItem('flix_user', val);
            location.reload();
        }

        function signOut() { localStorage.removeItem('flix_user'); location.reload(); }

        function clearHistory() { if(confirm("Confirm: Clear all watch history?")) alert("History Cleared."); }

        function rotatePlayer() {
            const p = document.getElementById('player-box');
            if (document.fullscreenElement) document.exitFullscreen();
            else p.requestFullscreen().then(() => { if(screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); });
        }

        function setDetTab(t) {
            document.getElementById('det-syn').classList.toggle('hidden', t !== 'syn');
            document.getElementById('det-cha').classList.toggle('hidden', t !== 'cha');
            document.getElementById('t-syn').classList.toggle('active-tab', t === 'syn');
            document.getElementById('t-cha').classList.toggle('active-tab', t === 'cha');
        }

        function toggleAuthMode() {
            const t = document.getElementById('auth-title');
            t.innerText = t.innerText === "Sign In" ? "Sign Up" : "Sign In";
        }
    </script>
</body>
</html>
