<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YMLSFLIX PRO | v60 ULTIMATE FULL RECOVERY</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --plyr-color-main: #ef4444; 
            --bg: #05070a; 
            --card: #0f1117; 
            --accent: #6366f1;
        }

        body { 
            background: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
            font-size: 13px; 
        }

        /* --- UI UTILITIES --- */
        .glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: -1px; }
        
        /* --- ANIME CARDS & GRID --- */
        .anime-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            position: relative; 
            border-radius: 16px; 
            overflow: hidden; 
            background: var(--card); 
            width: 155px; 
            flex-shrink: 0; 
            border: 1px solid rgba(255,255,255,0.03); 
        }
        .anime-card:hover { transform: translateY(-10px) scale(1.02); border-color: #ef4444; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; transition: 0.5s; }
        .anime-card:hover .card-img { filter: brightness(0.7); }
        
        .ep-badge { position: absolute; top: 10px; left: 10px; background: #ef4444; color: white; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 6px; z-index: 10; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4); }
        
        /* SYNC DOT & NOTIFICATIONS */
        .sync-dot { position: absolute; bottom: 10px; right: 10px; width: 12px; height: 12px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 15px #22c55e; z-index: 20; border: 2px solid var(--bg); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.6; } 100% { transform: scale(1); opacity: 1; } }

        /* --- DROPDOWNS & MODALS --- */
        .dropdown-content { display: none; position: fixed; top: 130px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 24px; z-index: 3000; width: 92%; max-width: 500px; padding: 30px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        .show { display: block !important; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .page-view { display: none; min-height: 100vh; padding-bottom: 120px; }
        .active-view { display: block; }
        .grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- PLAYER INTERFACE --- */
        #videoContainer { background: #000; position: relative; width: 100%; aspect-ratio: 16/9; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .char-img { width: 55px; height: 55px; border-radius: 14px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .char-img:hover { transform: scale(1.1); border-color: #ef4444; }
        
        #hero { height: 70vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 90px; position: relative; }
        .hero-grad { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 10%, rgba(5,7,10,0.4) 45%, transparent 100%); }

        /* TAB STYLING */
        .tab-trigger { flex: 1; padding-bottom: 12px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #4b5563; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-trigger.active { color: white; border-color: #ef4444; }

        /* SHIMMER LOADERS */
        .shimmer { background: linear-gradient(90deg, #0f1117 25%, #1f2937 50%, #0f1117 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div id="choiceOverlay" class="fixed inset-0 bg-black/95 z-[5000] hidden items-center justify-center backdrop-blur-xl" onclick="this.style.display='none'">
        <div class="bg-[#0f1117] p-10 rounded-[40px] max-w-sm w-full text-center border border-white/5 shadow-2xl" onclick="event.stopPropagation()">
            <img id="choiceImg" class="w-48 h-64 mx-auto rounded-3xl mb-8 object-cover shadow-red-900/20 shadow-2xl">
            <h3 id="choiceTitle" class="text-white font-black uppercase text-sm mb-10 tracking-widest leading-tight"></h3>
            <div class="space-y-4">
                <button id="choicePlay" class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-black text-[12px] uppercase tracking-widest transition-all">Stream Now</button>
                <button onclick="document.getElementById('choiceOverlay').style.display='none'" class="w-full bg-white/5 py-5 rounded-2xl font-black text-[12px] uppercase text-gray-500 hover:bg-white/10">Close</button>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[2500] glass p-6">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-3xl logo-text cursor-pointer" onclick="showPage('home')">YMLSFLIX PRO</h1>
            <div class="flex items-center gap-10">
                <i onclick="showPage('home')" class="fa fa-home text-gray-400 text-2xl cursor-pointer hover:text-white transition-colors"></i>
                <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 text-2xl cursor-pointer hover:text-white transition-colors"></i>
            </div>
        </div>
        <div class="container mx-auto mt-8 flex gap-4">
            <div class="relative w-full group">
                <i class="fa fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-red-500 transition-colors"></i>
                <input type="text" id="searchBar" class="bg-[#111827] border border-[#1f2937] text-white pl-16 pr-6 py-5 rounded-2xl w-full outline-none focus:border-red-600 transition-all shadow-inner" placeholder="Search anime title..." oninput="handleSearch(this.value)">
            </div>
            <button id="installBtn" onclick="triggerInstall()" class="hidden bg-indigo-600 hover:bg-indigo-700 text-[11px] font-black px-8 rounded-2xl uppercase tracking-widest shadow-lg shadow-indigo-900/30">Install</button>
        </div>
        
        <div id="genreDrop" class="dropdown-content">
            <div class="flex mb-8 gap-8 border-b border-white/5">
                <button id="tabGen" onclick="switchTab('genres')" class="tab-trigger active">Categories</button>
                <button id="tabYear" onclick="switchTab('years')" class="tab-trigger">Season Year</button>
            </div>
            <div id="genreList" class="grid grid-cols-3 gap-4 max-h-80 overflow-y-auto no-scrollbar"></div>
            <div id="yearList" class="grid grid-cols-3 gap-4 max-h-80 overflow-y-auto no-scrollbar hidden"></div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-64">
        <header id="hero">
            <div class="hero-grad"></div>
            <div class="container mx-auto px-10 relative z-10">
                <h2 id="heroTitle" class="text-6xl font-black mb-6 uppercase italic tracking-tighter leading-none max-w-3xl drop-shadow-2xl"></h2>
                <div id="heroMeta" class="flex gap-5 mb-8 text-[11px] font-black text-red-500 uppercase tracking-[0.3em]"></div>
                <p id="heroDesc" class="text-gray-400 text-sm max-w-xl line-clamp-3 mb-12 font-medium leading-relaxed"></p>
                <button id="heroPlayBtn" class="bg-white text-black px-20 py-6 rounded-full font-black text-[12px] uppercase hover:bg-red-600 hover:text-white transition-all shadow-2xl shadow-white/10">Stream Now</button>
            </div>
        </header>

        <main class="container mx-auto p-8 space-y-32">
            <section id="continueSection" class="hidden">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-[12px] font-black uppercase text-green-500 tracking-[0.5em] border-l-4 border-green-500 pl-6">Continue Watching</h2>
                </div>
                <div id="continueGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6"></div>
            </section>

            <section>
                <h2 class="text-[12px] font-black uppercase text-orange-500 tracking-[0.5em] mb-10 border-l-4 border-orange-500 pl-6">Trending Worldwide</h2>
                <div id="trendingGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6"></div>
            </section>

            <section>
                <h2 class="text-[12px] font-black uppercase text-blue-500 tracking-[0.5em] mb-10 border-l-4 border-blue-500 pl-6">Top Rated Classics</h2>
                <div id="topGrid" class="flex gap-8 overflow-x-auto no-scrollbar pb-6"></div>
            </section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto p-8 pt-80">
        <div class="mb-16 border-l-8 border-red-600 pl-8">
            <h2 id="filterTitle" class="text-4xl font-black uppercase text-white tracking-tighter">Browse Library</h2>
            <p class="text-gray-500 text-[11px] uppercase font-bold tracking-[0.4em] mt-3">Refined results from database</p>
        </div>
        <div id="filterGrid" class="grid-full"></div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
        <div class="glass p-6 sticky top-0 flex justify-between items-center z-50">
            <button onclick="closePlayer()" class="w-14 h-14 rounded-2xl bg-gray-900 flex items-center justify-center border border-white/5 hover:border-red-600 transition-all shadow-xl">
                <i class="fa fa-chevron-left text-white"></i>
            </button>
            <div id="playerTitle" class="text-[11px] font-black uppercase truncate max-w-[250px] text-gray-400 tracking-[0.2em]"></div>
            <div class="flex gap-4">
                <button onclick="setMode('sub')" id="subBtn" class="px-8 py-3 text-[10px] font-black rounded-xl bg-red-600 transition-all shadow-lg shadow-red-900/40">SUB</button>
                <button onclick="setMode('dub')" id="dubBtn" class="px-8 py-3 text-[10px] font-black rounded-xl bg-gray-800 transition-all">DUB</button>
            </div>
        </div>

        <div id="videoContainer">
            <video id="player" playsinline controls class="w-full h-full"></video>
        </div>

        <div class="p-10 container mx-auto grid grid-cols-1 lg:grid-cols-3 gap-16">
            <div class="lg:col-span-2">
                <h2 class="text-[12px] font-black uppercase text-gray-500 tracking-[0.4em] mb-8 border-b border-white/5 pb-4">Select Episode</h2>
                <div id="epList" class="flex gap-5 overflow-x-auto no-scrollbar mb-16 py-4"></div>
                
                <h2 class="text-[12px] font-black uppercase text-gray-500 tracking-[0.4em] mb-8 border-b border-white/5 pb-4">Stream Quality</h2>
                <div id="serverList" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>
            
            <div class="lg:col-span-1">
                <div class="bg-white/5 border border-white/5 rounded-[40px] p-10 shadow-2xl">
                    <h4 class="text-white font-black text-[12px] uppercase mb-8 border-b border-white/10 pb-4 tracking-[0.2em]">Anime Info</h4>
                    <div id="animeDetails" class="text-gray-400 text-[11px] space-y-4 uppercase font-black tracking-tight mb-10"></div>
                    
                    <h4 class="text-white font-black text-[12px] uppercase mb-8 border-b border-white/10 pb-4 tracking-[0.2em]">Main Characters</h4>
                    <div id="charGrid" class="grid grid-cols-4 gap-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        const STREAM_API = 'https://api.consumet.org/anime/gogoanime';
        
        let playMode = 'sub', 
            currentAnime = null, 
            currentEp = 1, 
            plyrInstance, 
            hlsInstance, 
            lastTap = 0, 
            deferredPrompt;

        // --- 1. INITIALIZATION ---
        window.onload = () => {
            // Setup Plyr
            plyrInstance = new Plyr('#player', { 
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                tooltips: { controls: true, seek: true }
            });
            
            // Double Tap to Seek Logic
            const vContainer = document.getElementById('videoContainer');
            vContainer.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    const rect = vContainer.getBoundingClientRect();
                    const x = e.changedTouches[0].clientX - rect.left;
                    if (x > rect.width / 2) {
                        plyrInstance.forward(10);
                        showSeekToast('+10s');
                    } else {
                        plyrInstance.rewind(10);
                        showSeekToast('-10s');
                    }
                }
                lastTap = now;
            });

            // Initialize App Modules
            initFilterButtons();
            loadHomeData();
            checkHistorySync();
            
            // Auto-Save Interval (Every 5 Seconds)
            setInterval(() => {
                if(plyrInstance && !plyrInstance.paused && currentAnime) {
                    saveUserProgress(currentAnime.id, currentEp, plyrInstance.currentTime);
                }
            }, 5000);

            // PWA Listener
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installBtn').classList.remove('hidden');
            });
        };

        // --- 2. PROGRESS & HISTORY LOGIC ---
        function saveUserProgress(id, ep, time) {
            let history = JSON.parse(localStorage.getItem('ymls_v60_hist')) || [];
            let index = history.findIndex(item => item.id === id);
            
            const data = { 
                ...currentAnime, 
                lastEp: ep, 
                lastTime: time, 
                totalEps: currentAnime.episodes,
                updatedAt: Date.now() 
            };

            if(index !== -1) {
                history[index] = data;
            } else {
                history.unshift(data);
            }
            
            // Keep history limited to 20 items
            if(history.length > 20) history.pop();
            localStorage.setItem('ymls_v60_hist', JSON.stringify(history));
        }

        async function checkHistorySync() {
            let history = JSON.parse(localStorage.getItem('ymls_v60_hist')) || [];
            if(history.length === 0) return;

            const ids = history.map(h => h.id);
            const query = `query($ids: [Int]){ Page { media(id_in: $ids) { id episodes nextAiringEpisode { episode } } } }`;
            
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, variables: { ids } })
                }).then(r => r.json());

                let hasUpdate = false;
                res.data.Page.media.forEach(apiItem => {
                    let local = history.find(h => h.id === apiItem.id);
                    if(local && apiItem.episodes > (local.totalEps || 0)) {
                        local.hasNew = true;
                        local.totalEps = apiItem.episodes;
                        hasUpdate = true;
                    }
                });

                if(hasUpdate) localStorage.setItem('ymls_v60_hist', JSON.stringify(history));
                
                renderGrid(history, 'continueGrid');
                document.getElementById('continueSection').classList.remove('hidden');
            } catch(e) { console.error("Sync Error:", e); }
        }

        // --- 3. DATA FETCHING ---
        async function loadHomeData() {
            const query = `
            query {
                trending: Page(perPage: 12) { media(type: ANIME, sort: TRENDING_DESC) { id title { english romaji } coverImage { large } bannerImage episodes description genres averageScore } }
                top: Page(perPage: 12) { media(type: ANIME, sort: SCORE_DESC) { id title { english romaji } coverImage { large } episodes } }
            }`;
            
            try {
                const r = await fetch(API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ query }) 
                }).then(res => res.json());

                if(r.data) {
                    renderGrid(r.data.trending.media, 'trendingGrid');
                    renderGrid(r.data.top.media, 'topGrid');
                    setupHero(r.data.trending.media[0]);
                }
            } catch(e) { console.error("Home Load Error:", e); }
        }

        async function fetchCastInfo(animeId) {
            const query = `
            query($id: Int) {
                Media(id: $id) {
                    status
                    season
                    seasonYear
                    averageScore
                    characters(perPage: 8, role: MAIN) {
                        edges {
                            node { name { full } image { large } }
                            voiceActors(language: JAPANESE) { name { full } }
                        }
                    }
                }
            }`;
            
            const r = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: { id: animeId } })
            }).then(res => res.json());

            const m = r.data.Media;
            document.getElementById('animeDetails').innerHTML = `
                <div class="flex justify-between"><span>Status</span><span class="text-white">${m.status}</span></div>
                <div class="flex justify-between"><span>Season</span><span class="text-white">${m.season} ${m.seasonYear}</span></div>
                <div class="flex justify-between"><span>Global Score</span><span class="text-white">${m.averageScore}%</span></div>
            `;
            
            document.getElementById('charGrid').innerHTML = m.characters.edges.map(e => `
                <img src="${e.node.image.large}" class="char-img" title="${e.node.name.full} (VA: ${e.voiceActors[0]?.name.full || 'N/A'})">
            `).join('');
        }

        // --- 4. RENDER ENGINE ---
        function renderGrid(list, targetId, isVertical = false) {
            const container = document.getElementById(targetId);
            if(!container) return;

            container.innerHTML = list.map(anime => `
                <div class="anime-card ${isVertical ? 'w-full' : ''}" onclick='showAnimeChoice(${JSON.stringify(anime).replace(/'/g, "&apos;")})'>
                    <div class="ep-badge">${anime.episodes || '?'} EP</div>
                    ${anime.hasNew ? '<div class="sync-dot"></div>' : ''}
                    <img src="${anime.coverImage.large}" class="card-img" loading="lazy">
                    <div class="p-4 truncate text-[10px] font-black uppercase text-gray-400 tracking-wider">
                        ${anime.title.english || anime.title.romaji}
                    </div>
                </div>
            `).join('');
        }

        function setupHero(anime) {
            const hero = document.getElementById('hero');
            hero.style.backgroundImage = `url(${anime.bannerImage || anime.coverImage.large})`;
            document.getElementById('heroTitle').innerText = anime.title.english || anime.title.romaji;
            document.getElementById('heroDesc').innerHTML = anime.description;
            document.getElementById('heroMeta').innerHTML = `
                <span>${anime.averageScore}% SCORE</span>
                <span>•</span>
                <span>${anime.genres[0]}</span>
                <span>•</span>
                <span>${anime.episodes || '??'} EPISODES</span>
            `;
            document.getElementById('heroPlayBtn').onclick = () => launchPlayer(anime);
        }

        // --- 5. PLAYER ENGINE ---
        async function launchPlayer(anime, episode = 1) {
            if(anime) currentAnime = anime;
            currentEp = episode;
            
            // UI Transition
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = `${currentAnime.title.english || currentAnime.title.romaji} — EPISODE ${episode}`;
            window.scrollTo(0,0);

            try {
                // Clean title for Consumet
                const cleanTitle = (currentAnime.title.romaji || currentAnime.title.english).replace(/[^a-zA-Z0-9 ]/g, '');
                const searchRes = await fetch(`${STREAM_API}/${cleanTitle}`).then(r => r.json());
                
                // Mode Selection (Sub vs Dub)
                const target = searchRes.results.find(r => playMode === 'dub' ? r.id.includes('-dub') : !r.id.includes('-dub')) || searchRes.results[0];
                
                const episodeData = await fetch(`${STREAM_API}/watch/${target.id}-episode-${episode}`).then(r => r.json());
                
                initializeHlsStream(episodeData.sources[0].url);
                
                // Render Qualities
                document.getElementById('serverList').innerHTML = episodeData.sources.map(s => `
                    <button onclick="initializeHlsStream('${s.url}')" class="px-6 py-4 bg-gray-900 border border-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-red-600 transition-all">${s.quality}</button>
                `).join('');
                
                generateEpisodeList(currentAnime.episodes || 12);
                fetchCastInfo(currentAnime.id);

            } catch (err) {
                console.error("Stream Launch Error:", err);
                alert("Failed to load stream. Try switching Sub/Dub mode.");
            }
        }

        function initializeHlsStream(url) {
            if (hlsInstance) hlsInstance.destroy();
            const videoElement = document.getElementById('player');
            
            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxBufferSize: 40 * 1000 * 1000, // 40MB
                    maxBufferLength: 35,
                    enableWorker: true
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    // Check for Resume Time
                    const history = JSON.parse(localStorage.getItem('ymls_v60_hist')) || [];
                    const savedItem = history.find(h => h.id === currentAnime.id);
                    if(savedItem && savedItem.lastEp === currentEp) {
                        videoElement.currentTime = savedItem.lastTime;
                    }
                    plyrInstance.play();
                });
            } else {
                videoElement.src = url;
                videoElement.play();
            }
        }

        // --- 6. NAVIGATION & SEARCH ---
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(view => view.classList.remove('active-view'));
            document.getElementById(`page-${pageId}`).classList.add('active-view');
            if(pageId === 'home') document.getElementById('searchBar').value = '';
            window.scrollTo(0,0);
        }

        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle('show');
        }

        function switchTab(type) {
            const isGen = type === 'genres';
            document.getElementById('genreList').classList.toggle('hidden', !isGen);
            document.getElementById('yearList').classList.toggle('hidden', isGen);
            document.getElementById('tabGen').classList.toggle('active', isGen);
            document.getElementById('tabYear').classList.toggle('active', !isGen);
        }

        async function handleSearch(query) {
            if(query.length < 3) return;
            showPage('filter');
            document.getElementById('filterTitle').innerText = `Search: ${query}`;
            
            const gql = `query($s:String){Page(perPage:30){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:gql, variables:{s:query}})}).then(res=>res.json());
            renderGrid(r.data.Page.media, 'filterGrid', true);
        }

        function initFilterButtons() {
            const gList = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports", "Supernatural", "Thriller"];
            document.getElementById('genreList').innerHTML = gList.map(g => `
                <button onclick="fetchFilteredData('${g}', null)" class="bg-white/5 p-5 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 transition-all">${g}</button>
            `).join('');

            let yList = '';
            for(let i=2026; i>=2016; i--) {
                yList += `<button onclick="fetchFilteredData(null, ${i})" class="bg-white/5 p-5 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 transition-all">${i}</button>`;
            }
            document.getElementById('yearList').innerHTML = yList;
        }

        async function fetchFilteredData(genre, year) {
            showPage('filter');
            document.getElementById('filterTitle').innerText = genre || `Year: ${year}`;
            toggleDropdown('genreDrop');
            
            const gql = `query($g:String, $y:Int){Page(perPage:40){media(genre:$g, seasonYear:$y, type:ANIME, sort:POPULARITY_DESC){id title{english romaji} coverImage{large} episodes}}}`;
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:gql, variables:{g:genre, y:year}})}).then(res=>res.json());
            renderGrid(r.data.Page.media, 'filterGrid', true);
        }

        // --- 7. HELPER FUNCTIONS ---
        function generateEpisodeList(count) {
            let html = '';
            for(let i=1; i<=count; i++) {
                html += `
                <button onclick="launchPlayer(null, ${i})" class="w-16 h-16 flex-shrink-0 rounded-2xl bg-gray-900 border ${currentEp===i?'border-red-600 text-red-600 shadow-lg shadow-red-900/20':'border-white/5'} font-black text-sm transition-all hover:scale-110">
                    ${i}
                </button>`;
            }
            document.getElementById('epList').innerHTML = html;
        }

        function showAnimeChoice(anime) {
            document.getElementById('choiceOverlay').style.display = 'flex';
            document.getElementById('choiceImg').src = anime.coverImage.large;
            document.getElementById('choiceTitle').innerText = anime.title.english || anime.title.romaji;
            document.getElementById('choicePlay').onclick = () => {
                document.getElementById('choiceOverlay').style.display = 'none';
                launchPlayer(anime, anime.lastEp || 1);
            };
        }

        function setMode(m) {
            playMode = m;
            document.getElementById('subBtn').className = m === 'sub' ? 'px-8 py-3 text-[10px] font-black rounded-xl bg-red-600 shadow-lg' : 'px-8 py-3 text-[10px] font-black rounded-xl bg-gray-800';
            document.getElementById('dubBtn').className = m === 'dub' ? 'px-8 py-3 text-[10px] font-black rounded-xl bg-red-600 shadow-lg' : 'px-8 py-3 text-[10px] font-black rounded-xl bg-gray-800';
            if(currentAnime) launchPlayer(currentAnime, currentEp);
        }

        function closePlayer() {
            document.getElementById('playerView').classList.add('hidden');
            plyrInstance.pause();
            if(hlsInstance) hlsInstance.destroy();
        }

        function triggerInstall() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            }
        }

        function showSeekToast(text) {
            const t = document.createElement('div');
            t.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-black text-xs z-[6000] animate-ping";
            t.innerText = text;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 500);
        }
    </script>
</body>
</html>
