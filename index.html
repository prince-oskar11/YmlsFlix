<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMLS - Watch Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3665/3665931.png">

    <style>
        body { background: #0b0e14; color: #e2e8f0; scroll-behavior: smooth; overflow-x: hidden; }
        .glass { background: rgba(20, 26, 39, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1f2937; }
        .anime-card { transition: all 0.3s ease; }
        .anime-card:hover { transform: translateY(-5px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        iframe { background: #000; border-radius: 8px; }
        .tab-btn.active { background-color: #6366f1; }
    </style>
</head>
<body class="font-sans">

    <nav class="sticky top-0 z-50 glass px-4 py-3">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-black text-indigo-500 tracking-tighter cursor-pointer" onclick="location.reload()">YMLS</h1>
                <i class="fa fa-random text-gray-400 cursor-pointer hover:text-indigo-400 transition text-lg" id="randomBtn" title="Random Anime"></i>
                <i class="fa fa-heart text-gray-500 cursor-pointer text-xl" id="wishlistToggle" title="My Wishlist"></i>
            </div>
            
            <div class="flex-1 max-w-xl relative">
                <input type="text" id="searchBar" placeholder="Search anime..." 
                    class="w-full bg-gray-900/80 border border-gray-700 rounded-full py-2 px-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                <i class="fa fa-search absolute left-4 top-3 text-gray-500"></i>
                <i class="fa fa-sliders absolute right-4 top-3 text-indigo-500 cursor-pointer" id="filterIcon"></i>

                <div id="genreMenu" class="absolute right-0 top-12 w-64 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-4 hidden z-50">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-3 tracking-widest">Filter by Genre</h4>
                    <div class="grid grid-cols-2 gap-2" id="genreList"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        <div id="continueWatching" class="mb-10 hidden">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa fa-play-circle text-indigo-500"></i> Continue Watching</h2>
            <div id="continueGrid" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
        </div>

        <div id="wishlistSection" class="mb-10 hidden border-b border-gray-800 pb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fa fa-heart text-red-500"></i> My Wishlist</h2>
            <div id="wishlistGrid" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
        </div>

        <div id="homeSections">
            <div class="flex gap-4 mb-8 overflow-x-auto pb-2 no-scrollbar" id="tabs">
                <button onclick="loadContent('TRENDING', this)" class="tab-btn active bg-gray-800 px-6 py-2 rounded-full font-bold text-sm transition">Trending</button>
                <button onclick="loadContent('POPULAR', this)" class="tab-btn bg-gray-800 px-6 py-2 rounded-full font-bold text-sm transition">Popular</button>
                <button onclick="loadContent('SCORE', this)" class="tab-btn bg-gray-800 px-6 py-2 rounded-full font-bold text-sm transition">Top Rated</button>
            </div>
            <div id="animeGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>
    </main>

    <div id="playerView" class="fixed inset-0 z-[100] bg-black hidden flex flex-col">
        <div class="p-4 flex flex-wrap justify-between items-center glass gap-4">
            <div class="flex items-center gap-4">
                <button onclick="closePlayer()" class="text-2xl hover:text-indigo-400"><i class="fa fa-arrow-left"></i></button>
                <h2 id="viewingTitle" class="font-bold truncate max-w-[180px] md:max-w-md"></h2>
            </div>
            <div class="flex items-center gap-3">
                <select id="serverSelect" onchange="switchServer(this.value)" class="bg-gray-800 border border-gray-700 text-[10px] rounded px-2 py-1 outline-none">
                    <option value="https://vidlink.pro/anime/">Server 1 (VidLink)</option>
                    <option value="https://vidsrc.me/anime/">Server 2 (VidSrc)</option>
                    <option value="https://anicrush.to/embed/">Server 3 (Anicrush)</option>
                </select>
                <button id="trailerBtn" onclick="playTrailer()" class="bg-red-600 px-3 py-1 rounded text-[10px] font-bold hidden">TRAILER</button>
                <button id="subDubToggle" class="bg-indigo-600 px-3 py-1 rounded text-[10px] font-bold uppercase">SUB</button>
                <button onclick="nextEpisode()" class="bg-gray-700 px-3 py-1 rounded text-[10px] font-bold hover:bg-indigo-500">NEXT</button>
            </div>
        </div>
        
        <div class="flex-1 flex items-center justify-center relative bg-black">
            <iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="p-4 bg-[#0b0e14] border-t border-gray-800">
            <h3 class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-widest">Episodes</h3>
            <div id="episodeList" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></div>
        </div>
    </div>

    <script>
        const ANILIST_API = 'https://graphql.anilist.co';
        let currentAnime = null;
        let isDub = false;
        let currentServer = "https://vidlink.pro/anime/";
        let wishlist = JSON.parse(localStorage.getItem('ymls_wishlist')) || [];
        const genres = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports", "Thriller"];

        // Init App
        window.onload = () => {
            loadContent('TRENDING');
            renderWishlist();
            loadContinueWatching();
            initGenreMenu();
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        };

        async function apiRequest(query, vars) {
            const res = await fetch(ANILIST_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, variables: vars })
            });
            return res.json();
        }

        async function loadContent(sort, btn) {
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const query = `query($sort: [MediaSort]){ Page(perPage: 24){ media(type: ANIME, sort: $sort){ id idMal trailer { id site } title { english romaji } coverImage { large } averageScore episodes } } }`;
            const data = await apiRequest(query, { sort: sort === 'SCORE' ? ['SCORE_DESC'] : [sort + '_DESC'] });
            renderGrid(data.data.Page.media, 'animeGrid');
        }

        function renderGrid(list, targetId) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = list.map(a => `
                <div class="anime-card cursor-pointer group" onclick='openPlayer(${JSON.stringify(a)})'>
                    <div class="relative overflow-hidden rounded-2xl aspect-[3/4] shadow-2xl bg-gray-900">
                        <img src="${a.coverImage.large}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition flex items-end p-3">
                            <span class="bg-indigo-600 px-2 py-1 rounded text-[10px] font-bold">★ ${a.averageScore/10 || 'N/A'}</span>
                        </div>
                    </div>
                    <h3 class="mt-3 text-sm font-bold line-clamp-2 group-hover:text-indigo-400 transition">${a.title.english || a.title.romaji}</h3>
                </div>
            `).join('');
        }

        function openPlayer(anime) {
            currentAnime = anime;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('viewingTitle').innerText = anime.title.english || anime.title.romaji;
            
            // Toggle Trailer Button
            const tBtn = document.getElementById('trailerBtn');
            (anime.trailer && anime.trailer.site === 'youtube') ? tBtn.classList.remove('hidden') : tBtn.classList.add('hidden');

            updateHeartIcon(anime.id);
            document.getElementById('wishlistToggle').onclick = () => toggleWishlist(currentAnime);

            const lastEp = getWatchedProgress(anime.id);
            renderEpisodes(anime.episodes || 24, lastEp);
            playEp(lastEp);
        }

        function renderEpisodes(total, active) {
            const list = document.getElementById('episodeList');
            list.innerHTML = '';
            for(let i=1; i<=total; i++) {
                list.innerHTML += `<button onclick="playEp(${i})" class="ep-btn flex-shrink-0 ${i==active?'bg-indigo-600':'bg-gray-800'} px-5 py-2 rounded-lg font-bold hover:bg-indigo-500 transition">${i}</button>`;
            }
        }

        function playEp(num) {
            const mode = isDub ? 'dub' : 'sub';
            const id = currentAnime.idMal || currentAnime.id;
            // Handle specific server URL structures
            let url = currentServer.includes('vidlink') ? `${currentServer}${id}/${num}/${mode}?primaryColor=6366f1` : `${currentServer}${id}?episode=${num}`;
            
            document.getElementById('videoFrame').src = url;
            
            // Update Local Storage
            let watched = JSON.parse(localStorage.getItem('ymls_watched')) || {};
            watched[currentAnime.id] = num;
            localStorage.setItem('ymls_watched', JSON.stringify(watched));
            
            renderEpisodes(currentAnime.episodes || 24, num);
            loadContinueWatching();
        }

        function playTrailer() {
            if(currentAnime.trailer) {
                document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${currentAnime.trailer.id}?autoplay=1`;
                document.getElementById('viewingTitle').innerText = "Trailer: " + (currentAnime.title.english || currentAnime.title.romaji);
            }
        }

        function nextEpisode() {
            const next = getWatchedProgress(currentAnime.id) + 1;
            if(next <= (currentAnime.episodes || 24)) playEp(next);
        }

        function switchServer(val) {
            currentServer = val;
            playEp(getWatchedProgress(currentAnime.id));
        }

        function getWatchedProgress(id) {
            return (JSON.parse(localStorage.getItem('ymls_watched')) || {})[id] || 1;
        }

        function closePlayer() {
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('videoFrame').src = "";
        }

        // Search and Filters logic
        document.getElementById('searchBar').onkeypress = async (e) => {
            if(e.key === 'Enter') {
                const query = `query($s: String){ Page(perPage: 24){ media(search: $s, type: ANIME){ id idMal trailer { id site } title { english romaji } coverImage { large } averageScore episodes } } }`;
                const data = await apiRequest(query, { s: e.target.value });
                renderGrid(data.data.Page.media, 'animeGrid');
            }
        };

        function initGenreMenu() {
            document.getElementById('genreList').innerHTML = genres.map(g => `<button onclick="filterByGenre('${g}')" class="text-left text-[10px] bg-gray-800 hover:bg-indigo-600 p-2 rounded transition">${g}</button>`).join('');
        }

        async function filterByGenre(g) {
            const query = `query($g: String){ Page(perPage: 24){ media(genre: $g, type: ANIME, sort: TRENDING_DESC){ id idMal trailer { id site } title { english romaji } coverImage { large } averageScore episodes } } }`;
            const data = await apiRequest(query, { g });
            renderGrid(data.data.Page.media, 'animeGrid');
            document.getElementById('genreMenu').classList.add('hidden');
        }

        document.getElementById('filterIcon').onclick = () => document.getElementById('genreMenu').classList.toggle('hidden');

        // Wishlist System
        function toggleWishlist(anime) {
            const idx = wishlist.findIndex(i => i.id === anime.id);
            if(idx === -1) { wishlist.push(anime); } else { wishlist.splice(idx, 1); }
            localStorage.setItem('ymls_wishlist', JSON.stringify(wishlist));
            renderWishlist();
            updateHeartIcon(anime.id);
        }

        function renderWishlist() {
            const section = document.getElementById('wishlistSection');
            wishlist.length > 0 ? section.classList.remove('hidden') : section.classList.add('hidden');
            renderGrid(wishlist, 'wishlistGrid');
        }

        function updateHeartIcon(id) {
            document.getElementById('wishlistToggle').style.color = wishlist.some(i => i.id === id) ? '#ef4444' : '#6b7280';
        }

        async function loadContinueWatching() {
            const watched = JSON.parse(localStorage.getItem('ymls_watched')) || {};
            const ids = Object.keys(watched).map(Number);
            if(ids.length === 0) return;
            document.getElementById('continueWatching').classList.remove('hidden');
            const query = `query($ids: [Int]){ Page { media(id_in: $ids){ id idMal trailer { id site } title { english romaji } coverImage { large } episodes } } }`;
            const data = await apiRequest(query, { ids });
            const list = data.data.Page.media;
            document.getElementById('continueGrid').innerHTML = list.map(a => `
                <div class="flex-shrink-0 w-32 cursor-pointer transition active:scale-95" onclick='openPlayer(${JSON.stringify(a)})'>
                    <div class="relative rounded-xl overflow-hidden aspect-[3/4] shadow-lg">
                        <img src="${a.coverImage.large}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-indigo-600 text-[8px] text-center font-bold py-1">EP ${watched[a.id]}</div>
                    </div>
                </div>
            `).join('');
        }

        // Random Anime Feature
        document.getElementById('randomBtn').onclick = async () => {
            const randPage = Math.floor(Math.random() * 50) + 1;
            const query = `query($p: Int){ Page(page: $p, perPage: 1){ media(type: ANIME, sort: POPULARITY_DESC){ id idMal trailer { id site } title { english romaji } coverImage { large } episodes } } }`;
            const data = await apiRequest(query, { p: randPage });
            if(data.data.Page.media[0]) openPlayer(data.data.Page.media[0]);
        };

        // Sub/Dub Toggle
        document.getElementById('subDubToggle').onclick = function() {
            isDub = !isDub;
            this.innerText = isDub ? 'DUB' : 'SUB';
            if(currentAnime) playEp(getWatchedProgress(currentAnime.id));
        };
    </script>
</body>
</html>
