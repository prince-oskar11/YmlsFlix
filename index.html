<script>
const API = 'https://graphql.anilist.co', STREAM_API = 'https://api.consumet.org/anime/gogoanime';

let currentUser = JSON.parse(localStorage.getItem('ymls_active_user'));
let playMode = 'sub', currentAnime = null, currentEp = 1, currentServers = [], lastTap = 0, deferredPrompt, plyrInstance, hlsInstance;

/* ✅ ADDED SYSTEMS */
let animeCache = {};
let resumeData = JSON.parse(localStorage.getItem('ymls_resume')) || {};

/* ================= RENDER FIX ================= */
function render(l, t, isGrid=false) {
    const wishlist = currentUser ? (currentUser.wishlist || []) : (JSON.parse(localStorage.getItem('ymls_guest_wishlist')) || []);
    
    document.getElementById(t).innerHTML = l.map(a => {
        if(!a) return '';

        animeCache[a.id] = a;

        const inWish = wishlist.some(x => x.id === a.id);
        return `
        <div class="anime-card ${isGrid ? 'w-full' : ''}" onclick="showChoice(animeCache[${a.id}])">
            <div class="ep-badge">${a.episodes || '?'} EP</div>
            ${a.hasNew ? '<div class="sync-dot"></div>' : ''}
            <div class="wish-heart ${inWish ? 'wish-active' : ''}" onclick='toggleWish(animeCache[${a.id}], event)'>
                <i class="fa fa-${inWish ? 'heart' : 'heart-o'}"></i>
            </div>
            <img src="${a.coverImage.large}" class="card-img" loading="lazy">
            <div class="p-3 truncate text-[10px] font-black uppercase text-gray-400 tracking-tight">
                ${a.title.english || a.title.romaji}
            </div>
        </div>`;
    }).join('');
}

/* ================= FILTER FIX ================= */
async function fetchByFilter(g, y) {
    showPage('filter'); 
    document.getElementById('filterTitle').innerText = g || ("Released in " + y);

    const q = `
    query($g:String,$y:Int){
        Page(perPage:50){
            media(
                genre_in: [$g],
                seasonYear: $y,
                type: ANIME,
                sort: POPULARITY_DESC
            ){
                id title{english romaji} coverImage{large} episodes trailer{id site}
            }
        }
    }`;

    const r = await fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query:q, variables:{g: g || null, y: y || null}})
    }).then(res=>res.json());

    render(r.data.Page.media, "filterGrid", true);
}

/* ================= PLAYER ================= */
async function openPlayer(a, ep = 1) {
    if(a) currentAnime = a; 
    currentEp = ep;

    document.getElementById('playerView').classList.remove('hidden');
    document.getElementById('playerTitle').innerText = (currentAnime.title.english || currentAnime.title.romaji) + " — Episode " + ep;
    document.getElementById('playerLoader').classList.remove('hidden');

    try {
        const q = (currentAnime.title.romaji || currentAnime.title.english).replace(/[^a-zA-Z0-9 ]/g, '');
        const s = await fetch(`${STREAM_API}/${q}`).then(r=>r.json());

        if (!s.results || !s.results.length) {
            document.getElementById('playerLoader').classList.add('hidden');
            alert("No streams found");
            return;
        }

        const target = s.results.find(r => playMode === 'dub' ? r.id.includes('-dub') : !r.id.includes('-dub')) || s.results[0];

        const info = await fetch(`${STREAM_API}/info/${target.id}`).then(r=>r.json());

        /* ✅ REAL EPISODES */
        currentAnime.realEpisodes = info.episodes;

        const epObj = info.episodes.find(e => e.number == ep) || info.episodes[0];
        const links = await fetch(`${STREAM_API}/watch/${epObj.id}`).then(r=>r.json());

        currentServers = links.sources;

        document.getElementById('serverList').innerHTML = currentServers.map((s, i) => `
            <button onclick="switchServer(${i})" class="px-5 py-3 bg-gray-900 rounded-xl text-[10px] font-bold border border-gray-800 hover:border-red-500">
                ${s.quality.toUpperCase()}
            </button>
        `).join('');

        switchServer(0);
    } catch(e) {
        document.getElementById('playerLoader').classList.add('hidden');
        alert("Streaming failed");
    }

    saveHistory(currentAnime);
    renderEpisodes(currentAnime);
    fetchRecommendations(currentAnime.id);
}

/* ================= EPISODES ================= */
function renderEpisodes(a) { 
    let list = a.realEpisodes || [];

    if (!list.length) {
        const fallback = a.episodes || 1;
        list = Array.from({length: fallback}, (_, i) => ({ number: i + 1 }));
    }

    document.getElementById('totalEpDisplay').innerText = list.length + " Episodes";

    document.getElementById('epList').innerHTML = list.map(ep => `
        <button onclick="openPlayer(null, ${ep.number})"
            class="ep-btn ${currentEp===ep.number?'ep-active':''}">
            ${ep.number}
        </button>
    `).join('');
}

/* ================= SERVER ================= */
function switchServer(idx) {
    if (hlsInstance) hlsInstance.destroy();

    const v = document.getElementById('player'), url = currentServers[idx].url;

    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(v);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            document.getElementById('playerLoader').classList.add('hidden');
            plyrInstance.play();

            /* ✅ RESUME */
            const key = currentAnime.id + "_ep" + currentEp;
            if (resumeData[key]) plyrInstance.currentTime = resumeData[key];
        });
    }
}

/* ================= ONLOAD ADDITIONS ================= */
window.onload = () => {
    plyrInstance = new Plyr('#player');

    /* ✅ SAVE RESUME */
    plyrInstance.on('timeupdate', () => {
        if (!currentAnime) return;
        const key = currentAnime.id + "_ep" + currentEp;
        resumeData[key] = plyrInstance.currentTime;
        localStorage.setItem('ymls_resume', JSON.stringify(resumeData));
    });

    /* ✅ SKIP INTRO */
    const skipBtn = document.getElementById('skipIntroBtn');

    plyrInstance.on('timeupdate', () => {
        const t = plyrInstance.currentTime;
        if (t > 5 && t < 90) skipBtn.classList.remove('hidden');
        else skipBtn.classList.add('hidden');
    });

    skipBtn.onclick = () => plyrInstance.currentTime = 90;
};
</script>
