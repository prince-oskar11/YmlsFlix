<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | v43.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icon-btn { color: #94a3b8; font-size: 16px; cursor: pointer; transition: 0.2s; position: relative; }
        .icon-btn:hover, .icon-active { color: #ef4444; }
        
        .dropdown-content { 
            display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); 
            background: #0f1117; border: 1px solid #1f2937; border-radius: 20px; z-index: 3000; 
            width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); 
        }
        .show { display: block !important; }

        .grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .grid-compact { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 300px; overflow-y: auto; }
        .anime-card { transition: 0.3s ease; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: #0f1117; width: 140px; flex-shrink: 0; }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input[type="text"], input[type="password"] { background: #111827; border: 1px solid #1f2937; color: white; padding: 10px; border-radius: 10px; outline: none; width: 100%; font-size: 12px; margin-bottom: 8px; }
        .btn-red { background: #ef4444; color: white; padding: 10px; border-radius: 10px; font-weight: 900; font-size: 10px; text-transform: uppercase; width: 100%; }
        
        #heroSection { height: 55vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 40px; position: relative; width: 100%; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 15%, transparent 100%); }
        
        .page-view { display: none; }
        .active-view { display: block; }

        /* TOGGLE SWITCH */
        .switch-box { display: flex; background: #111827; border-radius: 20px; padding: 4px; gap: 4px; }
        .switch-opt { flex: 1; text-align: center; padding: 6px; border-radius: 16px; font-size: 9px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .switch-active { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[2500] glass p-3">
        <div class="container mx-auto">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-black tracking-tighter logo-text cursor-pointer" onclick="showPage('home')">YmlsFlix</h1>
                <div class="flex items-center gap-6">
                    <i id="wishNav" onclick="showPage('wishlist')" class="fa fa-heart icon-btn"></i>
                    <div class="relative">
                        <i onclick="toggleDropdown('notifDrop')" class="fa fa-bell icon-btn"></i>
                        <div id="notifDrop" class="dropdown-content">
                            <h4 class="text-[10px] font-black uppercase text-red-500 mb-4">Alerts</h4>
                            <div id="notifList" class="text-xs text-gray-400 space-y-3">No new updates.</div>
                        </div>
                    </div>
                    <div class="relative"><i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large icon-btn"></i>
                        <div id="genreDrop" class="dropdown-content">
                            <div class="flex mb-4 border-b border-gray-800">
                                <button onclick="switchTab('genres')" id="tabGen" class="flex-1 pb-2 font-black text-[10px] uppercase border-b-2 border-red-600">Genres</button>
                                <button onclick="switchTab('years')" id="tabYear" class="flex-1 pb-2 font-black text-[10px] uppercase text-gray-500">Years</button>
                            </div>
                            <div id="genreList" class="grid-compact"></div>
                            <div id="yearList" class="grid-compact hidden"></div>
                        </div>
                    </div>
                    <i onclick="showPage('home')" class="fa fa-home icon-btn"></i>
                    <div class="relative"><i onclick="toggleDropdown('profileDrop')" class="fa fa-user-circle icon-btn"></i>
                        <div id="profileDrop" class="dropdown-content">
                            <div id="authBox">
                                <div id="signupView">
                                    <h4 class="font-black text-[10px] uppercase text-red-500 mb-4 text-center">Create Account</h4>
                                    <input type="text" id="regUser" placeholder="Username or Email">
                                    <input type="password" id="regPass" placeholder="Password">
                                    <input type="password" id="regConfirm" placeholder="Confirm Password">
                                    <button onclick="handleRegister()" class="btn-red mb-3">Register</button>
                                    <p class="text-[9px] text-gray-500 text-center uppercase font-black cursor-pointer" onclick="toggleAuthMode('signin')">Already have an account? <span class="text-white">Sign In</span></p>
                                </div>
                                <div id="signinView" class="hidden">
                                    <h4 class="font-black text-[10px] uppercase text-blue-500 mb-4 text-center">Welcome Back</h4>
                                    <input type="text" id="loginUser" placeholder="Username or Email">
                                    <input type="password" id="loginPass" placeholder="Password">
                                    <div class="flex items-center gap-2 mb-3">
                                        <input type="checkbox" id="rememberMe" class="w-3 h-3 accent-blue-600">
                                        <label class="text-[9px] font-black text-gray-500 uppercase">Remember Me</label>
                                    </div>
                                    <button onclick="handleLogin()" class="btn-red mb-3 bg-blue-600">Sign In</button>
                                    <p class="text-[9px] text-gray-500 text-center uppercase font-black cursor-pointer" onclick="toggleAuthMode('signup')">Need an account? <span class="text-white">Sign Up</span></p>
                                </div>
                            </div>
                            <div id="userBox" class="hidden text-center">
                                <h4 id="userDisplay" class="font-black text-[12px] uppercase text-white mb-2"></h4>
                                <button onclick="handleLogout()" class="w-full bg-gray-800 py-2 rounded-lg text-[9px] font-black uppercase">Sign Out / Switch</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <input type="text" id="searchBar" placeholder="Search anime..." class="mt-3" oninput="handleSearch(this.value)">
        </div>
    </nav>

    <div id="page-home" class="page-view active-view">
        <header id="heroSection">
            <div class="hero-overlay"></div>
            <div class="container mx-auto px-6 relative z-10">
                <h2 id="heroTitle" class="text-4xl font-black mb-1"></h2>
                <p id="heroDesc" class="text-gray-400 text-xs max-w-xl line-clamp-2 mb-4"></p>
                <button id="heroPlayBtn" class="bg-white text-black px-6 py-2 rounded-full font-black text-[10px] uppercase">Watch Now</button>
            </div>
        </header>
        <main class="container mx-auto p-4 -mt-8 relative z-20">
            <section id="continueSection" class="mb-10 hidden"><h2 class="text-[10px] font-black mb-4 uppercase text-red-500 tracking-widest">Continue Watching</h2><div id="continueGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-orange-500 tracking-widest">Trending Now</h2><div id="trendingGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-green-500 tracking-widest">Upcoming Releases</h2><div id="upcomingGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-blue-500 tracking-widest">Airing Now</h2><div id="airingGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-purple-500 tracking-widest">Most Popular</h2><div id="popularGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-yellow-500 tracking-widest">Top Rated</h2><div id="ratedGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
        </main>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto p-4 pt-[140px]"><h2 class="text-xl font-black mb-6 uppercase tracking-tighter">My <span class="text-red-600">Watchlist</span></h2><div id="wishlistGrid" class="grid-full"></div></div>
    <div id="page-filter" class="page-view container mx-auto p-4 pt-[140px]"><h2 id="filterTitle" class="text-xl font-black mb-6 uppercase tracking-tighter">Results</h2><div id="filterGrid" class="grid-full"></div></div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
        <div class="p-4 flex justify-between items-center glass sticky top-0">
            <button onclick="closePlayer()" class="text-lg"><i class="fa fa-chevron-left"></i></button>
            <div class="flex flex-col items-center">
                <h3 id="playerTitle" class="font-black text-[9px] uppercase truncate max-w-[150px]"></h3>
                <div class="switch-box mt-1">
                    <div id="subBtn" onclick="setMode('sub')" class="switch-opt switch-active">SUB</div>
                    <div id="dubBtn" onclick="setMode('dub')" class="switch-opt">DUB</div>
                </div>
            </div>
            <button id="trailerBtn" class="bg-red-600 text-[9px] font-black px-3 py-1 rounded-full uppercase">Trailer</button>
        </div>
        <div class="w-full aspect-video bg-black"><iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>
        
        <div class="p-6 container mx-auto">
            <h2 class="text-[10px] font-black mb-4 uppercase text-gray-500 tracking-widest">Episodes</h2>
            <div id="epList" class="flex gap-2 overflow-x-auto no-scrollbar mb-10"></div>
            
            <h2 class="text-[10px] font-black mb-4 uppercase text-red-500 tracking-widest">Recommended For You</h2>
            <div id="recommendGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-10"></div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        let currentUser = JSON.parse(localStorage.getItem('ymls_active_user')) || null;
        let playMode = 'sub';
        let currentAnime = null;

        window.onload = () => { setupUI(); fetchHero(); loadHome(); genFilters(); };

        function setupUI() { if(currentUser) { document.getElementById('authBox').classList.add('hidden'); document.getElementById('userBox').classList.remove('hidden'); document.getElementById('userDisplay').innerText = currentUser.name; } }
        
        // AUTH
        function toggleAuthMode(m) { document.getElementById('signupView').classList.toggle('hidden', m === 'signin'); document.getElementById('signinView').classList.toggle('hidden', m === 'signup'); }
        function handleRegister() { const u=document.getElementById('regUser').value, p=document.getElementById('regPass').value, cp=document.getElementById('regConfirm').value; if(p!==cp) return alert("Match Error"); let users=JSON.parse(localStorage.getItem('ymls_users'))||{}; users[u]={name:u,pass:p,wishlist:[]}; localStorage.setItem('ymls_users',JSON.stringify(users)); alert("Registered!"); toggleAuthMode('signin'); }
        function handleLogin() { const u=document.getElementById('loginUser').value, p=document.getElementById('loginPass').value; let users=JSON.parse(localStorage.getItem('ymls_users'))||{}; if(users[u]?.pass===p) { localStorage.setItem('ymls_active_user',JSON.stringify(users[u])); location.reload(); } }
        function handleLogout() { localStorage.removeItem('ymls_active_user'); location.reload(); }

        // PLAYER LOGIC
        function setMode(m) {
            playMode = m;
            document.getElementById('subBtn').classList.toggle('switch-active', m==='sub');
            document.getElementById('dubBtn').classList.toggle('switch-active', m==='dub');
            if(currentAnime) openPlayer(currentAnime);
        }

        async function openPlayer(a, ep = 1) {
            currentAnime = a;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = a.title.english || a.title.romaji;
            
            // Sub/Dub logic (Mocked URL param for example)
            const type = playMode === 'dub' ? '?dub=true' : '';
            document.getElementById('videoFrame').src = `https://win-anime.vercel.app/embed/${a.idMal || a.id}/${ep}${type}`;
            
            // Trailer logic
            const trailerBtn = document.getElementById('trailerBtn');
            if(a.trailer && a.trailer.site === 'youtube') {
                trailerBtn.style.display = 'block';
                trailerBtn.onclick = () => window.open(`https://youtube.com/watch?v=${a.trailer.id}`);
            } else trailerBtn.style.display = 'none';

            // Ep List
            document.getElementById('epList').innerHTML = Array.from({length: a.episodes || 12}, (_, i) => `<button onclick="openPlayer(currentAnime, ${i+1})" class="min-w-[40px] bg-gray-800 p-2 rounded text-[10px]">${i+1}</button>`).join('');
            
            // Fetch Recommendations
            fetchRecommendations(a.id);
        }

        async function fetchRecommendations(id) {
            const query = `query($id:Int){Media(id:$id){recommendations(perPage:10){nodes{mediaRecommendation{id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{id}})});
            const json = await res.json();
            const list = json.data.Media.recommendations.nodes.map(n => n.mediaRecommendation);
            render(list, 'recommendGrid');
        }

        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); document.getElementById('videoFrame').src = ""; }

        // NAVIGATION & CORE DATA
        function toggleDropdown(id) { const drop=document.getElementById(id); const s=drop.classList.contains('show'); document.querySelectorAll('.dropdown-content').forEach(d=>d.classList.remove('show')); if(!s) drop.classList.add('show'); }
        function showPage(p) { document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active-view')); document.getElementById(`page-${p}`).classList.add('active-view'); if(p==='wishlist') renderWishlist(); window.scrollTo(0,0); }
        function genFilters() {
            const genres = ["Action", "Adventure", "Comedy", "Drama", "Ecchi", "Fantasy", "Horror", "Mahou Shoujo", "Mecha", "Music", "Mystery", "Psychological", "Romance", "Sci-Fi", "Slice of Life", "Sports", "Supernatural", "Thriller"];
            document.getElementById('genreList').innerHTML = genres.map(g => `<button onclick="fetchByFilter({genre:'${g}'})" class="bg-gray-900 py-2 rounded text-[9px] font-bold hover:bg-red-600">${g}</button>`).join('');
            let yH = ''; for(let y=2026; y>=2000; y--) yH += `<button onclick="fetchByFilter({year:${y}})" class="bg-gray-900 py-2 rounded text-[9px] font-bold hover:bg-red-600">${y}</button>`;
            document.getElementById('yearList').innerHTML = yH;
        }

        async function loadHome() {
            fetchGrid("TRENDING_DESC", "trendingGrid"); fetchGrid("POPULARITY_DESC", "popularGrid"); fetchGrid("SCORE_DESC", "ratedGrid");
            const uQ = `query{Page(perPage:12){media(status:NOT_YET_RELEASED,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const uR = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:uQ})});
            const uJ = await uR.json(); render(uJ.data.Page.media, "upcomingGrid");
            const aQ = `query{Page(perPage:12){airingSchedules(airingAt_greater:${Math.floor(Date.now()/1000)},sort:TIME){media{id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}}`;
            const aR = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:aQ})});
            const aJ = await aR.json(); render(aJ.data.Page.airingSchedules.map(s => s.media), "airingGrid");
        }

        async function fetchGrid(sort, target) {
            const query = `query($s:[MediaSort]){Page(perPage:12){media(type:ANIME,sort:$s){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:[sort]}})});
            const json = await res.json(); render(json.data.Page.media, target);
        }

        async function fetchHero() {
            const query = `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id idMal title{english romaji} bannerImage description episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
            const json = await res.json(); const top = json.data.Page.media[0];
            if(top.bannerImage) document.getElementById('heroSection').style.backgroundImage = `url(${top.bannerImage})`;
            document.getElementById('heroTitle').innerText = top.title.english || top.title.romaji;
            document.getElementById('heroDesc').innerHTML = top.description;
            document.getElementById('heroPlayBtn').onclick = () => openPlayer(top);
        }

        function render(list, target, isGrid = false) {
            const wishes = currentUser ? currentUser.wishlist : [];
            document.getElementById(target).innerHTML = list.map(a => {
                if(!a) return '';
                const isSaved = wishes.some(w => w.id === a.id);
                return `<div class="anime-card ${isGrid ? 'w-full' : ''}" onclick='openPlayer(${JSON.stringify(a)})'>
                    <i class="fa fa-heart absolute top-2 right-2 z-10 ${isSaved ? 'text-red-500' : 'text-gray-400'}" onclick='toggleWish(event, ${JSON.stringify(a)})'></i>
                    <img src="${a.coverImage.large}" class="card-img"><div class="p-2 truncate text-[9px] font-black uppercase text-gray-500">${a.title.english || a.title.romaji}</div>
                </div>`;
            }).join('');
        }

        function toggleWish(e, anime) {
            e.stopPropagation(); if(!currentUser) return alert("Login required");
            let users = JSON.parse(localStorage.getItem('ymls_users'));
            let list = users[currentUser.name].wishlist || [];
            const idx = list.findIndex(i => i.id === anime.id);
            idx === -1 ? list.unshift(anime) : list.splice(idx, 1);
            users[currentUser.name].wishlist = list;
            localStorage.setItem('ymls_users', JSON.stringify(users));
            if(currentUser.name === users[currentUser.name].name) { currentUser.wishlist = list; localStorage.setItem('ymls_active_user', JSON.stringify(currentUser)); }
            location.reload();
        }

        function renderWishlist() { render(currentUser ? currentUser.wishlist : [], 'wishlistGrid', true); }
        async function fetchByFilter(params) {
            showPage('filter'); toggleDropdown('genreDrop');
            document.getElementById('filterTitle').innerText = params.genre || params.year;
            const query = `query($g:String,$y:Int){Page(perPage:24){media(genre:$g,seasonYear:$y,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{g:params.genre, y:params.year}})});
            const json = await res.json(); render(json.data.Page.media, "filterGrid", true);
        }
        async function handleSearch(term) { if(term.length < 2) return; showPage('filter'); fetchByFilter({genre: term}); }
        function switchTab(t) { document.getElementById('genreList').classList.toggle('hidden', t !== 'genres'); document.getElementById('yearList').classList.toggle('hidden', t !== 'years'); }
    </script>
</body>
</html>
