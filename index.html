<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YMLSFLIX PRO | v60.1 FIXED</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:Inter; margin:0 }
.logo-text { background:linear-gradient(to right,#ef4444,#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.anime-card{transition:.3s;cursor:pointer;width:150px}
.anime-card:hover{transform:scale(1.05)}
.ep-count-badge{position:absolute;top:5px;left:5px;background:red;font-size:10px;padding:2px 5px}
.wish-badge{position:absolute;top:5px;right:5px;cursor:pointer}
</style>
</head>

<body>

<!-- NAV -->
<nav class="p-4 flex justify-between">
<h1 class="logo-text text-xl cursor-pointer" onclick="showPage('home')">YMLSFLIX PRO</h1>
<div class="flex gap-4">
<i class="fa fa-home" onclick="showPage('home')"></i>
<i class="fa fa-heart" onclick="showPage('wishlist')"></i>
</div>
</nav>

<!-- SEARCH -->
<div class="p-3 flex gap-2">
<input id="searchBar" placeholder="Search anime..." oninput="handleSearch(this.value)" class="flex-1 p-2 rounded bg-gray-900">
<button onclick="triggerInstall()" class="bg-indigo-600 px-4 rounded">Install</button>
</div>

<!-- HOME -->
<div id="page-home">
<h3>Trending</h3>
<div id="trendingGrid" class="flex gap-3 overflow-x-auto"></div>

<h3>Top Rated</h3>
<div id="ratedGrid" class="flex gap-3 overflow-x-auto"></div>
</div>

<!-- FILTER -->
<div id="page-filter" style="display:none">
<h2 id="filterTitle"></h2>
<div id="filterGrid" class="flex flex-wrap gap-3"></div>
</div>

<!-- WISHLIST -->
<div id="page-wishlist" style="display:none">
<h2>Wishlist</h2>
<div id="wishlistGrid" class="flex flex-wrap gap-3"></div>
</div>

<!-- PLAYER -->
<div id="playerView" style="display:none">
<button onclick="closePlayer()">Back</button>
<h3 id="playerTitle"></h3>
<video id="player" controls style="width:100%"></video>
<div id="serverList"></div>
<button onclick="nextEpisode()">Next Episode</button>
</div>

<script>

const API = "https://graphql.anilist.co";

/* 🔥 improved streaming */
const STREAM = [
"https://api.consumet.org/anime/gogoanime",
"https://gogoanime.consumet.org"
];

let currentAnime=null,currentEp=1,servers=[],player;

/* INIT */
window.onload=()=>{
player=new Plyr("#player");
loadHome();
};

/* NAV */
function showPage(p){
document.getElementById("page-home").style.display="none";
document.getElementById("page-filter").style.display="none";
document.getElementById("page-wishlist").style.display="none";

document.getElementById("page-"+p).style.display="block";

if(p==="wishlist") renderWishlist();
}

/* SEARCH */
async function handleSearch(q){
if(q.length<2){showPage("home");return;}

showPage("filter");
filterTitle.innerText="Results: "+q;

try{
let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
query:`query($s:String){Page(perPage:20){media(search:$s,type:ANIME){id title{romaji english} coverImage{large} episodes}}}`,
variables:{s:q}
})
});

let json=await res.json();
render(json.data.Page.media,"filterGrid");
}catch(e){console.log(e);}
}

/* HOME LOAD */
async function loadHome(){
fetchList("TRENDING_DESC","trendingGrid");
fetchList("SCORE_DESC","ratedGrid");
}

async function fetchList(sort,target){
let res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
query:`query($s:[MediaSort]){Page(perPage:20){media(type:ANIME,sort:$s){id title{romaji english} coverImage{large} episodes}}}`,
variables:{s:[sort]}
})
});

let json=await res.json();
render(json.data.Page.media,target);
}

/* RENDER */
function render(list,target){
if(!list) return;

document.getElementById(target).innerHTML=list.map(a=>`
<div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'>
<div class="ep-count-badge">${a.episodes||"?"}</div>
<i class="fa fa-heart wish-badge" onclick='toggleWish(event,${JSON.stringify(a)})'></i>
<img src="${a.coverImage.large}" width="150">
<p>${a.title.english||a.title.romaji}</p>
</div>
`).join("");
}

/* PLAYER */
async function openPlayer(a,ep=1){
if(a) currentAnime=a;
currentEp=ep;

playerView.style.display="block";
playerTitle.innerText=(currentAnime.title.english||currentAnime.title.romaji)+" EP "+ep;

try{
let result;

for(let api of STREAM){
try{
let s=await fetch(api+"/"+currentAnime.title.romaji);
result=await s.json();
if(result.results) break;
}catch{}
}

if(!result?.results) throw "No results";

let anime=result.results[0];

let info=await fetch(STREAM[0]+"/info/"+anime.id).then(r=>r.json());
let epData=info.episodes.find(e=>e.number==ep)||info.episodes[0];

let watch=await fetch(STREAM[0]+"/watch/"+epData.id).then(r=>r.json());

servers=watch.sources||[];

serverList.innerHTML=servers.map((s,i)=>
`<button onclick="playServer(${i})">${s.quality}</button>`
).join("");

playServer(0);

}catch(e){
alert("Stream unavailable");
}
}

function playServer(i){
let url=servers[i]?.url;
if(!url) return;

if(Hls.isSupported()){
let hls=new Hls();
hls.loadSource(url);
hls.attachMedia(player.media);
}else{
player.source={type:"video",sources:[{src:url,type:"application/x-mpegURL"}]};
}
}

/* NEXT */
function nextEpisode(){
openPlayer(null,currentEp+1);
}

/* CLOSE */
function closePlayer(){
playerView.style.display="none";
}

/* WISHLIST */
function toggleWish(e,a){
e.stopPropagation();
let w=JSON.parse(localStorage.getItem("wish"))||[];
let i=w.findIndex(x=>x.id===a.id);
if(i==-1) w.push(a); else w.splice(i,1);
localStorage.setItem("wish",JSON.stringify(w));
}

function renderWishlist(){
let w=JSON.parse(localStorage.getItem("wish"))||[];
render(w,"wishlistGrid");
}

</script>

</body>
</html>
