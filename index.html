<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>YMLSFLIX PRO | v60.0</title>
<!-- Manifest -->
<link rel="manifest" href="manifest.json" />

<!-- Tailwind & Font Awesome -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />

<!-- Plyr & HLS -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Custom CSS -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
:root {
  --plyr-color-main: #ef4444;
  --bg: #05070a;
  --card: #0f1117;
  --accent: #6366f1;
}
body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Inter', sans-serif;
  margin: 0;
  overflow-x: hidden;
  font-size: 13px;
  -webkit-tap-highlight-color: transparent;
}
.scrollbar-hide::-webkit-scrollbar { display: none; }
.page-view { display: none; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }
.page-view.active { display: block; }
#scrollable { overflow-x: auto; -webkit-overflow-scrolling: touch; }
#scrollable::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<!-- Install App Button -->
<div class="fixed top-4 right-4 z-[9999] hidden" id="installContainer">
  <button id="installBtn" class="bg-indigo-600 px-4 py-2 rounded-full font-bold text-sm uppercase shadow-lg hover:bg-indigo-500">Install App</button>
</div>

<!-- Navigation -->
<nav class="fixed top-0 w-full z-[2500] bg-black/50 backdrop-blur-lg p-4 flex justify-between items-center">
  <h1 class="text-2xl font-black tracking-tighter cursor-pointer" onclick="showPage('home')">YMLSFLIX PRO</h1>
  <div class="flex gap-4 text-xl text-gray-400">
    <i onclick="showPage('home')" class="fa fa-home cursor-pointer hover:text-white"></i>
    <i onclick="showPage('wishlist')" class="fa fa-heart cursor-pointer hover:text-red-500"></i>
    <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large cursor-pointer hover:text-white"></i>
  </div>
</nav>

<!-- Dropdown for genres and years -->
<div class="absolute right-4 top-16 bg-[#0f1117] p-4 rounded-lg shadow-lg hidden" id="genreDrop">
  <h4 class="mb-2 font-bold text-white">Categories</h4>
  <div id="genreList" class="grid grid-cols-3 gap-2"></div>
  <h4 class="mb-2 font-bold text-white mt-4">Season Year</h4>
  <div id="yearList" class="grid grid-cols-3 gap-2"></div>
</div>

<!-- Main Content -->
<div class="pt-20" id="mainContent">

<!-- Home Page -->
<div id="page-home" class="page-view active">

  <!-- Hero Banner -->
  <section id="hero" class="relative h-[60vh] bg-cover bg-center" style="background-image: url('https://placehold.co/1920x1080/05070a/ef4444?text=Loading...');">
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
    <div class="relative p-8 text-white z-10 max-w-2xl">
      <h2 id="heroTitle" class="text-4xl font-black mb-4 uppercase"></h2>
      <p id="heroDesc" class="mb-4 text-sm line-clamp-3"></p>
      <div class="flex gap-4">
        <button id="heroStreamBtn" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase text-sm shadow-lg hover:bg-red-600 hover:text-white transition">Stream Now</button>
        <button id="heroTrailerBtn" class="bg-white/10 backdrop-blur-md text-white px-8 py-3 rounded-full font-bold uppercase text-sm border border-white/20 hover:bg-white/20 transition">Trailer</button>
      </div>
    </div>
  </section>

  <!-- Content sections -->
  <section class="p-4 space-y-12">

    <!-- Trending -->
    <div>
      <h3 class="text-[11px] font-black mb-4 uppercase text-orange-500 tracking-widest">Trending Now</h3>
      <div class="flex gap-4 overflow-x-auto scrollbar-hide" id="trendingGrid"></div>
    </div>

    <!-- Top Rated -->
    <div>
      <h3 class="text-[11px] font-black mb-4 uppercase text-yellow-500 tracking-widest">Top Rated</h3>
      <div class="flex gap-4 overflow-x-auto scrollbar-hide" id="ratedGrid"></div>
    </div>

    <!-- Just Airing -->
    <div>
      <h3 class="text-[11px] font-black mb-4 uppercase text-blue-500 tracking-widest">Just Airing</h3>
      <div class="flex gap-4 overflow-x-auto scrollbar-hide" id="airingGrid"></div>
    </div>

    <!-- All Time Popular -->
    <div>
      <h3 class="text-[11px] font-black mb-4 uppercase text-purple-500 tracking-widest">All Time Popular</h3>
      <div class="flex gap-4 overflow-x-auto scrollbar-hide" id="popularGrid"></div>
    </div>

    <!-- Upcoming Shows -->
    <div>
      <h3 class="text-[11px] font-black mb-4 uppercase text-green-500 tracking-widest">Upcoming Shows</h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="upcomingShowsGrid"></div>
    </div>

  </section>
</div>

<!-- Filter Page -->
<div id="page-filter" class="page-view p-4">
  <h2 id="filterTitle" class="text-2xl font-bold uppercase mb-4 border-l-4 border-red-600 pl-4"></h2>
  <div id="filterGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

<!-- Wishlist Page -->
<div id="page-wishlist" class="page-view p-4">
  <div class="flex justify-between items-center mb-4 border-l-4 border-red-600 pl-4">
    <h2 class="text-2xl font-bold uppercase">My Wishlist</h2>
    <span id="wishCount" class="text-sm font-bold text-gray-400"></span>
  </div>
  <div id="wishlistGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

<!-- Video Player Modal -->
<div id="playerModal" class="fixed inset-0 bg-black bg-opacity-90 z-[9999] hidden flex flex-col justify-center items-center p-4">
  <div class="w-full max-w-3xl relative">
    <div class="absolute top-2 right-2 cursor-pointer text-white text-xl z-50" onclick="closePlayer()">×</div>
    <h3 id="playerTitle" class="text-white mb-2 text-center"></h3>
    <video id="player" controls playsinline class="w-full aspect-[16/9] bg-black rounded-lg"></video>
    <div class="mt-4 flex justify-center gap-4">
      <button onclick="nextEpisode()" class="bg-red-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-red-500 transition">Next Episode</button>
      <button onclick="showTrailer(currentAnime?.trailer?.id)" class="bg-indigo-600 px-4 py-2 rounded-full font-bold uppercase text-sm hover:bg-indigo-500 transition">Trailer</button>
    </div>
  </div>
</div>

<!-- Trailer Overlay -->
<div id="trailerOverlay" class="fixed inset-0 bg-black bg-opacity-90 z-[9999] hidden justify-center items-center">
  <div class="relative w-full max-w-4xl aspect-video">
    <iframe id="trailerFrame" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
    <div class="absolute top-2 right-2 cursor-pointer text-white text-xl" onclick="closeTrailer()">×</div>
  </div>
</div>

<!-- Scripts -->
<script>
// ================== Variables ==================
const API='https://graphql.anilist.co', STREAM_API='https://api.consumet.org/anime/gogoanime';

let currentUser=JSON.parse(localStorage.getItem('ymls_active_user'));
let playMode='sub', currentAnime=null, currentEp=1, currentServers=[], hlsInstance=null, plyrInstance=null;

// ================== PWA Install ==================
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  document.getElementById('installContainer').classList.remove('hidden');
  document.getElementById('installBtn').onclick= () => {
    e.prompt(); 
    e.userChoice.then(()=>{ document.getElementById('installContainer').classList.add('hidden'); });
  };
});

// ================== Show Page ==================
function showPage(pageID){
  document.querySelectorAll('.page-view').forEach(p => p.classList.toggle('active', p.id===pageID));
}

// ================== Toggle Dropdown ==================
function toggleDropdown(id){
  document.getElementById(id).classList.toggle('hidden');
}

// ================== Fetch & Render Upcoming Shows ==================
async function fetchUpcomingShows() {
  try {
    const res= await fetch('https://api.jikan.moe/v4/seasons/coming');
    const data= await res.json();
    renderUpcomingShows(data.data);
  } catch(e){ console.log('Error fetching upcoming shows:', e);}
}
function renderUpcomingShows(shows){
  const container=document.getElementById('upcomingShowsGrid');
  if(!container) return;
  container.innerHTML=shows.slice(0,8).map(show => {
    const dateStr= show.aired ? new Date(show.aired.from).toLocaleString() : 'TBA';
    const img= show.images.webp?.large_image_url || show.images.jpg?.image_url || 'https://placehold.co/300x450/222/fff?text=No+Image';
    return `
      <div class="cursor-pointer" onclick='showChoice(${JSON.stringify(show)})'>
        <div class="relative rounded-lg overflow-hidden">
          <img src="${img}" class="w-full aspect-[2/3] object-cover" />
          <div class="absolute bottom-0 w-full bg-black bg-opacity-50 text-white text-xs p-1 text-center">${dateStr}</div>
        </div>
        <div class="mt-2 text-sm text-white truncate">${show.title}</div>
      </div>`;
  }).join('');
}

// ================== Fetch by Genre or Year ==================
async function fetchByFilter(genre, year) {
  showPage('filter');
  document.getElementById('filterTitle').innerText= genre ? `${genre} Masterpieces` : `Released in ${year}`;
  let query='', variables={};
  if(genre){
    query= `query($genre: String){Page(perPage:50){media(genre: $genre, type: ANIME, sort: POPULARITY_DESC){id title{english romaji} coverImage{large} episodes trailer{id site}}}}}`;
    variables= { genre };
  } else if(year){
    query= `query($seasonYear: Int){Page(perPage:50){media(seasonYear: $seasonYear, type: ANIME, sort: POPULARITY_DESC){id title{english romaji} coverImage{large} episodes trailer{id site}}}}}`;
    variables= { seasonYear: year };
  }
  try{
    const res= await fetch('https://graphql.anilist.co', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query, variables})
    });
    const r= await res.json();
    render(r.data.Page.media,'filterGrid', true);
  } catch(e){ console.log('Filter fetch error:', e);}
}

// ================== Load homepage grids ==================
function fetchGrid(s,t){
  const q= `query($s:[MediaSort]){Page(perPage:20){media(type:ANIME,sort:$s){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
  fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q, variables:{s:[s]}})})
  .then(res=>res.json())
  .then(r=>render(r.data.Page.media,t));
}

// ================== Render media ==================
function render(list, targetId, isGrid=false){
  const wishlist= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
  document.getElementById(targetId).innerHTML= list.map(a => {
    if(!a) return '';
    const inWish= wishlist.some(x=>x.id===a.id);
    return `
    <div class="cursor-pointer ${isGrid?'w-full':' '} rounded-lg overflow-hidden" onclick='showChoice(${JSON.stringify(a)})'>
      <div class="relative">
        <img src="${a.coverImage.large}" class="w-full aspect-[2/3] object-cover rounded-lg" />
        <div class="absolute top-2 right-2 text-white z-10" onclick='toggleWish(${JSON.stringify(a)}, event)'><i class="fa fa-heart ${inWish?'text-red-600':'text-gray-400'}"></i></div>
      </div>
      <div class="mt-2 text-xs font-bold uppercase text-gray-300 truncate">${a.title.english || a.title.romaji}</div>
    </div>`;
  }).join('');
}

// ================== Load homepage ==================
function loadHome() {
  fetchGrid("TRENDING_DESC", "trendingGrid");
  fetchGrid("SCORE_DESC", "ratedGrid");
  fetchGrid("START_DATE_DESC", "airingGrid");
  fetchGrid("POPULARITY_DESC", "popularGrid");
  const hist= JSON.parse(localStorage.getItem('ymls_hist')) || [];
  if(hist.length) {
    document.getElementById('continueSection').classList.remove('hidden');
    render(hist, 'continueGrid');
  }
}

// ================== Fetch hero ==================
async function fetchHero() {
  const q= `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id title{english romaji} bannerImage description episodes trailer{id site}}}}`;
  const r= await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q})}).then(res=>res.json());
  const top= r.data.Page.media[0];
  document.getElementById('hero').style.backgroundImage= `url(${top.bannerImage})`;
  document.getElementById('heroTitle').innerText= top.title.english || top.title.romaji;
  document.getElementById('heroDesc').innerHTML= top.description;
  document.getElementById('heroStreamBtn').onclick= ()=> openPlayer(top);
  if(top.trailer?.site==='youtube'){
    document.getElementById('heroTrailerBtn').onclick= ()=> { showTrailer(top.trailer.id); };
  }
}

// ================== Show choice (episodes, details) ==================
function showChoice(a){
  document.getElementById('choiceOverlay').style.display='flex';
  document.getElementById('choiceImg').src= a.coverImage.large;
  document.getElementById('choiceTitle').innerText= a.title.english || a.title.romaji;
  if(a.trailer?.site==='youtube'){
    document.getElementById('choicePlay').onclick= ()=>{ showTrailer(a.trailer.id); };
  } else{
    document.getElementById('choicePlay').onclick= ()=>{ openPlayer(a); };
  }
  document.getElementById('choiceWish').onclick= ()=>{ toggleWish(a); };
}

// ================== Open Player ==================
async function openPlayer(a, ep=1){
  if(a) currentAnime= a; currentEp=ep;
  document.getElementById('playerModal').classList.remove('hidden');
  document.getElementById('playerTitle').innerText= (currentAnime.title.english || currentAnime.title.romaji)+ ' — Episode '+ ep;
  document.getElementById('playerLoader').classList.remove('hidden');
  await loadStreamSources(currentAnime, ep);
  if(currentAnime.trailer?.site==='youtube'){
    document.getElementById('trailerBtn').classList.remove('hidden');
    document.getElementById('trailerBtn').onclick= ()=>{ showTrailer(currentAnime.trailer.id); };
  } else{
    document.getElementById('trailerBtn').classList.add('hidden');
  }
  renderEpisodes(currentAnime);
  fetchRecommendations(currentAnime.id);
}

// ================== Load streams ==================
async function loadStreamSources(a, ep=1){
  try{
    const title= (a.title.romaji||a.title.english).replace(/[^a-zA-Z0-9 ]/g,'');
    const res= await fetch(`${STREAM_API}/${title}-episode-${ep}`);
    const data= await res.json();
    if(data.sources && data.sources.length>0){
      renderStreamSources(data.sources);
    } else{
      alert('No streams available');
    }
  } catch(e){ console.log('Stream fetch error:', e); }
}

// ================== Render sources ==================
function renderStreamSources(sources){
  const container= document.getElementById('serverList');
  container.innerHTML= sources.map((s,i)=>`
    <button onclick="switchServer(${i}, ${JSON.stringify(sources)})" class="px-5 py-3 bg-gray-900 rounded-xl text-[10px] font-bold border border-gray-800 hover:border-red-500 whitespace-nowrap transition">
      ${s.quality.toUpperCase()}
    </button>
  `).join('');
  switchServer(0,sources);
}

// ================== Switch server ==================
function switchServer(idx, sources){
  if(hlsInstance) hlsInstance.destroy();
  const v= document.getElementById('player');
  const url= sources[idx].url;
  if(Hls.isSupported()){
    hlsInstance= new Hls();
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>{ document.getElementById('playerLoader').classList.add('hidden'); plyrInstance.play(); });
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src= url;
    v.addEventListener('loadedmetadata', ()=>{ document.getElementById('playerLoader').classList.add('hidden'); plyrInstance.play(); });
  }
}

// ================== Render episodes ==================
function renderEpisodes(a){
  const count= a.episodes||12;
  document.getElementById('totalEpDisplay').innerText= count + ' Total Episodes';
  document.getElementById('epList').innerHTML= Array.from({length: count}, (_,i)=>`
    <button onclick='openPlayer(null, ${i+1})' class='ep-btn ${currentEp===i+1?'ep-active':''}'>${i+1}</button>
  `).join('');
}

// ================== Show trailer overlay ==================
function showTrailer(trailerId){
  document.getElementById('trailerFrame').src= `https://www.youtube.com/embed/${trailerId}?autoplay=1`;
  document.getElementById('trailerOverlay').classList.remove('hidden');
}
function closeTrailer(){ document.getElementById('trailerOverlay').classList.add('hidden'); }

// ================== Fetch recommendations ==================
async function fetchRecommendations(id){
  const q= `query($id:Int){Media(id:$id){recommendations(perPage:15){nodes{mediaRecommendation{id title{english romaji} coverImage{large} episodes trailer{id site}}}}}}`;
  const r= await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q, variables:{id}})}).then(res=>res.json());
  render(r.data.Media.recommendations.nodes.map(n=>n.mediaRecommendation).filter(x=>x), 'recommendGrid');
}

// ================== Close Player ==================
function closePlayer(){
  document.getElementById('playerModal').classList.add('hidden');
  if(hlsInstance) hlsInstance.destroy();
}

// ================== Next Episode ==================
function nextEpisode(){
  if(currentAnime && currentAnime.episodes){
    const nextEp= currentEp+1;
    if(nextEp<= currentAnime.episodes){
      openPlayer(currentAnime, nextEp);
    }
  }
}

// ================== Show Trailer ==================
function showTrailer(trailerId){ 
  document.getElementById('trailerFrame').src= `https://www.youtube.com/embed/${trailerId}?autoplay=1`;
  document.getElementById('trailerOverlay').classList.remove('hidden');
}
function closeTrailer(){ document.getElementById('trailerOverlay').classList.add('hidden'); }

// ================== Toggle Wish ==================
function toggleWish(a, e=null){
  if(e) e.stopPropagation();
  let list= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
  const idx= list.findIndex(x=>x.id===a.id);
  if(idx===-1) list.unshift(a);
  else list.splice(idx,1);
  if(currentUser){
    currentUser.wishlist= list;
    let db= JSON.parse(localStorage.getItem('ymls_users_db'))||{};
    db[currentUser.name]= currentUser;
    localStorage.setItem('ymls_users_db', JSON.stringify(db));
    localStorage.setItem('ymls_active_user', JSON.stringify(currentUser));
  } else{
    localStorage.setItem('ymls_guest_wishlist', JSON.stringify(list));
  }
  if(document.getElementById('page-wishlist').classList.contains('active')) renderWishlist();
}

// ================== Render Wishlist ==================
function renderWishlist() {
  const w= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
  document.getElementById('wishlistGrid').innerHTML= w.map(a => `
    <div class="cursor-pointer" onclick='showChoice(${JSON.stringify(a)})'>
      <div class="relative">
        <img src="${a.coverImage.large}" class="w-full aspect-[2/3] rounded-lg object-cover" />
        <div class="absolute top-2 right-2 text-white" onclick='toggleWish(${JSON.stringify(a)}, event)'><i class="fa fa-heart text-red-600"></i></div>
      </div>
      <div class="mt-2 text-xs font-bold uppercase text-gray-300 truncate">${a.title.english || a.title.romaji}</div>
    </div>
  `).join('');
  document.getElementById('wishCount').innerText= `${w.length} Items`;
}

// ================== Fetch & Show Hero ==================
async function fetchHero() {
  const q= `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id title{english romaji} bannerImage description episodes trailer{id site}}}}`;
  const r= await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q})}).then(res=>res.json());
  const top= r.data.Page.media[0];
  document.getElementById('hero').style.backgroundImage= `url(${top.bannerImage})`;
  document.getElementById('heroTitle').innerText= top.title.english || top.title.romaji;
  document.getElementById('heroDesc').innerHTML= top.description;
  document.getElementById('heroStreamBtn').onclick= ()=> { openPlayer(top); };
  if(top.trailer?.site==='youtube'){
    document.getElementById('heroTrailerBtn').onclick= ()=> { showTrailer(top.trailer.id); };
  }
}

// ================== Generate Filters ==================
function genFilters() {
  const genres=["Action","Adventure","Comedy","Drama","Fantasy","Horror","Mystery","Romance","Sci-Fi","Sports","Supernatural","Thriller","Psychological"];
  document.getElementById('genreList').innerHTML= genres.map(x => `<button onclick="fetchByFilter('${x}')" class="genre-btn">${x}</button>`).join('');
  let yH=''; for(let y=2026; y>=2000; y--) yH+=`<button onclick="fetchByFilter('',${y})" class="genre-btn">${y}</button>`;
  document.getElementById('yearList').innerHTML=yH;
}

// ================== Load initial data ==================
window.onload= ()=>{
  // Generate filters
  genFilters();

  // Load homepage grids
  loadHome();

  // Fetch hero
  fetchHero();

  // Fetch upcoming shows
  fetchUpcomingShows();

  // Setup Plyr
  plyrInstance= new Plyr('#player', {
    controls:['play-large','play','progress','current-time','mute','volume','settings','fullscreen'],
    tooltips:{controls:true,seek:true}
  });

  // Register Service Worker
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
