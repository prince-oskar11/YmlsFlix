<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
:root {
  --plyr-color-main: #ef4444;
  --bg: #05070a;
  --card: #0f1117;
  --accent: #6366f1;
}
body {
  background: var(--bg);
  color: #e2e8f0;
  font-family: 'Inter', sans-serif;
  margin: 0;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  font-size: 13px;
}
/* Your existing styles ... (unchanged) */
.glass { background: rgba(5, 7, 10, 0.98); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.05); }
.logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.dropdown-content { display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 20px; z-index: 3000; width: 95%; max-width: 450px; padding: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
.show { display: block !important; animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 15px); } to { opacity: 1; transform: translate(-50%, 0); } }
.anime-card { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: var(--card); width: 145px; flex-shrink: 0; border: 1px solid #1f2937; }
.anime-card:hover { transform: translateY(-8px); border-color: #ef4444; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.15); }
.card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; transition: 0.5s; }
.anime-card:hover .card-img { transform: scale(1.05); }
.ep-badge { position: absolute; top: 8px; left: 8px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 7px; border-radius: 5px; z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
.wish-heart { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 20; color: white; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
.wish-heart:active { transform: scale(1.3); }
.wish-active { color: #ef4444 !important; background: white; border-color: #ef4444; }
#choiceOverlay, #confirmOverlay, #trailerOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.modal-box { background: #0f1117; border: 1px solid #1f2937; padding: 35px; border-radius: 30px; max-width: 340px; width: 92%; text-align: center; }
.cat-chip { background: #111827; border: 1px solid #1f2937; padding: 9px 18px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #94a3b8; white-space: nowrap; transition: 0.3s; }
.cat-active { background: #ef4444 !important; color: white !important; transform: translateY(-2px); border-color: white; }
.genre-btn { background: #1a1c23; border: 1px solid #2d2d2d; color: #e2e8f0; padding: 12px; border-radius: 12px; font-size: 10px; font-weight: 700; transition: 0.2s; }
.genre-btn:hover { background: var(--accent); border-color: white; }
#hero { height: 60vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 70px; position: relative; }
.hero-grad { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 12%, rgba(5,7,10,0.4) 50%, transparent 100%); }
.page-view { display: none; min-height: 100vh; padding-bottom: 120px; }
.active-view { display: block; }
.grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 18px; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.btn-red { background: #ef4444; color: white; padding: 15px; border-radius: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; width: 100%; border:none; transition: 0.3s; }
.btn-red:active { transform: scale(0.96); opacity: 0.9; }
.ep-btn { flex-shrink: 0; width: 48px; height: 48px; border-radius: 14px; background: #111827; font-weight: 900; color: white; border: 1px solid #1f2937; font-size: 12px; transition: 0.3s; }
.ep-active { background: #ef4444 !important; border-color: white !important; box-shadow: 0 0 18px rgba(239, 68, 68, 0.5); }
.sync-dot { position: absolute; bottom: 8px; right: 8px; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }
</style>
</head>
<body>

<header id="hero">
<div class="hero-grad"></div>
<div class="container mx-auto px-8 relative z-10">
<div class="flex items-center gap-3 mb-4">
<div class="bg-red-600 text-[9px] font-black px-3 py-1 rounded-md uppercase tracking-tighter">Editor's Choice</div>

</div>
</div>

<section><h2 class="text-[11px] font-black mb-7 uppercase text-orange-500 tracking-[0.4em]">Trending Now</h2><div id="trendingGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-3"></div></section>
<section><h2 class="text-[11px] font-black mb-7 uppercase text-yellow-500 tracking-[0.4em]">Top Rated Masterpieces</h2><div id="ratedGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-3"></div></section>
<section><h2 class="text-[11px] font-black mb-7 uppercase text-blue-500 tracking-[0.4em]">Just Airing</h2><div id="airingGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-3"></div></section>
<section><h2 class="text-[11px] font-black mb-7 uppercase text-purple-500 tracking-[0.4em]">All Time Popular</h2><div id="popularGrid" class="flex gap-6 overflow-x-auto no-scrollbar pb-3"></div></section>

<section class="mt-20">
<h2 class="text-[11px] font-black mb-7 uppercase text-green-500 tracking-[0.4em]">Upcoming Shows</h2>

</section>

<div id="page-filter" class="page-view container mx-auto p-6 pt-72">

<div id="filterGrid" class="grid-full"></div>
</div>

</div>

</div>

<!-- Player view -->
<div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
<div class="glass p-5 sticky top-0 flex justify-between items-center z-50">
<button onclick="closePlayer()" class="w-12 h-12 rounded-2xl bg-gray-900 hover:bg-gray-800 flex items-center justify-center transition"><i class="fa fa-chevron-left"></i></button>
<div class="text-center px-4 flex-1">

</div>

<button onclick="nextEpisode()" class="bg-red-600 flex-1 py-5 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-red-500 transition-all">Next Episode <i class="fa fa-chevron-right ml-2"></i></button>
</div>

</div>

<h2 class="text-[11px] font-black mb-8 uppercase text-red-600 tracking-[0.5em] text-center">Similar Series Recommendations</h2>

<!-- Scripts -->
<script>
const API='https://graphql.anilist.co', STREAM_API='https://api.consumet.org/anime/gogoanime';

let currentUser=JSON.parse(localStorage.getItem('ymls_active_user'));
let playMode='sub', currentAnime=null, currentEp=1, currentServers=[], lastTap=0, deferredPrompt, plyrInstance, hlsInstance;

// --------- Fetch Upcoming Shows --------------
async function fetchUpcomingShows() {
try {
const response= await fetch('https://api.jikan.moe/v4/seasons/coming');
const data= await response.json();
renderUpcomingShows(data.data);
} catch(e){ console.log('Error fetching upcoming shows:', e);}
}
function renderUpcomingShows(shows) {
const container=document.getElementById('upcomingShowsGrid');
if(!container) return;
container.innerHTML=shows.slice(0,8).map(show=>{
const airingStart= show.aired? show.aired.from : null;
const dateText= airingStart? new Date(airingStart).toLocaleString() : 'TBA';
const imgUrl= show.images.webp.large_image_url || show.images.jpg.image_url;
return `
<div class="anime-card" onclick='showChoice(${JSON.stringify(show)})'>
<div class="ep-badge">Upcoming</div>
<div class="wish-heart" style="background: rgba(0,0,0,0.7);"><i class="fa fa-clock-o"></i></div>
<div class="relative">
<img src="${imgUrl}" class="card-img" loading="lazy" style="aspect-ratio: 2/3;">
<div class="absolute bottom-0 w-full bg-black bg-opacity-50 text-white text-xs p-1 text-center">${dateText}</div>
</div>
<div class="p-3 truncate text-[10px] font-black uppercase text-gray-400 tracking-tight">${show.title}</div>
</div>`;
}).join('');
}

// --------- Fetch by Genre or Year --------------
async function fetchByFilter(genre, year) {
showPage('filter');
const filterTitle= genre ? `${genre} Masterpieces` : `Released in ${year}`;
document.getElementById('filterTitle').innerText= filterTitle;

let query='', variables={};
if(genre){
query= `
query($genre: String){
  Page(perPage:50){
    media(genre: $genre, type: ANIME, sort: POPULARITY_DESC){
      id
      title { english romaji }
      coverImage { large }
      episodes
      trailer { id site }
    }
  }
}
`;
variables= { genre: genre };
} else if(year){
query= `
query($seasonYear: Int){
  Page(perPage:50){
    media(seasonYear: $seasonYear, type: ANIME, sort: POPULARITY_DESC){
      id
      title { english romaji }
      coverImage { large }
      episodes
      trailer { id site }
    }
  }
}
`;
variables= { seasonYear: year };
}

try{
const res= await fetch('https://graphql.anilist.co', {
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({query, variables})
});
const r= await res.json();
render(r.data.Page.media,'filterGrid', true);
} catch(e){ console.log('Error fetching filter:', e);}
}

// --------- Fetch Home Grids -----------
function fetchGrid(s,t){
const q= `query($s:[MediaSort]){Page(perPage:20){media(type:ANIME,sort:$s){id title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q, variables:{s:[s]}})})
.then(res=>res.json())
.then(r=>render(r.data.Page.media,t));
}

// --------- Render media items ----------
function render(l,t,isGrid=false){
const wishlist= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
document.getElementById(t).innerHTML= l.map(a=>{
if(!a) return '';
const inWish= wishlist.some(x=>x.id===a.id);
return `
<div class="anime-card ${isGrid?'w-full':''}" onclick='showChoice(${JSON.stringify(a)})'>
<div class="ep-badge">${a.episodes||'?'} EP</div>
${a.hasNew? '<div class="sync-dot"></div>':''}
<div class="wish-heart ${inWish?'wish-active':''}" onclick='toggleWish(${JSON.stringify(a)}, event)'><i class="fa fa-${inWish?'heart':'heart-o'}"></i></div>
<img src="${a.coverImage.large}" class="card-img" loading="lazy"/>
<div class="p-3 truncate text-[10px] font-black uppercase text-gray-400 tracking-tight">${a.title.english || a.title.romaji}</div>
</div>`;
}).join('');
}

// --------- Load homepage data ---------
function loadHome() {
fetchGrid("TRENDING_DESC","trendingGrid");
fetchGrid("SCORE_DESC","ratedGrid");
fetchGrid("START_DATE_DESC","airingGrid");
fetchGrid("POPULARITY_DESC","popularGrid");
const h= JSON.parse(localStorage.getItem('ymls_hist'))||[];
if(h.length){
document.getElementById('continueSection').classList.remove('hidden');
render(h,'continueGrid');
}
}

// --------- Fetch Hero ---------
async function fetchHero() {
const q= `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id title{english romaji} bannerImage description episodes trailer{id site}}}}`;
const r= await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q})}).then(res=>res.json());
const top= r.data.Page.media[0];
document.getElementById('hero').style.backgroundImage= `url(${top.bannerImage})`;
document.getElementById('heroTitle').innerText= top.title.english || top.title.romaji;
document.getElementById('heroDesc').innerHTML= top.description;
document.getElementById('heroPlayBtn').onclick= ()=> openPlayer(top);
if(top.trailer?.site==='youtube'){
document.getElementById('heroTrailerBtn').onclick= ()=> { showTrailer(top.trailer.id); };
}
}

// --------- Show choice (for episodes, etc.) ----------
function showChoice(a){
document.getElementById('choiceOverlay').style.display='flex';
document.getElementById('choiceImg').src= a.coverImage.large;
document.getElementById('choiceTitle').innerText= a.title.english || a.title.romaji;
// Trailer handling
if(a.trailer?.site==='youtube'){
document.getElementById('choicePlay').onclick= ()=>{ showTrailer(a.trailer.id); };
} else{
document.getElementById('choicePlay').onclick= ()=>{ openPlayer(a); };
}
document.getElementById('choiceWish').onclick= ()=>{ toggleWish(a); };
}

// --------- Load episode stream ---------
async function openPlayer(a, ep=1){
if(a) currentAnime= a; currentEp=ep;
document.getElementById('playerView').classList.remove('hidden');
document.getElementById('playerTitle').innerText= (currentAnime.title.english || currentAnime.title.romaji)+ ' — Episode '+ ep;
document.getElementById('playerLoader').classList.remove('hidden');
await loadStreamSources(currentAnime, ep);
if(currentAnime.trailer?.site==='youtube'){
document.getElementById('trailerBtn').classList.remove('hidden');
document.getElementById('trailerBtn').onclick= ()=> showTrailer(currentAnime.trailer.id);
} else{
document.getElementById('trailerBtn').classList.add('hidden');
}
renderEpisodes(currentAnime);
fetchRecommendations(currentAnime.id);
}

// --------- Load stream sources -----------
async function loadStreamSources(a, ep=1){
try{
const title= (a.title.romaji||a.title.english).replace(/[^a-zA-Z0-9 ]/g,'');
const res= await fetch(`${STREAM_API}/${title}-episode-${ep}`);
const data= await res.json();
if(data.sources && data.sources.length>0){
renderStreamSources(data.sources);
} else{
alert('No streams available');
}
}catch(e){ console.log('Error fetching streams:', e);}
}

// --------- Render sources ---------
function renderStreamSources(sources){
const container=document.getElementById('serverList');
container.innerHTML= sources.map((s,i)=>`
<button onclick="switchServer(${i}, ${JSON.stringify(sources)})" class="px-5 py-3 bg-gray-900 rounded-xl text-[10px] font-bold border border-gray-800 hover:border-red-500 whitespace-nowrap transition">
${s.quality.toUpperCase()}
</button>
`).join('');
switchServer(0,sources);
}

// --------- Switch server ---------
function switchServer(idx, sources){
if(hlsInstance) hlsInstance.destroy();
const v= document.getElementById('player');
const url= sources[idx].url;
if(Hls.isSupported()){
hlsInstance= new Hls();
hlsInstance.loadSource(url);
hlsInstance.attachMedia(v);
hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>{ document.getElementById('playerLoader').classList.add('hidden'); plyrInstance.play(); });
} else if(v.canPlayType('application/vnd.apple.mpegurl')){
v.src= url;
v.addEventListener('loadedmetadata', ()=>{ document.getElementById('playerLoader').classList.add('hidden'); plyrInstance.play(); });
}
}

// --------- Render episodes list ---------
function renderEpisodes(a){
const count=a.episodes||12;
document.getElementById('totalEpDisplay').innerText= count + ' Total Episodes';
document.getElementById('epList').innerHTML= Array.from({length: count}, (_,i)=>`
<button onclick='openPlayer(null, ${i+1})' class='ep-btn ${currentEp===i+1?'ep-active':''}'>${i+1}</button>
`).join('');
}

// --------- Show trailer overlay ---------
function showTrailer(trailerId){
document.getElementById('trailerFrame').src= `https://www.youtube.com/embed/${trailerId}?autoplay=1`;
document.getElementById('trailerOverlay').style.display='flex';
}

// --------- Fetch recommendations ---------
async function fetchRecommendations(id){
const q= `query($id:Int){Media(id:$id){recommendations(perPage:15){nodes{mediaRecommendation{id title{english romaji} coverImage{large} episodes trailer{id site}}}}}}`;
const r= await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query:q, variables:{id}})}).then(res=>res.json());
render(r.data.Media.recommendations.nodes.map(n=>n.mediaRecommendation).filter(x=>x), 'recommendGrid');
}

// --------- Show page ---------
function showPage(p){
document.querySelectorAll('.page-view').forEach(v=>v.classList.toggle('active-view', v.id===`page-${p}`));
if(p==='wishlist') renderWishlist();
}

// --------- Wishlist ---------
function renderWishlist() {
const w= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
render(w,'wishlistGrid', true);
document.getElementById('wishCount').innerText= w.length + ' Items';
}

// --------- Toggle wish ---------
function toggleWish(a,e=null){
if(e) e.stopPropagation();
let list= currentUser? (currentUser.wishlist||[]): (JSON.parse(localStorage.getItem('ymls_guest_wishlist'))||[]);
const idx= list.findIndex(x=>x.id===a.id);
if(idx===-1) list.unshift(a);
else list.splice(idx,1);
if(currentUser){
currentUser.wishlist= list;
let db= JSON.parse(localStorage.getItem('ymls_users_db'))||{};
db[currentUser.name]= currentUser;
localStorage.setItem('ymls_users_db', JSON.stringify(db));
localStorage.setItem('ymls_active_user', JSON.stringify(currentUser));
} else{
localStorage.setItem('ymls_guest_wishlist', JSON.stringify(list));
}
if(document.getElementById('page-wishlist').classList.contains('active-view')) renderWishlist();
loadHome();
}

// --------- Handle auth ---------
function handleAuth(mode){
const user= document.getElementById('authEmail').value.trim();
const pass= document.getElementById('authPass').value.trim();
if(!user || !pass) return alert('All fields required');
let db= JSON.parse(localStorage.getItem('ymls_users_db'))||{};
if(mode==='signup'){
if(db[user]) return alert('Username already exists');
db[user]= {name:user, pass:pass, wishlist:[], history:[]};
localStorage.setItem('ymls_users_db', JSON.stringify(db));
alert('Account created successfully!');
} else{
if(db[user] && db[user].pass===pass){
currentUser= db[user];
localStorage.setItem('ymls_active_user', JSON.stringify(currentUser));
location.reload();
} else alert('Invalid credentials');
}
}
// --------- Logout ---------
function handleLogout(){ localStorage.removeItem('ymls_active_user'); location.reload(); }

// --------- Generate filters ---------
function genFilters() {
const g= ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Mystery", "Romance", "Sci-Fi", "Sports", "Supernatural", "Thriller", "Psychological"];
document.getElementById('genreList').innerHTML= g.map(x => `<button onclick="fetchByFilter('${x}')" class="genre-btn">${x}</button>`).join('');
let yH=''; for(let y=2026; y>=2000; y--) yH+=`<button onclick="fetchByFilter('',${y})" class="genre-btn">${y}</button>`;
document.getElementById('yearList').innerHTML= yH;
}
