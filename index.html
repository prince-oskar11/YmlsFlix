<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #5d5dff;
            --text-main: #ff4d4d;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .anime-card:hover .play-overlay { opacity: 1; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .active-tab { color: var(--accent-color) !important; border-bottom: 2px solid var(--accent-color); }
        #hero-bg {
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
        }
        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-20">

    <!-- Auth Overlay -->
    <div id="auth-modal" class="fixed inset-0 z-[100] bg-black bg-opacity-90 flex items-center justify-center hidden">
        <div class="glass p-8 rounded-xl w-80 text-center">
            <h2 id="auth-title" class="text-2xl font-bold mb-4 text-red-500">Sign In</h2>
            <input type="text" id="auth-user" placeholder="Username or Email" class="w-full bg-zinc-800 p-2 rounded mb-3 outline-none">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-zinc-800 p-2 rounded mb-4 outline-none">
            <button onclick="handleAuth()" class="w-full bg-blue-600 p-2 rounded font-bold mb-2">Continue</button>
            <p onclick="toggleAuthMode()" id="auth-switch" class="text-xs text-gray-400 cursor-pointer">Don't have an account? Sign Up</p>
        </div>
    </div>

    <!-- Header Navigation -->
    <nav class="sticky top-0 z-50 glass px-4 py-3 flex justify-between items-center">
        <div onclick="showPage('home')" class="cursor-pointer">
            <h1 class="text-xl font-black text-red-500 italic">YMLSFLIX <span class="text-white block text-xs mt-[-5px]">PRO</span></h1>
        </div>
        <div class="flex gap-6 text-xl">
            <i onclick="showPage('home')" class="fa-solid fa-house cursor-pointer hover:text-blue-500"></i>
            <i onclick="showPage('genres')" class="fa-solid fa-layer-group cursor-pointer hover:text-blue-500"></i>
            <i onclick="showPage('wishlist')" class="fa-solid fa-heart cursor-pointer hover:text-blue-500"></i>
            <i onclick="showPage('profile')" class="fa-solid fa-user cursor-pointer hover:text-blue-500"></i>
        </div>
    </nav>

    <!-- Search & Filters Section -->
    <div class="p-4 bg-gradient-to-b from-zinc-900 to-transparent">
        <div class="flex gap-2 items-center mb-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
                <input oninput="debounceSearch(this.value)" type="text" placeholder="Search for anime..." class="w-full bg-zinc-800 py-2 pl-10 pr-4 rounded-lg outline-none focus:ring-1 ring-blue-500">
                <div id="search-results" class="absolute top-12 left-0 w-full glass rounded-lg z-50 max-h-60 overflow-y-auto hidden"></div>
            </div>
            <button class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-sm">INSTALL</button>
        </div>
        
        <div class="flex gap-2 overflow-x-auto hide-scroll pb-2">
            <button onclick="fetchByType('tv')" class="bg-zinc-800 px-6 py-1 rounded-full text-sm whitespace-nowrap">TV SERIES</button>
            <button onclick="fetchByType('movie')" class="bg-zinc-800 px-6 py-1 rounded-full text-sm whitespace-nowrap">MOVIES</button>
            <button onclick="fetchByType('ova')" class="bg-zinc-800 px-6 py-1 rounded-full text-sm whitespace-nowrap">OVA</button>
        </div>
    </div>

    <!-- Dynamic Hero Background -->
    <div id="hero-bg" class="w-full h-64 relative flex flex-col justify-end p-6 mb-4">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
        <h2 id="hero-title" class="text-2xl font-bold z-10">Welcome to YmlsFlix</h2>
        <p id="hero-meta" class="text-sm text-gray-300 z-10 italic">Top Rated Masterpiece</p>
    </div>

    <!-- Content Pages -->
    <main id="main-content" class="px-4">
        
        <!-- Home Page Template -->
        <section id="page-home" class="page-section">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-orange-500 font-bold tracking-widest uppercase text-sm">Trending Now</h3>
                </div>
                <div id="trending-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>

            <div class="mb-8">
                <h3 class="text-yellow-500 font-bold tracking-widest uppercase text-sm mb-3">Top Rated Masterpieces</h3>
                <div id="top-rated-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>

            <div class="mb-8">
                <h3 class="text-blue-500 font-bold tracking-widest uppercase text-sm mb-3">Upcoming Seasons</h3>
                <div id="upcoming-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
            </div>
        </section>

        <!-- Genres Page -->
        <section id="page-genres" class="page-section hidden">
            <h2 class="text-xl font-bold mb-4">Explore Content</h2>
            <div class="flex gap-4 mb-6 border-b border-zinc-800 pb-2">
                <button onclick="toggleGenreView('all')" id="tab-all" class="active-tab font-bold">ALL GENRES</button>
                <button onclick="toggleGenreView('years')" id="tab-years" class="font-bold text-gray-500">YEARS (2000+)</button>
            </div>
            <div id="genre-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-8"></div>
            <div id="genre-results" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- Wishlist Page -->
        <section id="page-wishlist" class="page-section hidden">
            <h2 class="text-xl font-bold mb-4 italic text-red-500">Your Wishlist</h2>
            <div id="wishlist-grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- Profile Page -->
        <section id="page-profile" class="page-section hidden">
            <div class="glass p-6 rounded-2xl flex flex-col items-center">
                <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-3xl mb-4">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h2 id="user-display" class="text-xl font-bold">Guest User</h2>
                <div class="w-full mt-8 flex flex-col gap-4">
                    <button onclick="clearHistory()" class="w-full text-left p-3 glass rounded-lg flex justify-between items-center">
                        <span>Clear Watch History</span>
                        <i class="fa-solid fa-trash text-red-500"></i>
                    </button>
                    <button onclick="signOut()" class="w-full text-left p-3 glass rounded-lg text-red-500 font-bold">
                        Sign Out
                    </button>
                </div>
            </div>
        </section>

        <!-- Details & Player Page -->
        <section id="page-details" class="page-section hidden">
            <div id="player-container" class="relative w-full aspect-video bg-black rounded-lg overflow-hidden mb-4">
                <div id="player-placeholder" class="absolute inset-0 flex items-center justify-center">
                    <button onclick="startTrailer()" class="bg-red-600 h-16 w-16 rounded-full flex items-center justify-center text-2xl">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                </div>
                <div id="video-frame" class="hidden w-full h-full"></div>
            </div>

            <div class="flex gap-2 mb-4">
                <span id="det-sub" class="bg-blue-600 text-[10px] px-2 py-1 rounded font-bold uppercase">SUB</span>
                <span id="det-dub" class="bg-green-600 text-[10px] px-2 py-1 rounded font-bold uppercase hidden">DUB</span>
                <span class="bg-zinc-800 text-[10px] px-2 py-1 rounded font-bold uppercase" id="det-episodes">?? EPS</span>
            </div>

            <h1 id="det-title" class="text-2xl font-bold mb-2">Anime Title</h1>
            
            <div class="flex gap-4 mb-6">
                <button onclick="addToWishlistFromDetails()" class="bg-zinc-800 flex-1 py-2 rounded font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-heart text-red-500"></i> Wishlist
                </button>
                <button onclick="toggleRotation()" class="bg-zinc-800 p-2 rounded w-12 flex items-center justify-center">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>

            <div class="flex gap-4 border-b border-zinc-800 mb-4 pb-2 text-sm">
                <button onclick="showDetailsTab('synopsis')" id="tab-syn" class="active-tab">SYNOPSIS</button>
                <button onclick="showDetailsTab('chars')" id="tab-char">CHARACTERS</button>
            </div>

            <div id="synopsis-content" class="text-sm text-gray-400 leading-relaxed mb-8"></div>
            <div id="chars-content" class="hidden grid grid-cols-2 gap-4 mb-8"></div>

            <h3 class="font-bold mb-4">Recommended for You</h3>
            <div id="recommended-list" class="flex gap-4 overflow-x-auto hide-scroll"></div>
        </section>
    </main>

    <script>
        const API_URL = 'https://api.jikan.moe/v4';
        let currentAnime = null;
        let searchTimeout = null;
        let isSignUp = false;

        // Init App
        window.onload = () => {
            fetchHomeData();
            checkAuth();
            loadWishlist();
        };

        // --- Core Navigation ---
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            window.scrollTo(0, 0);
            if(pageId === 'home') fetchHomeData();
            if(pageId === 'genres') renderGenreList();
        }

        // --- Data Fetching ---
        async function fetchHomeData() {
            // Trending
            const trending = await fetch(`${API_URL}/top/anime?filter=airing&limit=10`).then(res => res.json());
            renderList(trending.data, 'trending-list');
            
            // Set Hero BG from top trending
            if(trending.data[0]) {
                document.getElementById('hero-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(5,5,5,1)), url('${trending.data[0].images.jpg.large_image_url}')`;
                document.getElementById('hero-title').innerText = trending.data[0].title;
            }

            // Top Rated
            const top = await fetch(`${API_URL}/top/anime?limit=10`).then(res => res.json());
            renderList(top.data, 'top-rated-list');

            // Upcoming
            const upcoming = await fetch(`${API_URL}/seasons/upcoming?limit=10`).then(res => res.json());
            renderList(upcoming.data, 'upcoming-list', true);
        }

        function renderList(data, containerId, showDate = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(anime => `
                <div class="min-w-[140px] relative group cursor-pointer" onclick="viewDetails(${anime.mal_id})">
                    <div class="relative aspect-[3/4] overflow-hidden rounded-lg">
                        <img src="${anime.images.jpg.image_url}" class="w-full h-full object-cover">
                        <div class="absolute top-1 left-1 bg-black/70 text-[10px] px-1 rounded font-bold">${anime.episodes || '?'} EP</div>
                        <div onclick="event.stopPropagation(); toggleWishlist(${anime.mal_id}, '${anime.title.replace(/'/g, "\\'")}', '${anime.images.jpg.image_url}')" 
                             class="absolute top-1 right-1 h-6 w-6 glass rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-heart ${isInWishlist(anime.mal_id) ? 'text-red-500' : 'text-white'}"></i>
                        </div>
                    </div>
                    <p class="text-xs mt-2 font-semibold truncate">${anime.title}</p>
                    ${showDate ? `<p class="text-[10px] text-gray-500">${anime.aired.from ? anime.aired.from.split('T')[0] : 'TBA'}</p>` : ''}
                </div>
            `).join('');
        }

        // --- Search Logic ---
        function debounceSearch(val) {
            clearTimeout(searchTimeout);
            if(val.length < 3) {
                document.getElementById('search-results').classList.add('hidden');
                return;
            }
            searchTimeout = setTimeout(async () => {
                const res = await fetch(`${API_URL}/anime?q=${val}&limit=5`).then(r => r.json());
                const resultsBox = document.getElementById('search-results');
                resultsBox.innerHTML = res.data.map(a => `
                    <div onclick="viewDetails(${a.mal_id})" class="flex p-2 gap-3 hover:bg-zinc-700 cursor-pointer border-b border-zinc-800">
                        <img src="${a.images.jpg.small_image_url}" class="w-10 h-14 object-cover rounded">
                        <div>
                            <p class="text-sm font-bold truncate w-40">${a.title}</p>
                            <p class="text-[10px] text-gray-400">${a.type} • ${a.score || 'N/A'}</p>
                        </div>
                    </div>
                `).join('');
                resultsBox.classList.remove('hidden');
            }, 500);
        }

        // --- Details & Player ---
        async function viewDetails(id) {
            document.getElementById('search-results').classList.add('hidden');
            showPage('details');
            const res = await fetch(`${API_URL}/anime/${id}/full`).then(r => r.json());
            const anime = res.data;
            currentAnime = anime;

            document.getElementById('det-title').innerText = anime.title;
            document.getElementById('det-episodes').innerText = `${anime.episodes || '?'} EPS`;
            document.getElementById('synopsis-content').innerText = anime.synopsis;
            
            // Sub/Dub Logic (Mock based on popularity)
            document.getElementById('det-dub').classList.toggle('hidden', anime.members < 500000);

            // Fetch Characters
            const charRes = await fetch(`${API_URL}/anime/${id}/characters`).then(r => r.json());
            document.getElementById('chars-content').innerHTML = charRes.data.slice(0, 8).map(c => `
                <div class="flex items-center gap-2 glass p-1 rounded-lg">
                    <img src="${c.character.images.jpg.image_url}" class="w-10 h-10 rounded object-cover">
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-bold truncate">${c.character.name}</p>
                        <p class="text-[8px] text-gray-400 italic">${c.role}</p>
                    </div>
                </div>
            `).join('');

            // Fetch Recommendations
            const recRes = await fetch(`${API_URL}/anime/${id}/recommendations`).then(r => r.json());
            renderList(recRes.data.slice(0, 10).map(i => i.entry), 'recommended-list');

            // Reset Player
            document.getElementById('player-placeholder').classList.remove('hidden');
            document.getElementById('video-frame').classList.add('hidden');
            document.getElementById('video-frame').innerHTML = '';
        }

        function startTrailer() {
            if(currentAnime && currentAnime.trailer.youtube_id) {
                document.getElementById('player-placeholder').classList.add('hidden');
                document.getElementById('video-frame').classList.remove('hidden');
                document.getElementById('video-frame').innerHTML = `
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/${currentAnime.trailer.youtube_id}?autoplay=1" frameborder="0" allowfullscreen></iframe>
                    <div id="next-ep-btn" class="absolute bottom-10 right-4 hidden">
                        <button onclick="alert('Next Episode Coming Soon')" class="bg-blue-600 px-4 py-2 rounded text-xs font-bold">NEXT EPISODE</button>
                    </div>
                `;
                // Show "Next Ep" after 10 seconds of mock playback
                setTimeout(() => document.getElementById('next-ep-btn')?.classList.remove('hidden'), 10000);
            } else {
                alert("Trailer not available for this title.");
            }
        }

        function showDetailsTab(tab) {
            document.getElementById('synopsis-content').classList.toggle('hidden', tab !== 'synopsis');
            document.getElementById('chars-content').classList.toggle('hidden', tab !== 'chars');
            document.getElementById('tab-syn').classList.toggle('active-tab', tab === 'synopsis');
            document.getElementById('tab-char').classList.toggle('active-tab', tab === 'chars');
        }

        // --- Genre & Year Filtering ---
        const genresList = [
            {id: 1, name: 'Action'}, {id: 2, name: 'Adventure'}, {id: 4, name: 'Comedy'}, 
            {id: 8, name: 'Drama'}, {id: 10, name: 'Fantasy'}, {id: 14, name: 'Horror'}, 
            {id: 22, name: 'Romance'}, {id: 24, name: 'Sci-Fi'}
        ];

        function renderGenreList() {
            const grid = document.getElementById('genre-grid');
            grid.innerHTML = genresList.map(g => `
                <button onclick="fetchByGenre(${g.id})" class="glass py-3 rounded-lg text-sm font-bold hover:bg-zinc-700 transition">
                    ${g.name}
                </button>
            `).join('');
            document.getElementById('tab-all').classList.add('active-tab');
            document.getElementById('tab-years').classList.remove('active-tab');
        }

        function toggleGenreView(mode) {
            const grid = document.getElementById('genre-grid');
            if(mode === 'years') {
                document.getElementById('tab-years').classList.add('active-tab');
                document.getElementById('tab-all').classList.remove('active-tab');
                let years = [];
                for(let i = 2024; i >= 2000; i--) years.push(i);
                grid.innerHTML = years.map(y => `
                    <button onclick="fetchByYear(${y})" class="glass py-3 rounded-lg text-sm font-bold hover:bg-zinc-700">
                        ${y}
                    </button>
                `).join('');
            } else {
                renderGenreList();
            }
        }

        async function fetchByGenre(id) {
            const res = await fetch(`${API_URL}/anime?genres=${id}&order_by=score&sort=desc`).then(r => r.json());
            renderResults(res.data);
        }

        async function fetchByYear(year) {
            const res = await fetch(`${API_URL}/anime?start_date=${year}-01-01&end_date=${year}-12-31&order_by=score&sort=desc`).then(r => r.json());
            renderResults(res.data);
        }

        async function fetchByType(type) {
            const res = await fetch(`${API_URL}/anime?type=${type}&order_by=score&sort=desc`).then(r => r.json());
            showPage('genres');
            renderResults(res.data);
        }

        function renderResults(data) {
            const container = document.getElementById('genre-results');
            container.innerHTML = data.map(anime => `
                <div onclick="viewDetails(${anime.mal_id})" class="relative aspect-[3/4] overflow-hidden rounded-lg mb-2">
                    <img src="${anime.images.jpg.image_url}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <p class="absolute bottom-2 left-2 text-[10px] font-bold line-clamp-1">${anime.title}</p>
                </div>
            `).join('');
        }

        // --- Wishlist System ---
        let wishlist = JSON.parse(localStorage.getItem('ymls_wishlist')) || [];

        function toggleWishlist(id, title, img) {
            const idx = wishlist.findIndex(item => item.id === id);
            if(idx > -1) {
                wishlist.splice(idx, 1);
            } else {
                wishlist.push({id, title, img});
            }
            localStorage.setItem('ymls_wishlist', JSON.stringify(wishlist));
            loadWishlist();
            // Refresh current UI to show icon change
            if(document.getElementById('page-home').classList.contains('hidden') === false) fetchHomeData();
        }

        function addToWishlistFromDetails() {
            if(currentAnime) toggleWishlist(currentAnime.mal_id, currentAnime.title, currentAnime.images.jpg.image_url);
        }

        function isInWishlist(id) {
            return wishlist.some(item => item.id === id);
        }

        function loadWishlist() {
            const container = document.getElementById('wishlist-grid');
            if(wishlist.length === 0) {
                container.innerHTML = `<p class="col-span-2 text-center text-gray-500 mt-10">Empty list...</p>`;
                return;
            }
            container.innerHTML = wishlist.map(a => `
                <div onclick="viewDetails(${a.id})" class="relative group aspect-[3/4] rounded-lg overflow-hidden">
                    <img src="${a.img}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                         <i class="fa-solid fa-play text-3xl"></i>
                    </div>
                </div>
            `).join('');
        }

        // --- Auth & Profile ---
        function checkAuth() {
            const user = localStorage.getItem('ymls_user');
            if(!user) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else {
                document.getElementById('user-display').innerText = user;
                document.getElementById('auth-modal').classList.add('hidden');
            }
        }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? 'Sign Up' : 'Sign In';
            document.getElementById('auth-switch').innerText = isSignUp ? 'Already have an account? Sign In' : "Don't have an account? Sign Up";
        }

        function handleAuth() {
            const user = document.getElementById('auth-user').value;
            if(user.length < 3) return alert("Enter valid credentials");
            localStorage.setItem('ymls_user', user);
            checkAuth();
        }

        function signOut() {
            localStorage.removeItem('ymls_user');
            location.reload();
        }

        function clearHistory() {
            if(confirm("Are you sure you want to clear your history?")) {
                alert("History Cleared Successfully");
            }
        }

        // --- Utilities ---
        function toggleRotation() {
            const container = document.getElementById('player-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                container.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                });
            }
        }
    </script>
</body>
</html>
