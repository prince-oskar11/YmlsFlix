<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMLS Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #080a0f; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #1f2937; }
        .anime-card { transition: 0.3s; cursor: pointer; }
        .anime-card:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .genre-btn { white-space: nowrap; background: #1f2937; padding: 5px 15px; border-radius: 20px; font-size: 12px; }
        .genre-btn:hover { background: #6366f1; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass p-4">
        <div class="container mx-auto flex flex-wrap items-center justify-between gap-4">
            <h1 class="text-3xl font-black text-indigo-500" onclick="location.reload()">YMLS</h1>
            
            <div class="flex-1 max-w-sm relative">
                <input type="text" id="searchBar" placeholder="Search..." class="w-full bg-gray-900 border border-gray-700 rounded-full py-2 px-10 focus:ring-2 focus:ring-indigo-500 outline-none">
                <i class="fa fa-search absolute left-4 top-3 text-gray-500"></i>
            </div>

            <div id="authSection">
                <button onclick="openModal('authModal')" class="bg-indigo-600 px-4 py-2 rounded-lg font-bold text-xs">Login</button>
            </div>
        </div>
    </nav>

    <div class="flex gap-2 overflow-x-auto p-4 no-scrollbar container mx-auto" id="genreBar">
        </div>

    <main class="container mx-auto p-4">
        <section id="favSection" class="mb-10 hidden">
            <h2 class="text-xl font-bold mb-4 text-red-500"><i class="fa fa-heart"></i> My Favorites</h2>
            <div id="favGrid" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
        </section>

        <h2 id="gridTitle" class="text-xl font-bold mb-6 uppercase tracking-wider text-indigo-400">Trending Now</h2>
        <div id="mainGrid" class="grid grid-cols-2 md:grid-cols-6 gap-6"></div>
    </main>

    <div id="authModal" class="modal">
        <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md border border-gray-800 relative">
            <button onclick="closeModal('authModal')" class="absolute top-4 right-4"><i class="fa fa-times"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-center">Sign In</h2>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-xl mb-4 flex items-center justify-center gap-2">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-5"> Google Login
            </button>
            <input type="email" id="email" placeholder="Email" class="w-full bg-gray-800 p-3 rounded mb-2 border border-gray-700">
            <input type="password" id="pass" placeholder="Password" class="w-full bg-gray-800 p-3 rounded mb-4 border border-gray-700">
            <button onclick="handleEmailAuth()" class="w-full bg-indigo-600 py-3 rounded font-bold">Sign In / Sign Up</button>
        </div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[200] bg-black hidden flex flex-col">
        <div class="p-4 flex justify-between items-center glass">
            <button onclick="closePlayer()" class="text-xl"><i class="fa fa-arrow-left"></i></button>
            <h3 id="playerTitle" class="font-bold truncate px-4"></h3>
            <button id="favBtn" class="text-2xl text-gray-500"><i class="fa fa-heart"></i></button>
        </div>
        <div class="flex-1 bg-black">
            <iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="p-4 bg-gray-900 flex flex-wrap gap-2">
            <select id="serverSelect" onchange="changeServer(this.value)" class="bg-gray-800 p-2 rounded text-xs outline-none">
                <option value="https://vidlink.pro/anime/">Server 1</option>
                <option value="https://vidsrc.me/anime/">Server 2</option>
                <option value="https://embed.su/embed/anime/">Server 3</option>
            </select>
            <div id="epList" class="flex gap-2 overflow-x-auto no-scrollbar py-2"></div>
        </div>
    </div>

    <script>
        // --- CONFIG (FIX THIS) ---
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY",
            authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
            projectId: "PASTE_YOUR_PROJECT_ID",
            storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
            messagingSenderId: "PASTE_YOUR_SENDER_ID",
            appId: "PASTE_YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const ANILIST = 'https://graphql.anilist.co';
        let currentAnime = null;
        let favorites = JSON.parse(localStorage.getItem('ymls_favs')) || [];

        // --- LOAD DATA ---
        window.onload = () => {
            fetchList({ sort: "TRENDING_DESC" });
            renderGenres();
            renderFavorites();
        };

        async function fetchList(vars) {
            const query = `query($s: [MediaSort], $search: String, $g: String){ Page(perPage:24){ media(type:ANIME, sort:$s, search:$search, genre:$g){ id idMal title{english romaji} coverImage{large} averageScore episodes } } }`;
            const res = await fetch(ANILIST, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({query, variables: { s: vars.sort, search: vars.search, g: vars.genre }})
            });
            const data = await res.json();
            renderGrid(data.data.Page.media);
        }

        function renderGrid(list) {
            document.getElementById('mainGrid').innerHTML = list.map(a => `
                <div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'>
                    <img src="${a.coverImage.large}" class="rounded-xl aspect-[3/4] object-cover w-full">
                    <h4 class="mt-2 text-xs font-bold truncate">${a.title.english || a.title.romaji}</h4>
                </div>
            `).join('');
        }

        // --- SEARCH & GENRES ---
        document.getElementById('searchBar').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                fetchList({ search: e.target.value });
                document.getElementById('gridTitle').innerText = "Results for: " + e.target.value;
            }
        });

        function renderGenres() {
            const list = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Horror", "Romance", "Sci-Fi"];
            document.getElementById('genreBar').innerHTML = list.map(g => `<button onclick="fetchList({genre:'${g}'})" class="genre-btn">${g}</button>`).join('');
        }

        // --- PLAYER & APIS ---
        function openPlayer(anime) {
            currentAnime = anime;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = anime.title.english || anime.title.romaji;
            updateFavIcon();
            renderEpisodes(anime.episodes || 24);
            loadVideo(1);
        }

        function loadVideo(ep) {
            const server = document.getElementById('serverSelect').value;
            const id = server.includes('vidlink') ? currentAnime.id : currentAnime.idMal || currentAnime.id;
            document.getElementById('videoFrame').src = `${server}${id}/${ep}`;
        }

        function renderEpisodes(total) {
            document.getElementById('epList').innerHTML = Array.from({length: total}, (_, i) => i + 1).map(n => `
                <button onclick="loadVideo(${n})" class="bg-gray-800 px-4 py-2 rounded font-bold text-xs">${n}</button>
            `).join('');
        }

        function closePlayer() { 
            document.getElementById('playerView').classList.add('hidden'); 
            document.getElementById('videoFrame').src = "";
        }

        // --- FAVORITES ---
        function toggleFavorite() {
            const idx = favorites.findIndex(i => i.id === currentAnime.id);
            if(idx === -1) favorites.push(currentAnime); else favorites.splice(idx, 1);
            localStorage.setItem('ymls_favs', JSON.stringify(favorites));
            updateFavIcon();
            renderFavorites();
        }

        function renderFavorites() {
            const section = document.getElementById('favSection');
            if(favorites.length > 0) {
                section.classList.remove('hidden');
                document.getElementById('favGrid').innerHTML = favorites.map(a => `<div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'><img src="${a.coverImage.large}" class="rounded-lg"></div>`).join('');
            } else { section.classList.add('hidden'); }
        }

        function updateFavIcon() {
            document.getElementById('favBtn').style.color = favorites.some(i => i.id === currentAnime.id) ? 'red' : 'gray';
            document.getElementById('favBtn').onclick = toggleFavorite;
        }

        // --- AUTH ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(() => closeModal('authModal')).catch(e => alert(e.message));
        }

        async function handleEmailAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                closeModal('authModal');
            } catch (err) {
                if(err.code === 'auth/user-not-found') {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    closeModal('authModal');
                } else { alert(err.message); }
            }
        }

        auth.onAuthStateChanged(user => {
            const box = document.getElementById('authSection');
            if(user) {
                box.innerHTML = `<button onclick="auth.signOut()" class="text-xs text-gray-500">Logout</button>`;
            } else {
                box.innerHTML = `<button onclick="openModal('authModal')" class="bg-indigo-600 px-4 py-2 rounded">Login</button>`;
            }
        });
    </script>
</body>
</html>
