<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YmlsFlix Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
}

header {
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(45deg, #ff4d6d, #7b2ff7);
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #111;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.search-bar {
  display: flex;
  padding: 10px;
  gap: 10px;
}

.search-bar input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.install-btn {
  background: #7b2ff7;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.categories button {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  background: #1a1a2e;
  color: white;
}

.section {
  padding: 10px;
}

.cards {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.card {
  min-width: 150px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
}

.ep {
  position: absolute;
  top: 5px;
  left: 5px;
  background: black;
  padding: 3px 6px;
  font-size: 12px;
}

.wishlist {
  position: absolute;
  top: 5px;
  right: 5px;
  cursor: pointer;
}

.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000dd;
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111;
  padding:20px;
  width:90%;
  max-width:400px;
}

video {
  width:100%;
  border-radius:10px;
}

.hidden { display:none; }

</style>
</head>

<body>

<header>YmlsFlix Pro</header>

<nav>
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('genres')">📂</button>
<button onclick="showPage('wishlist')">❤️</button>
<button onclick="showPage('profile')">👤</button>
</nav>

<div class="search-bar">
<input type="text" id="search" placeholder="Search anime...">
<button class="install-btn">INSTALL</button>
</div>

<div class="categories">
<button>TV</button>
<button>Movies</button>
<button>OVA</button>
</div>

<!-- HOME -->
<div id="home" class="page">

<div class="section">
<h3>Trending</h3>
<div class="cards" id="trending"></div>
</div>

<div class="section">
<h3>Top Rated</h3>
<div class="cards" id="top"></div>
</div>

</div>

<!-- GENRES -->
<div id="genres" class="page hidden">
<h3 style="padding:10px;">Genres</h3>
<button onclick="loadGenres()">All Genres</button>
<button onclick="loadYears()">Year (2000+)</button>
<div id="genreList"></div>
</div>

<!-- WISHLIST -->
<div id="wishlist" class="page hidden">
<h3 style="padding:10px;">Wishlist</h3>
<div id="wishlistItems"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="page hidden">
<h3 style="padding:10px;">Profile</h3>

<div id="auth">
<input id="username" placeholder="Username or Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Sign In</button>
</div>

<div id="userPanel" class="hidden">
<p id="userText"></p>
<button onclick="logout()">Sign Out</button>
<button onclick="clearHistory()">Clear History</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>

<div id="tabs">
<button onclick="showTab('synopsis')">Synopsis</button>
<button onclick="showTab('characters')">Characters</button>
</div>

<p id="synopsis"></p>
<div id="characters" class="hidden"></div>

<video id="player" controls></video>
<button onclick="playTrailer()">▶ Play Trailer</button>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
}

async function loadAnime(){
  let res = await fetch("https://api.jikan.moe/v4/top/anime");
  let data = await res.json();

  display(data.data.slice(0,10),"trending");
  display(data.data.slice(10,20),"top");
}

function display(list, id){
  let container = document.getElementById(id);
  container.innerHTML="";

  list.forEach(anime=>{
    let card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="ep">${anime.episodes || "?"} EP</div>
      <div class="wishlist" onclick="addWishlist(event, '${anime.title}')">❤️</div>
      <img src="${anime.images.jpg.image_url}">
    `;

    card.onclick = ()=>openModal(anime.mal_id);
    container.appendChild(card);
  });
}

async function openModal(id){
  let res = await fetch(`https://api.jikan.moe/v4/anime/${id}/full`);
  let data = await res.json();

  document.getElementById("modal").style.display="flex";
  document.getElementById("title").innerText=data.data.title;
  document.getElementById("synopsis").innerText=data.data.synopsis;

  window.currentAnime = data.data;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function showTab(tab){
  document.getElementById("synopsis").classList.toggle("hidden", tab!=="synopsis");
  document.getElementById("characters").classList.toggle("hidden", tab!=="characters");

  if(tab==="characters"){
    loadCharacters();
  }
}

async function loadCharacters(){
  let res = await fetch(`https://api.jikan.moe/v4/anime/${currentAnime.mal_id}/characters`);
  let data = await res.json();

  let div = document.getElementById("characters");
  div.innerHTML = data.data.slice(0,5).map(c=>`<p>${c.character.name}</p>`).join("");
}

function playTrailer(){
  let player = document.getElementById("player");
  player.src = currentAnime.trailer.embed_url;
  player.style.transform="rotate(360deg)";
}

function addWishlist(e,title){
  e.stopPropagation();
  wishlist.push(title);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  renderWishlist();
}

function renderWishlist(){
  let div = document.getElementById("wishlistItems");
  div.innerHTML = wishlist.map(w=>`<p>${w}</p>`).join("");
}

function signup(){
  let u = username.value;
  let p = password.value;
  localStorage.setItem("user", JSON.stringify({u,p}));
  alert("Account created");
}

function login(){
  let user = JSON.parse(localStorage.getItem("user"));
  if(user && user.u===username.value && user.p===password.value){
    auth.classList.add("hidden");
    userPanel.classList.remove("hidden");
    userText.innerText="Welcome "+user.u;
  }
}

function logout(){
  location.reload();
}

function clearHistory(){
  if(confirm("Clear history?")){
    localStorage.clear();
    location.reload();
  }
}

document.getElementById("search").addEventListener("input", async (e)=>{
  let q = e.target.value;
  if(q.length<3) return;

  let res = await fetch(`https://api.jikan.moe/v4/anime?q=${q}`);
  let data = await res.json();

  display(data.data.slice(0,10),"trending");
});

loadAnime();
renderWishlist();

</script>

</body>
</html>
