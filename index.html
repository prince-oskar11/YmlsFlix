<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMLSFLIX PRO | v60.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dropdown-content { display: none; position: fixed; top: 95px; left: 50%; transform: translateX(-50%); background: #0f1117; border: 1px solid #1f2937; border-radius: 24px; z-index: 3000; width: 95%; max-width: 500px; padding: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .show { display: block !important; }

        .anime-card { transition: transform 0.3s ease; cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; background: #0f1117; width: 150px; flex-shrink: 0; }
        .anime-card:hover { transform: scale(1.05); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .ep-count-badge { position: absolute; top: 6px; left: 6px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 40; }
        .wish-badge { position: absolute; top: 6px; right: 6px; z-index: 40; cursor: pointer; text-shadow: 0 0 5px black; }

        .genre-btn { background: #1a1c23; border: 1px solid #2d2d2d; color: #e2e8f0; padding: 12px; border-radius: 10px; font-size: 11px; font-weight: 700; transition: 0.2s; text-align: center; }
        .genre-btn:hover { border-color: #ef4444; background: #252833; }

        #heroSection { height: 60vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding-bottom: 60px; position: relative; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, #05070a 15%, transparent 100%); }
        
        .page-view { display: none; min-height: 100vh; }
        .active-view { display: block; }
        .grid-full { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding-bottom: 100px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input { background: #111827; border: 1px solid #1f2937; color: white; padding: 14px; border-radius: 12px; outline: none; width: 100%; font-size: 14px; }
        .btn-red { background: #ef4444; color: white; padding: 14px; border-radius: 12px; font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; width: 100%; text-align: center; border:none; }
        
        .ep-btn { flex-shrink: 0; width: 45px; height: 45px; border-radius: 10px; background: #111827; font-weight: 900; transition: 0.2s; border: 1px solid transparent; color: white; }
        .ep-active { background: #ef4444 !important; }
        
        #installBtn { display: none; } /* Hidden by default until PWA is ready */

        /* Confirmation Modal Styles */
        #confirmOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .confirm-box { background: #0f1117; border: 1px solid #1f2937; padding: 30px; border-radius: 24px; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="confirmOverlay">
        <div class="confirm-box">
            <i class="fa fa-history text-red-500 text-3xl mb-4"></i>
            <h3 class="text-white font-black uppercase text-sm mb-2">Clear History?</h3>
            <p class="text-gray-400 text-xs mb-6">Are you sure? You will lose all your "Continue Watching" progress.</p>
            <div class="flex gap-3">
                <button onclick="confirmClearHistory()" class="btn-red flex-1">Yes, Clear</button>
                <button onclick="closeConfirm()" class="btn-red flex-1 bg-gray-800">Cancel</button>
            </div>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-[2500] glass p-4">
        <div class="container mx-auto flex items-center justify-between">
            <h1 class="text-2xl font-black tracking-tighter logo-text cursor-pointer" onclick="showPage('home')">YMLSFLIX PRO</h1>
            
            <div class="flex items-center gap-5">
                <i onclick="showPage('home')" class="fa fa-home text-gray-400 hover:text-white cursor-pointer text-xl"></i>
                <i onclick="showPage('wishlist')" class="fa fa-heart text-gray-400 hover:text-red-500 cursor-pointer text-xl"></i>
                <i onclick="toggleDropdown('genreDrop')" class="fa fa-th-large text-gray-400 hover:text-white cursor-pointer text-xl"></i>
                <i onclick="toggleDropdown('profileDrop')" class="fa fa-user-circle text-gray-400 hover:text-white cursor-pointer text-xl"></i>
            </div>
        </div>
        
        <div class="container mx-auto mt-4 px-2 flex gap-2">
            <input type="text" id="searchBar" placeholder="Search anime instantly..." oninput="handleSearch(this.value)">
            <button id="installBtn" onclick="triggerInstall()" class="bg-indigo-600 text-[10px] font-black px-4 rounded-xl uppercase whitespace-nowrap"><i class="fa fa-download mr-2"></i>Install</button>
        </div>

        <div id="genreDrop" class="dropdown-content">
            <div class="flex mb-4 gap-4">
                <button onclick="switchTab('genres')" id="tab-gen" class="flex-1 pb-2 font-black text-xs uppercase border-b-2 border-red-600">Genres</button>
                <button onclick="switchTab('years')" id="tab-year" class="flex-1 pb-2 font-black text-xs uppercase text-gray-500">Years</button>
            </div>
            <div id="genreList" class="grid grid-cols-3 gap-2 max-h-80 overflow-y-auto pr-2"></div>
            <div id="yearList" class="grid grid-cols-3 gap-2 max-h-80 overflow-y-auto pr-2 hidden"></div>
        </div>

        <div id="profileDrop" class="dropdown-content">
            <div id="authBox">
                <h3 class="text-white font-black text-xs uppercase mb-4 tracking-widest text-center">Account Access</h3>
                <input type="text" id="authEmail" placeholder="Username or Email" class="mb-2">
                <input type="password" id="authPass" placeholder="Password" class="mb-4">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="btn-red flex-1">Sign In</button>
                    <button onclick="handleAuth('signup')" class="btn-red flex-1 bg-gray-700">Sign Up</button>
                </div>
            </div>
            <div id="userBox" class="hidden text-center">
                <h4 id="userDisplay" class="font-black text-sm mb-4 text-white uppercase"></h4>
                <button onclick="clearHistory()" class="w-full border border-red-900 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase mb-2">Clear History</button>
                <button onclick="handleLogout()" class="w-full bg-gray-800 py-3 rounded-xl text-[10px] font-black uppercase">Logout</button>
            </div>
        </div>
    </nav>

    <div id="page-home" class="page-view active-view pt-32">
        <header id="heroSection">
            <div class="hero-overlay"></div>
            <div class="container mx-auto px-6 relative z-10">
                <h2 id="heroTitle" class="text-4xl font-black mb-2 leading-tight"></h2>
                <p id="heroDesc" class="text-gray-400 text-xs max-w-xl line-clamp-3 mb-6"></p>
                <button id="heroPlayBtn" class="bg-white text-black px-12 py-4 rounded-full font-black text-[12px] uppercase hover:bg-red-500 hover:text-white transition">Watch Now</button>
            </div>
        </header>
        
        <main class="container mx-auto p-4 relative z-20">
            <section id="continueSection" class="mb-12 hidden">
                <h2 class="text-[11px] font-black mb-4 uppercase text-red-500 tracking-[0.2em]">Continue Watching</h2>
                <div id="continueGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
            </section>
            
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-orange-500 tracking-[0.2em]">Trending Now</h2><div id="trendingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-blue-500 tracking-[0.2em]">Now Playing (Airing Today)</h2><div id="airingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-purple-500 tracking-[0.2em]">Most Popular</h2><div id="popularGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
            <section class="mb-12"><h2 class="text-[11px] font-black mb-4 uppercase text-green-500 tracking-[0.2em]">Upcoming</h2><div id="upcomingGrid" class="flex gap-4 overflow-x-auto no-scrollbar"></div></section>
        </main>
    </div>

    <div id="page-filter" class="page-view container mx-auto p-4 pt-44">
        <div class="flex justify-between items-center mb-8">
            <h2 id="filterTitle" class="text-xl font-black uppercase text-red-600 border-l-4 border-red-600 pl-4">Results</h2>
            <button onclick="showPage('home')" class="text-[10px] font-black uppercase bg-gray-800 px-4 py-2 rounded-lg">Back to Home</button>
        </div>
        <div id="filterGrid" class="grid-full"></div>
    </div>

    <div id="page-wishlist" class="page-view container mx-auto p-4 pt-44">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-black uppercase text-red-600 border-l-4 border-red-600 pl-4">My Wishlist</h2>
            <button onclick="showPage('home')" class="text-[10px] font-black uppercase bg-gray-800 px-4 py-2 rounded-lg">Back to Home</button>
        </div>
        <div id="wishlistGrid" class="grid-full"></div>
    </div>

    <div id="playerView" class="fixed inset-0 z-[4000] bg-[#05070a] hidden overflow-y-auto">
        <div class="glass p-4 sticky top-0 flex justify-between items-center z-50">
            <button onclick="closePlayer()" class="w-10 h-10 rounded-full bg-gray-900 flex items-center justify-center"><i class="fa fa-chevron-left"></i></button>
            <div class="text-center">
                <h3 id="playerTitle" class="font-black text-[11px] uppercase truncate max-w-[200px]"></h3>
                <div class="flex gap-2 justify-center mt-2">
                    <button id="subBtn" onclick="setMode('sub')" class="px-4 py-1.5 text-[9px] font-black rounded-lg bg-red-600">SUB</button>
                    <button id="dubBtn" onclick="setMode('dub')" class="px-4 py-1.5 text-[9px] font-black rounded-lg bg-gray-800">DUB</button>
                </div>
            </div>
            <button onclick="closePlayer(); showPage('home');" class="w-10 h-10 rounded-full bg-gray-900 flex items-center justify-center"><i class="fa fa-home"></i></button>
        </div>
        <div class="w-full aspect-video bg-black">
            <iframe id="videoFrame" class="w-full h-full" allowfullscreen></iframe>
        </div>
        <div class="p-6 container mx-auto">
            <button id="trailerBtn" class="bg-indigo-600 w-full py-4 rounded-xl font-black text-[11px] uppercase mb-8 shadow-lg">Watch Trailer In-App</button>
            <h2 class="text-[11px] font-black mb-4 uppercase text-gray-500 tracking-widest">Episodes</h2>
            <div id="epList" class="flex gap-3 overflow-x-auto no-scrollbar mb-12 py-2"></div>
            <h2 class="text-[11px] font-black mb-6 uppercase text-red-600 tracking-widest">Recommended Anime</h2>
            <div id="recommendGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-10"></div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        let currentUser = JSON.parse(localStorage.getItem('ymls_active_user')) || null;
        let playMode = 'sub', currentAnime = null, currentEp = 1;
        let deferredPrompt;

        // --- PWA LOGIC ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        async function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            }
        }

        window.onload = () => { setupUI(); fetchHero(); loadHome(); genFilters(); };

        function setupUI() {
            if(currentUser) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('userBox').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = `Hello, ${currentUser.name}`;
            }
        }

        function handleAuth(mode) {
            const user = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if(!user || !pass) return alert("Please fill all fields");
            
            let db = JSON.parse(localStorage.getItem('ymls_users_db')) || {};
            if(mode === 'signup') {
                if(db[user]) return alert("User already exists");
                db[user] = { name: user, pass: pass, wishlist: [], history: [] };
                localStorage.setItem('ymls_users_db', JSON.stringify(db));
                alert("Account Created! You can now Sign In.");
            } else {
                if(db[user] && db[user].pass === pass) {
                    localStorage.setItem('ymls_active_user', JSON.stringify(db[user]));
                    location.reload();
                } else alert("Invalid username or password");
            }
        }

        function handleLogout() { localStorage.removeItem('ymls_active_user'); location.reload(); }

        async function loadHome() {
            fetchGrid("TRENDING_DESC", "trendingGrid");
            fetchGrid("POPULARITY_DESC", "popularGrid");
            
            const uQ = `query{Page(perPage:20){media(status:NOT_YET_RELEASED,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:uQ})}).then(r=>r.json()).then(j=>render(j.data.Page.media, "upcomingGrid"));
            
            const aQ = `query{Page(perPage:20){airingSchedules(airingAt_greater:${Math.floor(Date.now()/1000)},sort:TIME){media{id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:aQ})}).then(r=>r.json()).then(j=>render(j.data.Page.airingSchedules.map(s => s.media), "airingGrid"));
            
            const h = JSON.parse(localStorage.getItem('ymls_hist')) || [];
            if(h.length) { document.getElementById('continueSection').classList.remove('hidden'); render(h, 'continueGrid'); }
        }

        async function fetchGrid(sort, target) {
            const query = `query($s:[MediaSort]){Page(perPage:20){media(type:ANIME,sort:$s){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:[sort]}})});
            const json = await res.json(); render(json.data.Page.media, target);
        }

        function render(list, target, isGrid = false) {
            const wishes = currentUser ? currentUser.wishlist : [];
            document.getElementById(target).innerHTML = list.map(a => {
                if(!a) return '';
                const isSaved = wishes.some(w => w.id === a.id);
                return `
                <div class="anime-card ${isGrid ? 'w-full' : ''}" onclick='openPlayer(${JSON.stringify(a)})'>
                    <div class="ep-count-badge">${a.episodes || '?'} EPS</div>
                    <i class="fa fa-heart wish-badge ${isSaved ? 'text-red-500' : 'text-gray-400'}" onclick='toggleWish(event, ${JSON.stringify(a)})'></i>
                    <img src="${a.coverImage.large}" class="card-img">
                    <div class="p-2 truncate text-[10px] font-black uppercase text-gray-300">${a.title.english || a.title.romaji}</div>
                </div>`;
            }).join('');
        }

        async function handleSearch(term) {
            if(term.length < 1) { showPage('home'); return; }
            showPage('filter');
            document.getElementById('filterTitle').innerText = "Results: " + term;
            const query = `query($s:String){Page(perPage:50){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:term}})});
            const json = await res.json(); render(json.data.Page.media, "filterGrid", true);
        }

        async function fetchByFilter(g, y) { 
            showPage('filter'); 
            document.getElementById('filterTitle').innerText = g || y;
            const query = `query($g:String,$y:Int){Page(perPage:50){media(genre:$g,seasonYear:$y,type:ANIME,sort:POPULARITY_DESC){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{g, y}})});
            const json = await res.json(); render(json.data.Page.media, "filterGrid", true);
        }

        function toggleWish(e, a) {
            e.stopPropagation(); if(!currentUser) return alert("Sign in to use Wishlist");
            let db = JSON.parse(localStorage.getItem('ymls_users_db'));
            let u = db[currentUser.name];
            const idx = u.wishlist.findIndex(x => x.id === a.id);
            if(idx === -1) u.wishlist.unshift(a); else u.wishlist.splice(idx, 1);
            localStorage.setItem('ymls_users_db', JSON.stringify(db));
            localStorage.setItem('ymls_active_user', JSON.stringify(u));
            currentUser = u;
            if(document.getElementById('page-wishlist').classList.contains('active-view')) renderWishlist();
            loadHome();
        }

        async function openPlayer(a, ep = 1) {
            currentAnime = a; currentEp = ep; 
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = a.title.english || a.title.romaji;
            document.getElementById('videoFrame').src = `https://win-anime.vercel.app/embed/${a.idMal || a.id}/${ep}${playMode==='dub'?'?dub=true':''}`;
            const tBtn = document.getElementById('trailerBtn');
            if(a.trailer?.site === 'youtube') { 
                tBtn.classList.remove('hidden');
                tBtn.onclick = () => document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${a.trailer.id}?autoplay=1`; 
            } else tBtn.classList.add('hidden');
            saveHistory(a); renderEpisodes(a); fetchRecommendations(a.id);
        }

        async function fetchRecommendations(id) {
            const q = `query($id:Int){Media(id:$id){recommendations(perPage:15){nodes{mediaRecommendation{id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}}}`;
            fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, variables:{id}})})
            .then(r=>r.json()).then(j=>render(j.data.Media.recommendations.nodes.map(n => n.mediaRecommendation).filter(x => x !== null), 'recommendGrid'));
        }

        function renderEpisodes(a) {
            const count = a.episodes || 12;
            document.getElementById('epList').innerHTML = Array.from({length: count}, (_, i) => {
                const n = i+1; return `<button onclick="openPlayer(currentAnime, ${n})" class="ep-btn ${currentEp===n?'ep-active':''}">${n}</button>`;
            }).join('');
        }

        function genFilters() {
            const g = ["Action", "Adventure", "Cars", "Comedy", "Dementia", "Demons", "Drama", "Ecchi", "Fantasy", "Game", "Harem", "Historical", "Horror", "Isekai", "Josei", "Kids", "Magic", "Martial Arts", "Mecha", "Military", "Music", "Mystery", "Parody", "Police", "Psychological", "Romance", "Samurai", "School", "Sci-Fi", "Seinen", "Shoujo", "Shoujo Ai", "Shounen", "Shounen Ai", "Slice of Life", "Space", "Sports", "Super Power", "Supernatural", "Thriller", "Vampire"];
            document.getElementById('genreList').innerHTML = g.map(x => `<button onclick="fetchByFilter('${x}')" class="genre-btn">${x}</button>`).join('');
            let yH = ''; for(let y=2026; y>=2000; y--) yH += `<button onclick="fetchByFilter('', ${y})" class="genre-btn">${y}</button>`;
            document.getElementById('yearList').innerHTML = yH;
        }

        function showPage(p) { 
            document.querySelectorAll('.page-view').forEach(v=>v.classList.remove('active-view')); 
            document.getElementById(`page-${p}`).classList.add('active-view'); 
            if(p==='wishlist') renderWishlist(); 
            window.scrollTo(0,0); 
            document.querySelectorAll('.dropdown-content').forEach(x=>x.classList.remove('show'));
        }

        function toggleDropdown(id) { const d=document.getElementById(id); const s=d.classList.contains('show'); document.querySelectorAll('.dropdown-content').forEach(x=>x.classList.remove('show')); if(!s) d.classList.add('show'); }
        function switchTab(t) { document.getElementById('genreList').classList.toggle('hidden', t !== 'genres'); document.getElementById('yearList').classList.toggle('hidden', t !== 'years'); document.getElementById('tab-gen').classList.toggle('border-red-600', t==='genres'); document.getElementById('tab-year').classList.toggle('border-red-600', t==='years'); }
        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); document.getElementById('videoFrame').src = ""; }
        
        // Confirmation Modal Logic
        function clearHistory() { document.getElementById('confirmOverlay').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }
        function confirmClearHistory() { localStorage.removeItem('ymls_hist'); location.reload(); }

        function renderWishlist() { render(currentUser ? currentUser.wishlist : [], 'wishlistGrid', true); }
        function saveHistory(a) { let h = JSON.parse(localStorage.getItem('ymls_hist')) || []; h = h.filter(x => x.id !== a.id); h.unshift(a); localStorage.setItem('ymls_hist', JSON.stringify(h.slice(0,12))); }
        function setMode(m) { playMode = m; document.getElementById('subBtn').classList.toggle('bg-red-600', m==='sub'); document.getElementById('dubBtn').classList.toggle('bg-red-600', m==='dub'); if(currentAnime) openPlayer(currentAnime, currentEp); }

        async function fetchHero() {
            const query = `query{Page(perPage:1){media(type:ANIME,sort:TRENDING_DESC){id idMal title{english romaji} bannerImage description episodes trailer{id site}}}}`;
            const res = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query})});
            const json = await res.json(); const top = json.data.Page.media[0];
            if(top.bannerImage) document.getElementById('heroSection').style.backgroundImage = `url(${top.bannerImage})`;
            document.getElementById('heroTitle').innerText = top.title.english || top.title.romaji;
            document.getElementById('heroDesc').innerHTML = top.description;
            document.getElementById('heroPlayBtn').onclick = () => openPlayer(top);
        }
    </script>
</body>
</html>
