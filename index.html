<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YmlsFlix | v28.0 Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(5, 7, 10, 0.96); backdrop-filter: blur(25px); border-bottom: 1px solid #1f2937; }
        .logo-text { background: linear-gradient(to right, #ef4444, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* CARDS */
        .anime-card { transition: 0.3s ease; cursor: pointer; position: relative; border-radius: 14px; overflow: hidden; background: #0f1117; flex-shrink: 0; width: 140px; }
        .anime-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        /* PROGRESS BAR FOR CONTINUE WATCHING */
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; background: #ef4444; width: 0%; }

        .wish-btn { position: absolute; top: 8px; right: 8px; z-index: 20; background: rgba(0,0,0,0.6); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .is-saved { color: #ef4444 !important; }

        .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: #0f1117; border: 1px solid #1f2937; border-radius: 12px; z-index: 1000; min-width: 200px; padding: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .show { display: block !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input { background: #111827; border: 1px solid #1f2937; color: white; padding: 12px; border-radius: 10px; outline: none; width: 100%; }
        .srv-btn { padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid #1f2937; background: #0f1117; color: #4b5563; }
        .srv-active { background: #ef444415 !important; border-color: #ef4444 !important; color: #ef4444 !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[1000] glass p-4">
        <div class="container mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black tracking-tighter logo-text cursor-pointer" onclick="location.reload()">YmlsFlix</h1>
                <div class="relative">
                    <button onclick="toggleDropdown('genreDrop')" class="text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white flex items-center gap-2">Genres <i class="fa fa-chevron-down"></i></button>
                    <div id="genreDrop" class="dropdown-content grid grid-cols-2 gap-2 w-64">
                        <button onclick="fetchByGenre('Action')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Action</button>
                        <button onclick="fetchByGenre('Comedy')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Comedy</button>
                        <button onclick="fetchByGenre('Drama')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Drama</button>
                        <button onclick="fetchByGenre('Fantasy')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Fantasy</button>
                        <button onclick="fetchByGenre('Horror')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Horror</button>
                        <button onclick="fetchByGenre('Romance')" class="text-left px-3 py-2 text-[10px] hover:bg-gray-800 rounded-lg">Romance</button>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4 flex-1 max-w-md">
                <input type="text" id="searchBar" placeholder="Search anime..." class="text-sm">
                <button onclick="toggleDropdown('authModal')" class="w-10 h-10 rounded-full bg-gray-900 border border-gray-800 flex items-center justify-center text-gray-500"><i class="fa fa-user"></i></button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <section id="continueSection" class="mb-10 hidden">
            <h2 class="text-[10px] font-black mb-4 uppercase tracking-[0.4em] text-green-500">Continue Watching</h2>
            <div id="continueGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>

        <section id="wishlistSection" class="mb-10 hidden">
            <h2 class="text-[10px] font-black mb-4 uppercase tracking-[0.4em] text-red-500">My Watchlist</h2>
            <div id="wishlistGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </section>

        <div id="contentSections">
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-blue-500 tracking-widest">Trending Now</h2><div id="trendingGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-purple-500 tracking-widest">Most Popular</h2><div id="popularGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
            <section class="mb-10"><h2 class="text-[10px] font-black mb-4 uppercase text-yellow-500 tracking-widest">Top Rated</h2><div id="ratedGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div></section>
        </div>

        <div id="searchSection" class="hidden mb-12">
            <h2 class="text-[10px] font-black mb-6 uppercase text-gray-500">Search Results</h2>
            <div id="searchGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </main>

    <div id="playerView" class="fixed inset-0 z-[1500] bg-[#05070a] hidden overflow-y-auto">
        <div class="p-4 flex justify-between items-center glass">
            <button onclick="closePlayer()" class="text-xl px-2"><i class="fa fa-chevron-left"></i></button>
            <div class="text-center truncate px-4">
                <h3 id="playerTitle" class="font-black text-[10px] tracking-widest uppercase truncate"></h3>
                <div id="genreContainer" class="flex gap-1 justify-center mt-1"></div>
            </div>
            <div class="w-10"></div>
        </div>
        <div class="w-full aspect-video bg-black"><iframe id="videoFrame" src="" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>
        <div class="p-4 container mx-auto">
            <button onclick="openTrailer()" id="trailerBtn" class="w-full py-3 mb-4 bg-blue-600/10 text-blue-400 border border-blue-600/20 rounded-xl text-[9px] font-black uppercase"><i class="fa fa-play mr-2"></i> Play YouTube Trailer</button>
            <div class="flex gap-2 mb-6">
                <button onclick="toggleDub()" id="subDubToggle" class="flex-1 py-4 bg-gray-900 border border-gray-800 rounded-xl text-[10px] font-black uppercase">SUB</button>
                <button onclick="nextEpisode()" class="flex-1 py-4 bg-red-600 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-red-600/20">Next Episode</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-6" id="serverGrid">
                <button onclick="changeSrv('winanime', this)" class="srv-btn srv-active">WinAnime</button>
                <button onclick="changeSrv('wiianime', this)" class="srv-btn">WiiAnime</button>
                <button onclick="changeSrv('anilab', this)" class="srv-btn">AniLab</button>
                <button onclick="changeSrv('9anime', this)" class="srv-btn">9Anime</button>
            </div>
            <div id="epList" class="flex gap-2 overflow-x-auto no-scrollbar py-4 border-y border-gray-900"></div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[2000] bg-black/90 flex items-center justify-center hidden p-4">
        <div class="bg-[#0f1117] p-8 rounded-2xl border border-gray-800 w-full max-w-sm text-center">
            <h2 class="text-xl font-black mb-6 uppercase">Ymls Account</h2>
            <div class="flex flex-col gap-4">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
                <button onclick="toggleDropdown('authModal')" class="bg-red-600 py-3 rounded-xl font-bold uppercase text-[10px]">Sign In / Register</button>
                <button onclick="toggleDropdown('authModal')" class="text-[10px] text-gray-600 uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://graphql.anilist.co';
        let currentAnime = null, currentEp = 1, currentSrv = 'winanime', isDub = false;

        window.onload = () => { loadAll(); renderWishlist(); renderContinue(); };

        async function loadAll() {
            fetchList("TRENDING_DESC", "trendingGrid");
            fetchList("POPULARITY_DESC", "popularGrid");
            fetchList("SCORE_DESC", "ratedGrid");
        }

        async function fetchList(sort, target) {
            const query = `query($s:[MediaSort]){Page(perPage:15){media(type:ANIME,sort:$s){id idMal title{english romaji} coverImage{large} genres episodes trailer{id site}}}}`;
            const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{s:[sort]}})});
            const json = await res.json();
            renderGrid(json.data.Page.media, target);
        }

        function renderGrid(list, targetId) {
            const wishList = JSON.parse(localStorage.getItem('ymls_wish')) || [];
            document.getElementById(targetId).innerHTML = list.map(a => {
                const isSaved = wishList.some(w => w.id === a.id);
                return `
                <div class="anime-card" onclick='openPlayer(${JSON.stringify(a)})'>
                    <button class="wish-btn" onclick='toggleWish(event, ${JSON.stringify(a)})'><i class="fa fa-heart ${isSaved ? 'is-saved' : 'text-gray-500'}"></i></button>
                    <img src="${a.coverImage.large}" class="card-img">
                    <div class="p-2 truncate text-[9px] font-black uppercase text-gray-400">${a.title.english || a.title.romaji}</div>
                </div>`;
            }).join('');
        }

        // --- CONTINUE WATCHING ENGINE ---
        function saveProgress(anime, ep) {
            let list = JSON.parse(localStorage.getItem('ymls_history')) || [];
            list = list.filter(item => item.id !== anime.id);
            list.unshift({...anime, lastEp: ep});
            localStorage.setItem('ymls_history', JSON.stringify(list.slice(0, 10)));
            renderContinue();
        }

        function renderContinue() {
            const list = JSON.parse(localStorage.getItem('ymls_history')) || [];
            const sec = document.getElementById('continueSection');
            if(list.length === 0) { sec.classList.add('hidden'); return; }
            sec.classList.remove('hidden');
            document.getElementById('continueGrid').innerHTML = list.map(a => `
                <div class="anime-card" onclick='openPlayer(${JSON.stringify(a)}, ${a.lastEp})'>
                    <img src="${a.coverImage.large}" class="card-img opacity-60">
                    <div class="progress-container"><div class="progress-fill" style="width: ${(a.lastEp / (a.episodes || 12)) * 100}%"></div></div>
                    <div class="absolute bottom-2 left-2 text-[8px] font-black bg-black/80 px-2 py-1 rounded">EP ${a.lastEp}</div>
                </div>`).join('');
        }

        // --- PLAYER & SERVERS ---
        function openPlayer(anime, ep = 1) {
            currentAnime = anime; currentEp = ep;
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('playerTitle').innerText = anime.title.english || anime.title.romaji;
            document.getElementById('genreContainer').innerHTML = anime.genres.slice(0,2).map(g => `<span class="text-[7px] border border-gray-800 px-2 py-0.5 rounded text-gray-500 uppercase font-bold">${g}</span>`).join('');
            loadVideo();
            renderEpisodes(anime.episodes || 12);
            saveProgress(anime, ep);
        }

        function loadVideo() {
            const id = currentAnime.idMal || currentAnime.id;
            const slug = currentAnime.title.romaji.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            let url = "";
            if(currentSrv === 'winanime') url = `https://win-anime.vercel.app/embed/${id}/${currentEp}`;
            else if(currentSrv === 'wiianime') url = `https://anime-dex-five.vercel.app/embed/${id}/${currentEp}`;
            else if(currentSrv === 'anilab') url = `https://api.amvstr.me/api/v2/stream/${currentAnime.id}/${currentEp}`;
            else url = `https://9anime.to/embed/${id}?ep=${currentEp}`;
            document.getElementById('videoFrame').src = url;
        }

        function openTrailer() {
            if(currentAnime.trailer?.site === 'youtube') document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${currentAnime.trailer.id}?autoplay=1`;
        }

        function renderEpisodes(total) {
            document.getElementById('epList').innerHTML = Array.from({length: total}, (_, i) => i + 1).map(n => `
                <button onclick="setEp(${n})" class="flex-shrink-0 min-w-[50px] ${n==currentEp?'bg-red-600 text-white':'bg-gray-800 text-gray-500'} px-4 py-2 rounded-xl font-black text-xs">${n}</button>
            `).join('');
        }

        function setEp(n) { currentEp = n; renderEpisodes(currentAnime.episodes || 12); loadVideo(); saveProgress(currentAnime, n); }
        function nextEpisode() { setEp(currentEp + 1); }
        function changeSrv(s, btn) { 
            currentSrv = s; 
            document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('srv-active'));
            btn.classList.add('srv-active');
            loadVideo(); 
        }
        
        function toggleWish(e, a) {
            e.stopPropagation();
            let list = JSON.parse(localStorage.getItem('ymls_wish')) || [];
            const idx = list.findIndex(i => i.id === a.id);
            if(idx === -1) list.unshift(a); else list.splice(idx, 1);
            localStorage.setItem('ymls_wish', JSON.stringify(list));
            renderWishlist(); loadAll();
        }

        function renderWishlist() {
            const list = JSON.parse(localStorage.getItem('ymls_wish')) || [];
            const sec = document.getElementById('wishlistSection');
            if(list.length === 0) { sec.classList.add('hidden'); return; }
            sec.classList.remove('hidden');
            renderGrid(list, "wishlistGrid");
        }

        document.getElementById('searchBar').addEventListener('input', async (e) => {
            const q = e.target.value;
            if(q.length < 3) { document.getElementById('searchSection').classList.add('hidden'); document.getElementById('contentSections').classList.remove('hidden'); return; }
            const query = `query($q:String){Page(perPage:18){media(type:ANIME,search:$q){id idMal title{english romaji} coverImage{large} episodes genres trailer{id site}}}}`;
            const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{q}})});
            const json = await res.json();
            document.getElementById('searchSection').classList.remove('hidden');
            document.getElementById('contentSections').classList.add('hidden');
            renderGrid(json.data.Page.media, "searchGrid");
        });

        async function fetchByGenre(g) {
            toggleDropdown('genreDrop');
            const query = `query($g:String){Page(perPage:18){media(type:ANIME,genre:$g,sort:[TRENDING_DESC]){id idMal title{english romaji} coverImage{large} episodes trailer{id site}}}}`;
            const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query, variables:{g}})});
            const json = await res.json();
            document.getElementById('searchSection').classList.remove('hidden');
            document.getElementById('contentSections').classList.add('hidden');
            renderGrid(json.data.Page.media, "searchGrid");
        }

        function toggleDropdown(id) { document.getElementById(id).classList.toggle('show'); }
        function closePlayer() { document.getElementById('playerView').classList.add('hidden'); document.getElementById('videoFrame').src = ""; }
    </script>
</body>
</html>
